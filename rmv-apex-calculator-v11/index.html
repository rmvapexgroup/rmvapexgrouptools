<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | PRO V11 🚩</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            position: relative;
        }

        /* Visible Repeating Watermark */
        .watermark-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.05; /* Increased visibility */
            display: flex; flex-wrap: wrap; justify-content: space-around; align-content: space-around;
        }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 20px; white-space: nowrap; margin: 40px; }

        .container { 
            background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); 
            padding: 25px; border-radius: 25px; width: 100%; max-width: 850px; 
            border-top: 5px solid var(--accent);
        }

        .header h1 { color: var(--accent); text-align: center; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 20px; }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .i-box { background: #000; border: 1px solid #333; padding: 10px; border-radius: 10px; }
        .i-box label { font-size: 9px; color: var(--accent); display: block; font-weight: bold; margin-bottom: 4px; }
        .i-box input, .i-box select { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 15px; font-weight: bold; }

        .btn-calc { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; 
            font-weight: 900; cursor: pointer; font-size: 15px; margin-bottom: 15px;
        }

        .action-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .act-btn { padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #fff; font-size: 10px; }

        #summary { display: none; background: rgba(0,210,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .sum-val { font-size: 1.5rem; color: var(--accent); font-weight: 900; display: block; }

        /* Report Table Styling */
        .report-section { display: none; margin-top: 10px; }
        .table-scroll { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: var(--accent); color: #000; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        tr:nth-child(even) { background: rgba(255,255,255,0.02); }

        .sup-links { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 850px; }
        .s-btn { padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 900; text-align: center; font-size: 11px; }

        .footer { margin-top: 30px; font-size: 10px; opacity: 0.5; font-weight: bold; }
    </style>
</head>
<body onload="checkSaved()">

    <div class="watermark-bg" id="wm-container">
        </div>

    <div class="container" id="printable-area">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>ADVANCED AMORTIZATION HUB V11.0</p>
        </div>

        <div class="input-grid">
            <div class="i-box"><label>LOAN AMOUNT (₹)</label><input type="number" id="p_val" placeholder="0"></div>
            <div class="i-box"><label>RATE TYPE</label><select id="r_type"><option value="red">Reducing</option><option value="fix">Fixed</option></select></div>
            <div class="i-box"><label>INTEREST (%)</label><input type="number" id="r_val" placeholder="0"></div>
            <div class="i-box"><label>TENURE (MOS)</label><input type="number" id="n_val" placeholder="0"></div>
        </div>

        <button class="btn-calc" onclick="generateReport()">🚀 GENERATE FULL REPORT</button>

        <div class="action-row">
            <button class="act-btn" style="background:#238636" onclick="saveData()">SAVE</button>
            <button class="act-btn" style="background:#4a5568" onclick="downloadPDF()">DOWNLOAD PDF</button>
            <button class="act-btn" style="background:#c53030" onclick="resetPage()">RESET</button>
        </div>

        <div id="summary">
            <div style="display:flex; justify-content: space-around;">
                <div><span style="font-size:10px;">EMI</span><b class="sum-val" id="res_emi">₹0</b></div>
                <div><span style="font-size:10px;">TOTAL INTEREST</span><b class="sum-val" id="res_int" style="color:var(--gold)">₹0</b></div>
            </div>
        </div>

        <div class="report-section" id="report-sec">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr><th>Month</th><th>Opening</th><th>EMI</th><th>Interest</th><th>Principal</th><th>Closing</th></tr>
                    </thead>
                    <tbody id="t-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">☕ BUY ME A COFFEE</a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">❤️ SUPPORT ON KO-FI</a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | CRAFTED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        // Generate Watermark Tiles
        const wmContainer = document.getElementById('wm-container');
        for(let i=0; i<40; i++) {
            wmContainer.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;
        }

        function generateReport() {
            const P = parseFloat(document.getElementById('p_val').value);
            const r_ann = parseFloat(document.getElementById('r_val').value);
            const N = parseInt(document.getElementById('n_val').value);
            const type = document.getElementById('r_type').value;

            if(!P || !r_ann || !N) return alert("Fill All! 🚩");

            let emi, totalInt = 0, balance = P, tbody = document.getElementById('t-body');
            tbody.innerHTML = "";

            if(type === 'red') {
                const R = r_ann / 12 / 100;
                emi = (P * R * Math.pow(1+R, N)) / (Math.pow(1+R, N) - 1);
                for(let i=1; i<=N; i++) {
                    let int_m = balance * R;
                    let prin_m = emi - int_m;
                    let open = balance;
                    balance -= prin_m;
                    totalInt += int_m;
                    addTableRow(i, open, emi, int_m, prin_m, balance);
                }
            } else {
                totalInt = (P * r_ann * (N/12)) / 100;
                emi = (P + totalInt) / N;
                let m_int = totalInt / N, m_prin = P / N;
                for(let i=1; i<=N; i++) {
                    let open = balance;
                    balance -= m_prin;
                    addTableRow(i, open, emi, m_int, m_prin, balance);
                }
            }

            document.getElementById('res_emi').innerText = "₹" + Math.round(emi).toLocaleString('en-IN');
            document.getElementById('res_int').innerText = "₹" + Math.round(totalInt).toLocaleString('en-IN');
            document.getElementById('summary').style.display = 'block';
            document.getElementById('report-sec').style.display = 'block';
        }

        function addTableRow(m, o, e, i, p, c) {
            document.getElementById('t-body').innerHTML += `<tr><td>${m}</td><td>${Math.round(o)}</td><td style="color:var(--gold)">${Math.round(e)}</td><td>${Math.round(i)}</td><td>${Math.round(p)}</td><td style="color:var(--accent)">${Math.max(0, Math.round(c))}</td></tr>`;
        }

        function downloadPDF() {
            const element = document.getElementById('printable-area');
            const opt = {
                margin: 5, filename: 'RMV_APEX_GROUP_REPORT.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#05070a', useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function saveData() {
            const d = { p:document.getElementById('p_val').value, r:document.getElementById('r_val').value, n:document.getElementById('n_val').value, t:document.getElementById('r_type').value };
            localStorage.setItem('rmv_v11_fix', JSON.stringify(d));
            alert("Saved! 🚩");
        }

        function checkSaved() {
            const s = localStorage.getItem('rmv_v11_fix');
            if(s) {
                const d = JSON.parse(s);
                document.getElementById('p_val').value = d.p;
                document.getElementById('r_val').value = d.r;
                document.getElementById('n_val').value = d.n;
                document.getElementById('r_type').value = d.t;
            }
        }

        function resetPage() { localStorage.removeItem('rmv_v11_fix'); location.reload(); }
    </script>
</body>
</html>
