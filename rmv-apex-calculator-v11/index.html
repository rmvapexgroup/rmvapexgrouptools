<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Numbers Pro 🚩</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --success: #238636; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }

        /* Background Watermark */
        body::before {
            content: "RMV APEX GROUP";
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 8vw; font-weight: 900; color: rgba(255, 255, 255, 0.02); z-index: -1; pointer-events: none;
        }

        .container { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; max-width: 600px; border-top: 6px solid var(--accent); }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; margin-bottom: 20px; }
        
        .input-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .input-box { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; }
        .input-box label { font-size: 10px; color: var(--accent); display: block; text-transform: uppercase; font-weight: bold; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 18px; text-align: center; }

        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; font-weight: 900; cursor: pointer; margin-bottom: 15px; }
        
        .action-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .act-btn { padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #fff; font-size: 11px; }

        /* Numeric Results - BIG & CLEAR */
        #results { margin-top: 30px; display: none; background: rgba(0,210,255,0.05); padding: 20px; border-radius: 20px; border: 1px dashed var(--accent); }
        .res-item { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .res-label { font-size: 12px; opacity: 0.7; display: block; margin-bottom: 5px; }
        .res-val { font-size: 2.2rem; font-weight: 900; color: var(--accent); }
        .total-val { font-size: 1.5rem; color: #fff; }

        .chart-box { height: 150px; margin-top: 20px; opacity: 0.6; } /* Chart is now small and out of the way */

        .sup-links { margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; }
        .s-btn { padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; text-align: center; font-size: 12px; }
        
        .footer { margin-top: 30px; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body onload="checkData()">

    <div class="container" id="printable">
        <div class="header"><h1>RMV APEX GROUP 🚩</h1></div>

        <div class="input-row">
            <div class="input-box"><label>Amount (₹)</label><input type="number" id="amt" placeholder="0"></div>
            <div class="input-box"><label>Interest (%)</label><input type="number" id="rate" placeholder="0"></div>
            <div class="input-box" style="grid-column: span 2;"><label>Tenure (Months)</label><input type="number" id="mon" placeholder="0"></div>
        </div>

        <button class="btn-main" onclick="runCalc()">🚀 GET NUMERIC REPORT</button>

        <div class="action-row">
            <button class="act-btn" style="background:var(--success)" onclick="save()">SAVE</button>
            <button class="act-btn" style="background:#555" onclick="pdf()">PDF</button>
            <button class="act-btn" style="background:#c53030" onclick="cls()">CLEAR</button>
        </div>

        <div id="results">
            <div class="res-item">
                <span class="res-label">MONTHLY EMI</span>
                <div class="res-val" id="emi_out">₹0</div>
            </div>
            <div class="res-item">
                <span class="res-label">TOTAL INTEREST PAYABLE</span>
                <div class="total-val" id="int_out" style="color: #00d2ff;">₹0</div>
            </div>
            <div class="res-item">
                <span class="res-label">TOTAL AMOUNT (P + I)</span>
                <div class="total-val" id="tot_out">₹0</div>
            </div>
            
            <div class="chart-box"><canvas id="miniChart"></canvas></div>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">☕ BUY ME A COFFEE</a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">❤️ KO-FI</a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | CRAFTED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        let myChart = null;
        function runCalc() {
            const P = parseFloat(document.getElementById('amt').value);
            const R = parseFloat(document.getElementById('rate').value) / 12 / 100;
            const N = parseInt(document.getElementById('mon').value);
            if(!P || !R || !N) return alert("संख्याएं भरें! 🚩");

            const emi = (P * R * Math.pow(1+R, N)) / (Math.pow(1+R, N)-1);
            const total = emi * N;
            const interest = total - P;

            document.getElementById('emi_out').innerText = "₹" + Math.round(emi).toLocaleString('en-IN');
            document.getElementById('int_out').innerText = "₹" + Math.round(interest).toLocaleString('en-IN');
            document.getElementById('tot_out').innerText = "₹" + Math.round(total).toLocaleString('en-IN');
            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('miniChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: ['P', 'I'], datasets: [{ data: [P, interest], backgroundColor: ['#3a7bd5', '#00d2ff'] }] },
                options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { color: '#fff' } } } }
            });
        }
        function save() { localStorage.setItem('rmv_data', JSON.stringify({a:document.getElementById('amt').value, r:document.getElementById('rate').value, m:document.getElementById('mon').value})); alert("Saved!"); }
        function checkData() { const s = localStorage.getItem('rmv_data'); if(s){ const d=JSON.parse(s); document.getElementById('amt').value=d.a; document.getElementById('rate').value=d.r; document.getElementById('mon').value=d.m; } }
        function pdf() { html2pdf().from(document.getElementById('printable')).set({margin:10, filename:'RMV_REPORT.pdf', html2canvas:{backgroundColor:'#05070a'}}).save(); }
        function cls() { localStorage.removeItem('rmv_data'); location.reload(); }
    </script>
</body>
</html>
