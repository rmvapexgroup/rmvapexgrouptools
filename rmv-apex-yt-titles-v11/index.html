<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | YT Title Master 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --yt-red: #ff0000; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        /* Branding Watermark */
        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.06; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 50px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; max-width: 650px; border-top: 6px solid var(--yt-red); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--yt-red); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; }
        
        .section-title { font-size: 11px; color: var(--yt-red); margin: 15px 0 10px; font-weight: bold; text-transform: uppercase; border-left: 3px solid var(--yt-red); padding-left: 10px; }
        .i-box { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .i-box label { font-size: 10px; color: #aaa; display: block; margin-bottom: 5px; }
        .i-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; font-weight: bold; }

        .btn-calc { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--yt-red); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-calc:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); }
        
        #results { display: none; margin-top: 25px; animation: slideUp 0.5s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .title-list { display: flex; flex-direction: column; gap: 10px; }
        .title-item { background: #111; border: 1px solid #333; padding: 15px; border-radius: 15px; position: relative; cursor: pointer; transition: 0.2s; border-left: 4px solid var(--yt-red); }
        .title-item:hover { background: #1a1a1a; transform: translateX(5px); }
        .title-item i { position: absolute; right: 15px; top: 18px; color: var(--success); opacity: 0; transition: 0.2s; }
        .title-item:active i { opacity: 1; }

        /* Support Section */
        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 650px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .s-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>YouTube Viral Title & Hook Generator</p>
        </div>

        <div class="section-title">What is your video about?</div>
        <div class="i-box">
            <label>Keyword / Topic</label>
            <input type="text" id="keyword" placeholder="Ex: Earn Money, Coding, Cooking, Car Review...">
        </div>

        <button class="btn-calc" onclick="generateTitles()">🚀 GENERATE CLICK-WORTHY TITLES</button>

        <div id="results">
            <div class="section-title">Tap to copy your favorite Title</div>
            <div class="title-list" id="title_container">
                </div>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<30; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function generateTitles() {
            const kw = document.getElementById('keyword').value.trim();
            if(!kw) { alert("Please enter a topic! 🚩"); return; }

            const templates = [
                `How to ${kw} in 2026 (The Secret Way!) 🚀`,
                `I tried ${kw} for 30 Days and THIS happened... 😱`,
                `STOP doing ${kw} until you watch this! 🛑`,
                `5 Easy Steps to ${kw} (For Beginners) ✅`,
                `The TRUTH about ${kw} that nobody tells you... 🤫`,
                `Why ${kw} is the future of 2026! 📈`,
                `${kw}: From zero to pro in 10 minutes! 💎`,
                `This ${kw} strategy changed my life forever. ✨`
            ];

            const container = document.getElementById('title_container');
            container.innerHTML = "";

            templates.forEach(t => {
                const div = document.createElement('div');
                div.className = 'title-item';
                div.innerHTML = `${t} <i class="fas fa-check-circle"></i>`;
                div.onclick = () => copyTitle(t);
                container.appendChild(div);
            });

            document.getElementById('results').style.display = 'block';
        }

        function copyTitle(text) {
            navigator.clipboard.writeText(text);
            alert("Title Copied! 🚩");
        }
    </script>
</body>
</html>
