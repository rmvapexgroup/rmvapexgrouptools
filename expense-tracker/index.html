<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #f43f5e; --s: #fb923c; --d: #0f172a; --bg: #f8fafc; --success: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; }
        
        /* Watermark */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(244, 63, 94, 0.04); z-index: -1; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border: 1px solid #eee; position: relative; overflow: hidden; margin: 20px 0; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--d); font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; opacity: 0.6; transition: 0.3s; }
        .back-link:hover { opacity: 1; color: var(--p); transform: translateX(-3px); }

        h2 { color: var(--d); margin: 20px 0 25px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #64748b; font-size: 0.85rem; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; font-weight: 600; box-sizing: border-box; }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(244, 63, 94, 0.1); }
        
        .btn-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 15px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--p); color: white; }
        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(244, 63, 94, 0.2); }
        .btn-clear { background: #f1f5f9; color: #64748b; }
        .btn-clear:hover { background: #e2e8f0; color: var(--p); }

        .summary-box { margin-top: 25px; background: #fff1f2; padding: 20px; border-radius: 25px; border: 2px dashed #fecdd3; text-align: center; }
        .total-exp { font-size: 2rem; color: var(--p); font-weight: 800; }
        
        .list-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 10px; padding: 0 5px; }
        .list-header span { font-weight: 800; color: var(--d); font-size: 0.9rem; }

        .list-container { max-height: 200px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px; }
        .list-container::-webkit-scrollbar { width: 5px; }
        .list-container::-webkit-scrollbar-thumb { background: #f1f5f9; border-radius: 10px; }

        .exp-item { display: flex; justify-content: space-between; padding: 12px 15px; background: #f8fafc; border-radius: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; font-size: 0.95rem; font-weight: 700; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .exp-item span:last-child { color: var(--p); }

        .btn-download { width: 100%; background: var(--success); color: white; padding: 12px; font-size: 0.85rem; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; }
        .btn-download:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }

        /* --- Updated Support Section --- */
        .support-section { margin-top: 35px; padding-top: 25px; border-top: 1px solid #f1f5f9; text-align: center; }
        .support-btns { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 15px; }
        .kofi-btn { background: #29abe0; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(41,171,224,0.2); transition: 0.3s; width: fit-content; }
        .kofi-btn:hover { transform: translateY(-2px); }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid #f8fafc; padding-top: 15px; }

        @media print {
            .no-print, .btn-grid, .back-nav, .support-section, .btn-download, .footer-tag, .input-group { display: none !important; }
            .card { border: none; box-shadow: none; width: 100%; max-width: 100%; }
            .list-container { max-height: none; overflow: visible; }
            .exp-item { border: 1px solid #ddd; background: white; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <div class="back-nav no-print">
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </div>

    <h2>💸 Daily Expense Pro</h2>
    
    <div class="input-group no-print">
        <label>Item Description (विवरण)</label>
        <input type="text" id="desc" placeholder="e.g. Lunch, Grocery">
    </div>

    <div class="input-group no-print">
        <label>Amount (₹ राशि)</label>
        <input type="number" id="amt" placeholder="0.00" step="any">
    </div>

    <div class="btn-grid no-print">
        <button class="btn-add" onclick="addExpense()"><i class="fas fa-plus-circle"></i> Add Item</button>
        <button class="btn-clear" onclick="clearAll()"><i class="fas fa-trash-alt"></i> Clear</button>
    </div>

    <div class="summary-box">
        <div style="font-weight: 800; color: #64748b; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase;">Total Spent Amount</div>
        <div class="total-exp" id="totalExp">₹ 0.00</div>
    </div>

    <div class="list-header">
        <span>Expense History</span>
        <span id="itemCount" style="color: var(--p);">0 Items</span>
    </div>

    <div class="list-container" id="expList">
        </div>

    <button id="downloadBtn" class="btn-download no-print" onclick="downloadPDF()" style="display: none;"><i class="fas fa-file-download"></i> Download Statement</button>

    <div class="support-section no-print">
        <p style="font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Support RMV APEX GROUP 🚩</p>
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank">
                <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=rameshmewalalvishwakarma&button_colour=FFDD00&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=ffffff" style="height: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(255, 221, 0, 0.2);">
            </a>

            <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="kofi-btn">
                <i class="fas fa-mug-hot"></i> Support on Ko-fi
            </a>
        </div>
    </div>

    <div class="footer-tag">Crafted by Ramesh Mewalal Vishwakarma 🚩</div>
</div>

<script>
    let total = 0;
    let count = 0;

    function addExpense() {
        let desc = document.getElementById('desc').value;
        let amtInput = document.getElementById('amt').value;
        let amt = parseFloat(amtInput);

        if (!desc || isNaN(amt) || amt <= 0) {
            alert("महत्वपूर्ण: कृपया सही विवरण और राशि दर्ज करें!");
            return;
        }

        total += amt;
        count++;
        
        document.getElementById('totalExp').innerText = "₹ " + total.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('itemCount').innerText = count + " Items";

        let list = document.getElementById('expList');
        let item = document.createElement('div');
        item.className = 'exp-item';
        item.innerHTML = `<span>${desc}</span><span>₹ ${amt.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>`;
        
        list.prepend(item);

        document.getElementById('downloadBtn').style.display = "flex";

        document.getElementById('desc').value = "";
        document.getElementById('amt').value = "";
        document.getElementById('desc').focus();
    }

    function clearAll() {
        if(confirm("क्या आप पूरी लिस्ट साफ करना चाहते हैं?")) {
            total = 0;
            count = 0;
            document.getElementById('totalExp').innerText = "₹ 0.00";
            document.getElementById('itemCount').innerText = "0 Items";
            document.getElementById('expList').innerHTML = "";
            document.getElementById('downloadBtn').style.display = "none";
        }
    }

    function downloadPDF() {
        window.print();
    }
</script>
</body>
</html>
