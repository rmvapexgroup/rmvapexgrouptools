<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #f43f5e; --s: #fb923c; --d: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; overflow-x: hidden; }
        
        /* Premium Background Watermark */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(244, 63, 94, 0.04); z-index: -1; white-space: nowrap; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 450px; border: 1px solid #eee; position: relative; overflow: hidden; z-index: 1; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        h2 { color: var(--d); margin-bottom: 25px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #64748b; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(244, 63, 94, 0.1); }
        
        .btn-add { width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; background: var(--p); color: white; font-size: 1rem; margin-top: 10px; transition: 0.3s; }
        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(244, 63, 94, 0.2); }

        .summary-box { margin-top: 25px; background: #fff1f2; padding: 20px; border-radius: 20px; border: 2px dashed #fecdd3; text-align: center; }
        .total-exp { font-size: 1.8rem; color: var(--p); font-weight: 800; }
        
        .list-container { margin-top: 20px; max-height: 200px; overflow-y: auto; padding-right: 5px; }
        .exp-item { display: flex; justify-content: space-between; padding: 10px; background: #f8fafc; border-radius: 10px; margin-bottom: 8px; border: 1px solid #e2e8f0; font-size: 0.9rem; font-weight: 600; }
        .exp-item span:first-child { color: #475569; }
        .exp-item span:last-child { color: var(--p); }

        /* SUPPORT SECTION */
        .support-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .support-btns { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
        .support-btn { padding: 10px 15px; border-radius: 12px; text-decoration: none; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .bmc-btn { background: #FFDD00; color: #000; }
        .kofi-btn { background: #29abe0; color: #fff; }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.75rem; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <h2>💸 Daily Expense Pro</h2>
    
    <div class="input-group">
        <label>Item Description (विवरण)</label>
        <input type="text" id="desc" placeholder="e.g. Lunch, Grocery">
    </div>

    <div class="input-group">
        <label>Amount (₹ राशि)</label>
        <input type="number" id="amt" placeholder="0.00">
    </div>

    <button class="btn-add" onclick="addExpense()">Add Expense</button>

    <div class="summary-box">
        <div style="font-weight: 600; color: #64748b; font-size: 0.8rem;">TOTAL SPENT</div>
        <div class="total-exp" id="totalExp">₹ 0.00</div>
    </div>

    <div class="list-container" id="expList">
        </div>

    <div class="support-section">
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" class="support-btn bmc-btn" target="_blank"><i class="fas fa-coffee"></i> Coffee</a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" class="support-btn kofi-btn" target="_blank"><i class="fas fa-mug-hot"></i> Ko-fi</a>
        </div>
    </div>
    <div class="footer-tag">© 2026 RMV APEX GROUP 🚩</div>
</div>

<script>
    let total = 0;

    function addExpense() {
        let desc = document.getElementById('desc').value;
        let amt = parseFloat(document.getElementById('amt').value);

        if (!desc || isNaN(amt) || amt <= 0) {
            alert("कृपया सही विवरण और राशि दर्ज करें!");
            return;
        }

        total += amt;
        document.getElementById('totalExp').innerText = "₹ " + total.toLocaleString('en-IN', {minimumFractionDigits: 2});

        let list = document.getElementById('expList');
        let item = document.createElement('div');
        item.className = 'exp-item';
        item.innerHTML = `<span>${desc}</span><span>₹ ${amt.toLocaleString('en-IN')}</span>`;
        
        list.prepend(item);

        // Clear Inputs
        document.getElementById('desc').value = "";
        document.getElementById('amt').value = "";
    }
</script>
</body>
</html>
