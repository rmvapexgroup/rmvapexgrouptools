<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Base64 Master 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #1abc9c; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --white: #ffffff; --error: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.05; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 50px; color: var(--white); }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 30px; width: 100%; max-width: 850px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; }

        .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .box-title { font-size: 12px; color: var(--gold); margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        
        textarea { width: 100%; height: 250px; background: #000; border: 1px solid #333; border-radius: 15px; padding: 15px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; resize: none; font-family: 'Courier New', monospace; }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(26, 188, 156, 0.2); }

        .btn-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-main { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-enc { background: var(--accent); color: #fff; }
        .btn-dec { background: var(--gold); color: #000; }
        .btn-clear { background: var(--error); color: #fff; max-width: 150px; }

        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 850px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; }
        @media (max-width: 768px) { .editor-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Advanced Base64 Encoder & Decoder V11</p>
        </div>

        <div class="editor-grid">
            <div>
                <div class="box-title">Plain Text (सामान्य टेक्स्ट)</div>
                <textarea id="plainTxt" placeholder="यहाँ टेक्स्ट टाइप करें..."></textarea>
            </div>
            <div>
                <div class="box-title">Base64 String</div>
                <textarea id="base64Txt" placeholder="यहाँ Base64 कोड पेस्ट करें..."></textarea>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-main btn-enc" onclick="encode()">🔐 ENCODE TO BASE64</button>
            <button class="btn-main btn-dec" onclick="decode()">🔓 DECODE TO PLAIN</button>
            <button class="btn-main btn-clear" onclick="clearAll()">❌ CLEAR</button>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<30; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        const plain = document.getElementById('plainTxt');
        const b64 = document.getElementById('base64Txt');

        function encode() {
            try {
                if(!plain.value) return;
                b64.value = btoa(unescape(encodeURIComponent(plain.value)));
            } catch(e) { alert("Encoding Error! 🚩"); }
        }

        function decode() {
            try {
                if(!b64.value) return;
                plain.value = decodeURIComponent(escape(atob(b64.value)));
            } catch(e) { alert("Invalid Base64 String! 🚩"); }
        }

        function clearAll() {
            plain.value = "";
            b64.value = "";
        }
    </script>
</body>
</html>
