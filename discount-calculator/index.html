<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Calc | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #8b5cf6; --d: #0f172a; --bg: #f8fafc; --gold: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; position: relative; overflow: hidden; }
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 5rem; font-weight: 900; color: rgba(15, 23, 42, 0.03); z-index: 0; pointer-events: none; text-transform: uppercase; white-space: nowrap; }
        .card { background: white; padding: 35px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 380px; border: 1px solid #f1f5f9; position: relative; z-index: 10; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--gold)); border-radius: 35px 35px 0 0; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; font-weight: 700; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--p); }
        #res-box { background: #f5f3ff; padding: 20px; border-radius: 20px; border: 2px dashed var(--p); text-align: center; display: none; margin-bottom: 20px; }
        .btn-calc { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--d); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="watermark">RMV APEX GROUP</div>
<div class="card">
    <div style="position:absolute; top:20px; left:20px;"><a href="../index.html" style="text-decoration:none; color:var(--gold); font-weight:800; font-size:0.7rem;">← DASHBOARD</a></div>
    <h2 style="text-align:center;">🏷️ Discount Calc</h2>
    <input type="number" id="price" placeholder="Original Price (₹)" oninput="disc()">
    <input type="number" id="per" placeholder="Discount %" oninput="disc()">
    <div id="res-box">
        <p style="margin:0; font-size:0.8rem; font-weight:700; color:#64748b;">You Save: ₹<span id="save">0</span></p>
        <h2 style="margin:5px 0; color:var(--p);">Final Price: ₹<span id="final">0</span></h2>
    </div>
    <button class="btn-calc" onclick="disc()">CALCULATE</button>
</div>
<script>
    function disc() {
        let pr = parseFloat(document.getElementById('price').value), pe = parseFloat(document.getElementById('per').value);
        if(!pr || !pe) return;
        let s = (pr * pe) / 100, f = pr - s;
        document.getElementById('save').innerText = s.toFixed(2);
        document.getElementById('final').innerText = f.toFixed(2);
        document.getElementById('res-box').style.display = "block";
    }
</script>
</body>
</html>
