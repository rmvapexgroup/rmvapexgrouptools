<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Calc | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #8b5cf6; --d: #0f172a; --bg: #f8fafc; --gold: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; position: relative; overflow-x: hidden; user-select: none; }
        
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 5rem; font-weight: 900; color: rgba(15, 23, 42, 0.03); z-index: 0; pointer-events: none; text-transform: uppercase; white-space: nowrap; }
        
        .card { background: white; padding: 35px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 380px; border: 1px solid #f1f5f9; position: relative; z-index: 10; margin: 20px; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--gold)); border-radius: 35px 35px 0 0; }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--gold); font-weight: 800; font-size: 0.7rem; display: flex; align-items: center; gap: 5px; opacity: 0.8; transition: 0.3s; }
        .back-link:hover { opacity: 1; transform: translateX(-3px); }

        h2 { color: var(--d); margin: 20px 0 25px; font-weight: 800; text-align: center; }
        
        input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; font-weight: 700; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 1rem; }
        input:focus { border-color: var(--p); box-shadow: 0 0 10px rgba(139, 92, 246, 0.1); }
        
        #res-box { background: #f5f3ff; padding: 20px; border-radius: 20px; border: 2px dashed var(--p); text-align: center; display: none; margin-bottom: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-calc { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--d); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.9rem; letter-spacing: 1px; }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2); background: #1e293b; }

        /* Support Section */
        .support-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #f1f5f9; text-align: center; }
        .support-btns { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 15px; }
        .kofi-btn { background: #29abe0; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(41,171,224,0.2); transition: 0.3s; width: fit-content; }
        .kofi-btn:hover { transform: scale(1.05); }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.65rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <div class="back-nav no-print">
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </div>

    <h2>🏷️ Discount Calc</h2>
    
    <input type="number" id="price" placeholder="Original Price (₹)" oninput="disc()">
    <input type="number" id="per" placeholder="Discount %" oninput="disc()">
    
    <div id="res-box">
        <p style="margin:0; font-size:0.8rem; font-weight:700; color:#64748b;">You Save: ₹<span id="save">0</span></p>
        <h2 style="margin:5px 0; color:var(--p); font-size: 1.6rem;">Final Price: ₹<span id="final">0</span></h2>
    </div>

    <button class="btn-calc no-print" onclick="disc()">CALCULATE</button>

    <div class="support-section no-print">
        <p style="font-size: 0.6rem; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Support RMV APEX GROUP 🚩</p>
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank">
                <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=rameshmewalalvishwakarma&button_colour=FFDD00&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=ffffff" style="height: 38px; border-radius: 8px; box-shadow: 0 4px 15px rgba(255, 221, 0, 0.2);">
            </a>

            <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="kofi-btn">
                <i class="fas fa-mug-hot"></i> Support on Ko-fi
            </a>
        </div>
    </div>

    <div class="footer-tag">Crafted by Ramesh Mewalal Vishwakarma 🚩</div>
</div>

<script>
    function disc() {
        let pr = parseFloat(document.getElementById('price').value);
        let pe = parseFloat(document.getElementById('per').value);
        
        if(!pr || isNaN(pe)) {
            document.getElementById('res-box').style.display = "none";
            return;
        }
        
        let s = (pr * pe) / 100;
        let f = pr - s;
        
        document.getElementById('save').innerText = s.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('final').innerText = f.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('res-box').style.display = "block";
    }
</script>

</body>
</html>
