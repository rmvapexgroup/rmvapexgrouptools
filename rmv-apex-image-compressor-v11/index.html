<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Image Compressor 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #f39c12; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.05; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 50px; color: var(--white); }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 30px; width: 100%; max-width: 700px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; }

        .upload-box { border: 2px dashed #444; padding: 40px; border-radius: 20px; text-align: center; transition: 0.3s; cursor: pointer; background: rgba(0,0,0,0.2); margin-bottom: 20px; }
        .upload-box:hover { border-color: var(--accent); background: rgba(243, 156, 18, 0.05); }
        .upload-box i { font-size: 50px; color: var(--accent); margin-bottom: 15px; }
        
        input[type="file"] { display: none; }
        .range-box { margin: 20px 0; }
        .range-box label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 10px; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }

        .btn-compress { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--accent); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-compress:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(243, 156, 18, 0.4); }

        #result-area { display: none; margin-top: 30px; text-align: center; border-top: 1px solid #333; padding-top: 20px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; }
        .stat-card small { font-size: 10px; color: #888; display: block; }
        .stat-card strong { font-size: 16px; color: var(--gold); }

        .dl-btn { background: #2ecc71; color: #000; padding: 12px 25px; border-radius: 12px; text-decoration: none; display: inline-block; font-weight: 900; margin-top: 10px; }

        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 700px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Smart AI Image Compressor V11</p>
        </div>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-file-image"></i>
            <h3>इमेज अपलोड करें</h3>
            <p style="font-size: 12px; opacity: 0.7;">PNG, JPG, JPEG सपोर्टेड</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="range-box">
            <label>Compression Level: <span id="qual-val">80</span>%</label>
            <input type="range" id="quality" min="10" max="100" value="80" oninput="document.getElementById('qual-val').innerText=this.value">
        </div>

        <button class="btn-compress" onclick="compressImage()">🚀 COMPRESS IMAGE NOW</button>

        <div id="result-area">
            <div class="stats">
                <div class="stat-card">
                    <small>Original Size</small>
                    <strong id="old-size">0 KB</strong>
                </div>
                <div class="stat-card">
                    <small>New Size</small>
                    <strong id="new-size">0 KB</strong>
                </div>
            </div>
            <a id="downloadBtn" class="dl-btn">📥 DOWNLOAD COMPRESSED IMAGE</a>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<30; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function compressImage() {
            const fileInput = document.getElementById('fileInput');
            const quality = document.getElementById('quality').value / 100;

            if (!fileInput.files[0]) { alert("कृपया पहले एक इमेज चुनें! 🚩"); return; }

            const file = fileInput.files[0];
            document.getElementById('old-size').innerText = (file.size / 1024).toFixed(2) + " KB";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    
                    // Estimate new size
                    const head = 'data:image/jpeg;base64,'.length;
                    const newSize = Math.round((dataUrl.length - head) * 3 / 4);
                    
                    document.getElementById('new-size').innerText = (newSize / 1024).toFixed(2) + " KB";
                    document.getElementById('result-area').style.display = 'block';
                    
                    const dlBtn = document.getElementById('downloadBtn');
                    dlBtn.href = dataUrl;
                    dlBtn.download = "RMV_APEX_Compressed.jpg";
                }
            }
        }
    </script>
</body>
</html>
