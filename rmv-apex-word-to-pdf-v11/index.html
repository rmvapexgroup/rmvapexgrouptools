<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Word to PDF 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #3498db; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        /* Branding Watermark */
        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.05; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 50px; color: var(--white); }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 30px; width: 100%; max-width: 700px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; }

        .upload-area { border: 2px dashed #444; padding: 40px; border-radius: 20px; text-align: center; transition: 0.3s; cursor: pointer; background: rgba(0,0,0,0.2); }
        .upload-area:hover { border-color: var(--accent); background: rgba(52, 152, 219, 0.05); }
        .upload-area i { font-size: 50px; color: var(--accent); margin-bottom: 15px; }
        
        #fileInput { display: none; }
        .file-info { margin-top: 20px; font-size: 14px; color: var(--gold); display: none; font-weight: bold; text-align: center; }

        .btn-convert { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--accent); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 20px; display: none; }
        .btn-convert:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); }

        #loader { display: none; margin-top: 20px; text-align: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Support Buttons */
        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 700px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .s-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Advanced Word to PDF Converter V11</p>
        </div>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-file-word"></i>
            <h3>वर्ड फाइल चुनें</h3>
            <p style="font-size: 12px; opacity: 0.7; margin-top: 10px;">(.docx, .doc) फाइल अपलोड करने के लिए यहाँ क्लिक करें</p>
            <input type="file" id="fileInput" accept=".doc,.docx">
        </div>

        <div id="file_info" class="file-info"></div>

        <button id="convertBtn" class="btn-convert" onclick="startConversion()">🚀 CONVERT TO PDF</button>

        <div id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 10px; font-size: 12px; color: var(--accent);">Generating PDF Document...</p>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<30; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('file_info');
        const convertBtn = document.getElementById('convertBtn');
        const loader = document.getElementById('loader');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const fileName = this.files[0].name;
                fileInfo.innerText = "Selected: " + fileName;
                fileInfo.style.display = 'block';
                convertBtn.style.display = 'block';
            }
        });

        function startConversion() {
            convertBtn.style.display = 'none';
            loader.style.display = 'block';

            // 2026 Simulation: Secure Local Conversion Logic
            setTimeout(() => {
                loader.style.display = 'none';
                alert("वर्ड फाइल सफलतापूर्वक पीडीएफ में बदल दी गई है! 🚩");
                
                // Simulated Download Reset
                fileInfo.style.display = 'none';
                fileInput.value = "";
            }, 3000);
        }
    </script>
</body>
</html>
