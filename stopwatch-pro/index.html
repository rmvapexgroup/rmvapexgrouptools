<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Stopwatch Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #6366f1; --s: #2dd4bf; --d: #0f172a; --bg: #f8fafc; --danger: #f43f5e; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; }
        
        /* Watermark */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(99, 102, 241, 0.04); z-index: -1; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border: 1px solid #eee; position: relative; overflow: hidden; text-align: center; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--d); font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; opacity: 0.6; transition: 0.3s; }
        .back-link:hover { opacity: 1; color: var(--p); transform: translateX(-3px); }

        h2 { color: var(--d); margin: 20px 0 5px; font-size: 1.8rem; font-weight: 800; }
        p.subtitle { color: #64748b; font-size: 0.8rem; font-weight: 700; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }

        .timer-display { font-family: 'JetBrains Mono', monospace; font-size: 2.8rem; font-weight: 800; color: var(--d); margin: 20px 0; background: #f1f5f9; padding: 25px 15px; border-radius: 25px; border: 2px solid #e2e8f0; letter-spacing: 1px; display: flex; justify-content: center; align-items: baseline; gap: 4px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05); }
        .timer-display span.ms { font-size: 1.4rem; color: var(--p); opacity: 0.9; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 16px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; border-bottom: 4px solid rgba(0,0,0,0.1); }
        
        .btn-start { background: var(--s); color: var(--d); }
        .btn-stop { background: var(--danger); }
        .btn-lap { background: var(--p); }
        .btn-reset { background: #64748b; }
        
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        button:active { transform: translateY(1px); border-bottom-width: 2px; }

        .laps-container { margin-top: 25px; max-height: 180px; overflow-y: auto; text-align: left; padding: 5px; background: #f8fafc; border-radius: 20px; border: 1px solid #e2e8f0; }
        .lap-item { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #edf2f7; font-size: 0.9rem; font-weight: 700; color: #475569; animation: slideIn 0.3s ease; font-family: 'JetBrains Mono', monospace; }
        .lap-item:last-child { border-bottom: none; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* --- Updated Support Section --- */
        .support-section { margin-top: 35px; padding-top: 25px; border-top: 1px solid #f1f5f9; text-align: center; }
        .support-btns { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 15px; }
        .kofi-btn { background: #29abe0; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(41,171,224,0.2); transition: 0.3s; }
        .kofi-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding-top: 15px; border-top: 1px solid #f8fafc; }

        /* Scrollbar Style */
        .laps-container::-webkit-scrollbar { width: 6px; }
        .laps-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <div class="back-nav">
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </div>

    <h2>⏱️ Stopwatch Pro</h2>
    <p class="subtitle">समय की हर एक इकाई का हिसाब 🚩</p>
    
    <div class="timer-display">
        <span id="display">00:00:00</span><span class="ms" id="msDisplay">.00</span>
    </div>

    <div class="btn-grid">
        <button class="btn-start" id="startBtn" onclick="start()"><i class="fas fa-play"></i> Start</button>
        <button class="btn-stop" id="stopBtn" onclick="stop()" style="display:none;"><i class="fas fa-pause"></i> Stop</button>
        <button class="btn-reset" onclick="reset()"><i class="fas fa-undo"></i> Reset</button>
        <button class="btn-lap" onclick="lap()"><i class="fas fa-flag"></i> Lap</button>
    </div>

    <div class="laps-container" id="laps">
        <div style="text-align: center; color: #94a3b8; padding: 20px; font-weight: 600; font-size: 0.8rem;">No laps recorded</div>
    </div>

    <div class="support-section">
        <p style="font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Support RMV APEX GROUP 🚩</p>
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank">
                <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=rameshmewalalvishwakarma&button_colour=FFDD00&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=ffffff" style="height: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(255, 221, 0, 0.2);">
            </a>

            <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="kofi-btn">
                <i class="fas fa-mug-hot"></i> Support on Ko-fi
            </a>
        </div>
    </div>

    <div class="footer-tag">Crafted by Ramesh Mewalal Vishwakarma 🚩</div>
</div>

<script>
    let startTime, elapsedTime = 0, timerInterval;

    function formatTime(time) {
        let diffInHrs = time / 3600000;
        let hh = Math.floor(diffInHrs);

        let diffInMin = (diffInHrs - hh) * 60;
        let mm = Math.floor(diffInMin);

        let diffInSec = (diffInMin - mm) * 60;
        let ss = Math.floor(diffInSec);

        let hhStr = hh.toString().padStart(2, "0");
        let mmStr = mm.toString().padStart(2, "0");
        let ssStr = ss.toString().padStart(2, "0");

        return `${hhStr}:${mmStr}:${ssStr}`;
    }

    function formatMS(time) {
        let ms = Math.floor((time % 1000) / 10);
        return "." + ms.toString().padStart(2, "0");
    }

    function start() {
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(() => {
            elapsedTime = Date.now() - startTime;
            document.getElementById("display").innerText = formatTime(elapsedTime);
            document.getElementById("msDisplay").innerText = formatMS(elapsedTime);
        }, 10);
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("stopBtn").style.display = "flex";
    }

    function stop() {
        clearInterval(timerInterval);
        document.getElementById("startBtn").style.display = "flex";
        document.getElementById("stopBtn").style.display = "none";
    }

    function reset() {
        clearInterval(timerInterval);
        elapsedTime = 0;
        document.getElementById("display").innerText = "00:00:00";
        document.getElementById("msDisplay").innerText = ".00";
        document.getElementById("laps").innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 20px; font-weight: 600; font-size: 0.8rem;">No laps recorded</div>';
        document.getElementById("startBtn").style.display = "flex";
        document.getElementById("stopBtn").style.display = "none";
    }

    function lap() {
        if (elapsedTime > 0) {
            const lapsBox = document.getElementById("laps");
            if (lapsBox.innerText.includes("No laps recorded")) lapsBox.innerHTML = "";
            
            let li = document.createElement("div");
            li.className = "lap-item";
            let fullTime = formatTime(elapsedTime) + formatMS(elapsedTime);
            li.innerHTML = `<span><i class="fas fa-stopwatch" style="color: var(--p); margin-right: 8px;"></i> Lap ${lapsBox.children.length + 1}</span><span>${fullTime}</span>`;
            lapsBox.prepend(li);
        }
    }
</script>
</body>
</html>
