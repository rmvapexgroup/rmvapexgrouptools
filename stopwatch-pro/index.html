<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Stopwatch Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #6366f1; --s: #2dd4bf; --d: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; overflow-x: hidden; }
        
        /* Premium Background Watermark */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(99, 102, 241, 0.04); z-index: -1; white-space: nowrap; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 450px; border: 1px solid #eee; position: relative; overflow: hidden; z-index: 1; text-align: center; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        h2 { color: var(--d); margin-bottom: 25px; font-size: 1.8rem; font-weight: 800; }

        .timer-display { font-family: monospace; font-size: 3.5rem; font-weight: 800; color: var(--d); margin: 30px 0; background: #f1f5f9; padding: 20px; border-radius: 20px; border: 2px solid #e2e8f0; letter-spacing: 2px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem; color: white; }
        .btn-start { background: var(--s); }
        .btn-stop { background: #f43f5e; }
        .btn-lap { background: var(--p); }
        .btn-reset { background: #64748b; }
        button:hover { transform: translateY(-3px); opacity: 0.9; }

        .laps-container { margin-top: 25px; max-height: 150px; overflow-y: auto; text-align: left; padding: 10px; background: #f8fafc; border-radius: 15px; border: 1px solid #e2e8f0; }
        .lap-item { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; font-weight: 600; color: #475569; }

        /* SUPPORT SECTION */
        .support-section { margin-top: 35px; padding-top: 20px; border-top: 1px solid #eee; }
        .support-btns { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
        .support-btn { padding: 10px 15px; border-radius: 12px; text-decoration: none; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .bmc-btn { background: #FFDD00; color: #000; }
        .kofi-btn { background: #29abe0; color: #fff; }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.75rem; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <h2>⏱️ Stopwatch Pro</h2>
    
    <div class="timer-display" id="display">00:00:00</div>

    <div class="btn-grid">
        <button class="btn-start" id="startBtn" onclick="start()">Start</button>
        <button class="btn-stop" id="stopBtn" onclick="stop()" style="display:none;">Stop</button>
        <button class="btn-lap" onclick="lap()">Lap</button>
        <button class="btn-reset" onclick="reset()">Reset</button>
    </div>

    <div class="laps-container" id="laps">
        </div>

    <div class="support-section">
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" class="support-btn bmc-btn" target="_blank"><i class="fas fa-coffee"></i> Coffee</a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" class="support-btn kofi-btn" target="_blank"><i class="fas fa-mug-hot"></i> Ko-fi</a>
        </div>
    </div>
    <div class="footer-tag">© 2026 RMV APEX GROUP 🚩</div>
</div>

<script>
    let startTime, elapsedTime = 0, timerInterval;

    function timeToString(time) {
        let diffInHrs = time / 3600000;
        let hh = Math.floor(diffInHrs);
        let diffInMin = (diffInHrs - hh) * 60;
        let mm = Math.floor(diffInMin);
        let diffInSec = (diffInMin - mm) * 60;
        let ss = Math.floor(diffInSec);
        let diffInMs = (diffInSec - ss) * 100;
        let ms = Math.floor(diffInMs);
        return `${mm.toString().padStart(2, "0")}:${ss.toString().padStart(2, "0")}:${ms.toString().padStart(2, "0")}`;
    }

    function start() {
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(() => {
            elapsedTime = Date.now() - startTime;
            document.getElementById("display").innerHTML = timeToString(elapsedTime);
        }, 10);
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("stopBtn").style.display = "inline-block";
    }

    function stop() {
        clearInterval(timerInterval);
        document.getElementById("startBtn").style.display = "inline-block";
        document.getElementById("stopBtn").style.display = "none";
    }

    function reset() {
        clearInterval(timerInterval);
        document.getElementById("display").innerHTML = "00:00:00";
        elapsedTime = 0;
        document.getElementById("laps").innerHTML = "";
        document.getElementById("startBtn").style.display = "inline-block";
        document.getElementById("stopBtn").style.display = "none";
    }

    function lap() {
        if (elapsedTime > 0) {
            let li = document.createElement("div");
            li.className = "lap-item";
            li.innerHTML = `<span>Lap ${document.getElementById("laps").children.length + 1}</span><span>${timeToString(elapsedTime)}</span>`;
            document.getElementById("laps").prepend(li);
        }
    }
</script>
</body>
</html>
