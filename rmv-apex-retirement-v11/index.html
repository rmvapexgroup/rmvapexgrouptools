<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Retirement Planner 🚩</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; overflow-x: hidden; }

        /* Branding Watermark */
        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.08; display: flex; flex-wrap: wrap; justify-content: space-around; align-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 45px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; max-width: 800px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 2px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; }
        
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .i-box { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; }
        .i-box label { font-size: 10px; color: var(--accent); display: block; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .i-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; font-weight: bold; }

        .btn-calc { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; margin-bottom: 15px; }
        
        #results { display: none; background: rgba(255,255,255,0.03); border: 1px dashed var(--accent); border-radius: 20px; padding: 25px; text-align: center; margin-top: 20px; }
        .res-big { font-size: 2.5rem; font-weight: 900; color: var(--success); margin: 10px 0; }
        .info-card { background: rgba(0,210,255,0.1); padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid rgba(0,210,255,0.2); }

        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 25px; }
        .act-btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #fff; font-size: 11px; }

        .sup-links { margin-top: 35px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 800px; }
        .s-btn { padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; text-align: center; font-size: 11px; }
        .footer { margin-top: 40px; font-size: 10px; opacity: 0.5; font-weight: bold; }
    </style>
</head>
<body onload="loadSavedData()">

    <div class="watermark-bg" id="wm"></div>

    <div class="container" id="printable">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>PROFESSIONAL RETIREMENT & PENSION PLANNER V11</p>
        </div>

        <div class="input-grid">
            <div class="i-box"><label>Current Age</label><input type="number" id="cur_age" placeholder="eg. 30"></div>
            <div class="i-box"><label>Retirement Age</label><input type="number" id="ret_age" value="60"></div>
            <div class="i-box"><label>Current Monthly Expense (₹)</label><input type="number" id="cur_exp" placeholder="eg. 40,000"></div>
            <div class="i-box"><label>Life Expectancy (Age)</label><input type="number" id="life_exp" value="85"></div>
            <div class="i-box"><label>Inflation Rate (%)</label><input type="number" id="infl" value="6"></div>
            <div class="i-box"><label>Post-Retire Return (%)</label><input type="number" id="post_ret_roi" value="8"></div>
        </div>

        <button class="btn-calc" onclick="calculateRetirement()">🚀 CALCULATE RETIREMENT FUND</button>

        <div id="results">
            <span style="font-size: 10px; opacity: 0.7; text-transform: uppercase;">Total Retirement Corpus Needed</span>
            <div class="res-big" id="corpus_val">₹0</div>
            
            <div class="info-card">
                <span style="font-size: 11px; color: var(--gold); font-weight: bold;">Monthly Expense at Retirement</span>
                <div style="font-size: 1.8rem; font-weight: 900;" id="future_exp">₹0</div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="i-box" style="text-align: left;"><label>Saving Period</label><b id="save_yrs">0 Years</b></div>
                <div class="i-box" style="text-align: left;"><label>Pension Period</label><b id="pension_yrs">0 Years</b></div>
            </div>
        </div>

        <div class="action-row">
            <button class="act-btn" style="background:#238636" onclick="saveData()">SAVE</button>
            <button class="act-btn" style="background:#4a5568" onclick="exportPDF()">PDF REPORT</button>
            <button class="act-btn" style="background:#c53030" onclick="resetForm()">CLEAR</button>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">☕ BUY ME A COFFEE</a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">❤️ SUPPORT ON KO-FI</a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<40; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function calculateRetirement() {
            const curAge = parseInt(document.getElementById('cur_age').value);
            const retAge = parseInt(document.getElementById('ret_age').value);
            const lifeExp = parseInt(document.getElementById('life_exp').value);
            const curExp = parseFloat(document.getElementById('cur_exp').value);
            const infl = parseFloat(document.getElementById('infl').value) / 100;
            const postROI = parseFloat(document.getElementById('post_ret_roi').value) / 100;

            if(!curAge || !curExp || retAge <= curAge) return alert("संख्याएं सही भरें! 🚩");

            const saveYears = retAge - curAge;
            const pensionYears = lifeExp - retAge;

            // 1. Calculate Future Monthly Expense at Retirement
            const futureMonthlyExp = curExp * Math.pow(1 + infl, saveYears);

            // 2. Calculate Real Rate of Return Post Retirement (Fisher Equation simplified)
            const realRate = (1 + postROI) / (1 + infl) - 1;

            // 3. Calculate Corpus using PV of Annuity Formula
            // Corpus = FutureExp * 12 * [ (1 - (1+r)^-n) / r ]
            const corpusNeeded = futureMonthlyExp * 12 * ((1 - Math.pow(1 + realRate, -pensionYears)) / realRate);

            document.getElementById('corpus_val').innerText = "₹" + Math.round(corpusNeeded).toLocaleString('en-IN');
            document.getElementById('future_exp').innerText = "₹" + Math.round(futureMonthlyExp).toLocaleString('en-IN') + " / mo";
            document.getElementById('save_yrs').innerText = saveYears + " Years";
            document.getElementById('pension_yrs').innerText = pensionYears + " Years";
            
            document.getElementById('results').style.display = 'block';
        }

        function exportPDF() {
            const element = document.getElementById('printable');
            html2pdf().from(element).set({
                margin: 10, filename: 'RMV_Retirement_Plan.pdf',
                html2canvas: { scale: 2, backgroundColor: '#05070a' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

        function saveData() {
            const d = { a:document.getElementById('cur_age').value, ra:document.getElementById('ret_age').value, e:document.getElementById('cur_exp').value, l:document.getElementById('life_exp').value };
            localStorage.setItem('rmv_ret_data', JSON.stringify(d));
            alert("Data Saved! 🚩");
        }

        function loadSavedData() {
            const s = localStorage.getItem('rmv_ret_data');
            if(s) {
                const d = JSON.parse(s);
                document.getElementById('cur_age').value = d.a;
                document.getElementById('ret_age').value = d.ra;
                document.getElementById('cur_exp').value = d.e;
                document.getElementById('life_exp').value = d.l;
            }
        }

        function resetForm() { localStorage.removeItem('rmv_ret_data'); location.reload(); }
    </script>
</body>
</html>
