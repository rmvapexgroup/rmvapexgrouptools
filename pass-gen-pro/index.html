<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #6366f1; --s: #a855f7; --d: #0f172a; --bg: #f8fafc; --success: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; }
        
        /* Watermark */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(99, 102, 241, 0.04); z-index: -1; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border: 1px solid #eee; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--d); font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; opacity: 0.6; transition: 0.3s; }
        .back-link:hover { opacity: 1; color: var(--p); transform: translateX(-3px); }

        h2 { color: var(--d); margin: 20px 0 25px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        
        .pass-display { background: #f1f5f9; padding: 22px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; border: 2px solid #e2e8f0; position: relative; }
        #passwordText { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 800; color: var(--d); word-break: break-all; letter-spacing: 1px; }
        .copy-icon { cursor: pointer; color: var(--p); font-size: 1.4rem; transition: 0.3s; padding-left: 15px; }
        .copy-icon:hover { transform: scale(1.2); color: var(--s); }

        /* Strength Meter */
        .strength-container { height: 6px; width: 100%; background: #e2e8f0; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #strengthBar { height: 100%; width: 0%; transition: 0.5s ease; border-radius: 10px; }

        .settings { background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 700; color: #475569; font-size: 0.9rem; }
        .setting-row:last-child { margin-bottom: 0; }

        input[type="range"] { width: 100%; height: 6px; background: #e2e8f0; border-radius: 5px; outline: none; accent-color: var(--p); cursor: pointer; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--p); cursor: pointer; border-radius: 6px; }
        
        .btn-gen { width: 100%; padding: 16px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; background: var(--p); color: white; font-size: 1rem; margin-top: 25px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-gen:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3); background: var(--s); }

        /* --- Updated Support Section --- */
        .support-section { margin-top: 35px; padding-top: 25px; border-top: 1px solid #f1f5f9; text-align: center; }
        .support-btns { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 15px; }
        .kofi-btn { background: #29abe0; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(41,171,224,0.2); transition: 0.3s; width: fit-content; }
        .kofi-btn:hover { transform: translateY(-2px); }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding-top: 15px; border-top: 1px solid #f8fafc; }

        /* Toast Alert */
        .toast { position: fixed; bottom: 30px; background: var(--d); color: white; padding: 12px 25px; border-radius: 50px; font-size: 0.9rem; font-weight: 700; display: none; animation: slideUp 0.3s ease; z-index: 100; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <div class="back-nav">
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </div>

    <h2>🔐 Secure Password Pro</h2>
    
    <div class="pass-display">
        <span id="passwordText">Gen3rating...</span>
        <i class="fas fa-copy copy-icon" onclick="copyPassword()" title="Copy Password"></i>
    </div>

    <div class="strength-container">
        <div id="strengthBar"></div>
    </div>

    <div class="settings">
        <div style="margin-bottom: 20px;">
            <div class="setting-row">
                <label>Password Length</label>
                <span id="lenValue" style="color: var(--p); font-size: 1.1rem;">16</span>
            </div>
            <input type="range" id="length" min="8" max="40" value="16" oninput="updateSettings()">
        </div>

        <div class="setting-row">
            <label><i class="fas fa-font" style="width: 20px;"></i> Uppercase (A-Z)</label>
            <input type="checkbox" id="upper" checked onchange="updateSettings()">
        </div>
        <div class="setting-row">
            <label><i class="fas fa-hashtag" style="width: 20px;"></i> Numbers (0-9)</label>
            <input type="checkbox" id="numbers" checked onchange="updateSettings()">
        </div>
        <div class="setting-row">
            <label><i class="fas fa-at" style="width: 20px;"></i> Symbols (!@#$)</label>
            <input type="checkbox" id="symbols" checked onchange="updateSettings()">
        </div>
    </div>
    
    <button class="btn-gen" onclick="generatePassword()">
        <i class="fas fa-sync-alt"></i> Generate Secure Password
    </button>

    <div class="support-section">
        <p style="font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Support RMV APEX GROUP 🚩</p>
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank">
                <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=rameshmewalalvishwakarma&button_colour=FFDD00&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=ffffff" style="height: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(255, 221, 0, 0.2);">
            </a>

            <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="kofi-btn">
                <i class="fas fa-mug-hot"></i> Support on Ko-fi
            </a>
        </div>
    </div>

    <div class="footer-tag">Crafted by Ramesh Mewalal Vishwakarma 🚩</div>
</div>

<div id="toast" class="toast">Password Copied! 🚩</div>

<script>
    function updateSettings() {
        document.getElementById('lenValue').innerText = document.getElementById('length').value;
        generatePassword();
    }

    function generatePassword() {
        const length = parseInt(document.getElementById('length').value);
        const hasUpper = document.getElementById('upper').checked;
        const hasNumber = document.getElementById('numbers').checked;
        const hasSymbol = document.getElementById('symbols').checked;

        const lower = "abcdefghijklmnopqrstuvwxyz";
        const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const nums = "0123456789";
        const syms = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        let charSet = lower;
        if (hasUpper) charSet += upper;
        if (hasNumber) charSet += nums;
        if (hasSymbol) charSet += syms;

        if (charSet === "") {
            document.getElementById('passwordText').innerText = "Select Options!";
            return;
        }

        let generatedPassword = "";
        for (let i = 0; i < length; i++) {
            const randomIndex = Math.floor(Math.random() * charSet.length);
            generatedPassword += charSet[randomIndex];
        }

        document.getElementById('passwordText').innerText = generatedPassword;
        calculateStrength(length, hasUpper, hasNumber, hasSymbol);
    }

    function calculateStrength(len, u, n, s) {
        let score = 0;
        if (len >= 12) score += 25;
        if (len >= 16) score += 15;
        if (u) score += 20;
        if (n) score += 20;
        if (s) score += 20;

        const bar = document.getElementById('strengthBar');
        bar.style.width = score + "%";

        if (score <= 40) bar.style.background = "#ef4444"; // Weak
        else if (score <= 70) bar.style.background = "#f59e0b"; // Medium
        else bar.style.background = "#10b981"; // Strong
    }

    async function copyPassword() {
        const text = document.getElementById('passwordText').innerText;
        if (text === "Select Options!" || text === "Gen3rating...") return;
        
        try {
            await navigator.clipboard.writeText(text);
            showToast();
        } catch (err) {
            console.error("Failed to copy!");
        }
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.display = "block";
        setTimeout(() => { toast.style.display = "none"; }, 2000);
    }

    // Initial Generate
    window.onload = generatePassword;
</script>
</body>
</html>
