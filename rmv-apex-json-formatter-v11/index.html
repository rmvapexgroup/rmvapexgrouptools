<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | JSON Formatter 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #f1c40f; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --white: #ffffff; --error: #e74c3c; --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Fira Code', 'Courier New', monospace; background: var(--bg); color: var(--white); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.05; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 50px; color: var(--white); }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 30px; width: 100%; max-width: 950px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 1px; font-family: 'Segoe UI', sans-serif; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; }

        .editor-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 400px; background: #000; border: 1px solid #333; border-radius: 15px; padding: 15px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; resize: none; line-height: 1.5; }
        textarea:focus { border-color: var(--accent); }
        
        pre { width: 100%; height: 400px; background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 15px; color: var(--success); font-size: 14px; overflow: auto; white-space: pre-wrap; line-height: 1.5; }

        .btn-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-tool { padding: 12px 20px; border: none; border-radius: 10px; background: #222; color: #fff; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; border: 1px solid #333; }
        .btn-tool:hover { background: var(--accent); color: #000; transform: translateY(-2px); }

        #msg { padding: 10px; border-radius: 10px; font-size: 12px; margin-bottom: 15px; display: none; text-align: center; font-weight: bold; }
        .msg-error { background: rgba(231, 76, 60, 0.2); color: var(--error); border: 1px solid var(--error); }
        .msg-success { background: rgba(46, 204, 113, 0.2); color: var(--success); border: 1px solid var(--success); }

        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 950px; margin-bottom: 20px; font-family: 'Segoe UI', sans-serif; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; font-family: 'Segoe UI', sans-serif; }
        @media (max-width: 768px) { .editor-area { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Smart AI JSON Formatter & Validator V11</p>
        </div>

        <div id="msg"></div>

        <div class="btn-bar">
            <button class="btn-tool" onclick="formatJSON()">✨ FORMAT JSON</button>
            <button class="btn-tool" onclick="minifyJSON()">📉 MINIFY</button>
            <button class="btn-tool" onclick="copyResult()">📋 COPY RESULT</button>
            <button class="btn-tool" style="background: var(--error);" onclick="clearAll()">❌ CLEAR</button>
        </div>

        <div class="editor-area">
            <textarea id="jsonInput" placeholder='अपना RAW JSON यहाँ पेस्ट करें... उदाहरण: {"name":"RMV APEX","status":"active"}'></textarea>
            <pre id="jsonOutput">सुंदर JSON परिणाम यहाँ दिखेगा...</pre>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<30; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        const input = document.getElementById('jsonInput');
        const output = document.getElementById('jsonOutput');
        const msg = document.getElementById('msg');

        function showMsg(text, type) {
            msg.innerText = text;
            msg.className = type === 'error' ? 'msg-error' : 'msg-success';
            msg.style.display = 'block';
        }

        function formatJSON() {
            try {
                const raw = input.value.trim();
                if(!raw) return;
                const obj = JSON.parse(raw);
                output.innerText = JSON.stringify(obj, null, 4);
                showMsg("Valid JSON: सफलतापूर्वक फॉर्मेट किया गया! 🚩", "success");
            } catch (e) {
                output.innerText = "Error: " + e.message;
                showMsg("Invalid JSON: कृपया अपना कोड चेक करें! 🚩", "error");
            }
        }

        function minifyJSON() {
            try {
                const raw = input.value.trim();
                if(!raw) return;
                const obj = JSON.parse(raw);
                output.innerText = JSON.stringify(obj);
                showMsg("Minified: स्पेस हटा दिए गए हैं! 🚩", "success");
            } catch (e) {
                showMsg("Error: मिनीफाई करने में विफल! 🚩", "error");
            }
        }

        function copyResult() {
            const text = output.innerText;
            navigator.clipboard.writeText(text);
            alert("परिणाम क्लिपबोर्ड पर कॉपी हो गया है! 🚩");
        }

        function clearAll() {
            input.value = "";
            output.innerText = "सुंदर JSON परिणाम यहाँ दिखेगा...";
            msg.style.display = 'none';
        }
    </script>
</body>
</html>
