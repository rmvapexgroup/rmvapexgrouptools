<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #f59e0b; --d: #000000; --panel: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--d); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; position: relative; overflow: hidden; }
        
        /* 🚩 COPYRIGHT WATERMARK */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 12vw, 6rem); font-weight: 900; color: rgba(255, 255, 255, 0.04); z-index: 0; white-space: nowrap; pointer-events: none; text-transform: uppercase; letter-spacing: 12px; }

        .card { background: var(--panel); padding: 35px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); width: 100%; max-width: 480px; position: relative; z-index: 10; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, #f59e0b, #d97706); border-radius: 35px 35px 0 0; }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: #000; font-weight: 800; font-size: 0.7rem; opacity: 0.4; }

        h2 { font-weight: 800; font-size: 1.6rem; text-align: center; margin: 10px 0 5px; color: #000; }
        .tagline { display: block; text-align: center; color: #64748b; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 800; color: #64748b; font-size: 0.7rem; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; font-weight: 700; box-sizing: border-box; }
        input:focus { border-color: #f59e0b; }

        .res-box { background: #fffcf5; padding: 20px; border-radius: 20px; border: 2px dashed #f59e0b; margin-bottom: 20px; display: none; }
        .res-val { color: #d97706; font-size: 1.5rem; font-weight: 900; text-align: center; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.8rem; }
        .btn-calc { background: #000; color: #fff; grid-column: span 2; margin-bottom: 5px; }

        .support-section { margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; text-align: center; }
        .support-btns { display: flex; justify-content: center; gap: 10px; margin-top: 8px; }
        .s-btn { padding: 8px 12px; border-radius: 10px; text-decoration: none; font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .bmc { background: #FFDD00; color: #000; } .kofi { background: #29abe0; color: #fff; }

        .footer { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #94a3b8; font-weight: 800; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RAMESH MEWALAL VISHWAKARMA</div>

<div class="card">
    <div class="back-nav"><a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> BACK</a></div>
    <h2>📈 Investment Pro</h2>
    <span class="tagline">RMV APEX GROUP • STRATEGIC WEALTH</span>

    <div class="input-group">
        <label>Principal Amount</label>
        <input type="number" id="p" placeholder="₹ 0.00">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group"><label>Rate (%)</label><input type="number" id="r" placeholder="12"></div>
        <div class="input-group"><label>Years</label><input type="number" id="t" placeholder="5"></div>
    </div>

    <button class="btn btn-calc" onclick="calc()"><i class="fas fa-chart-line"></i> CALCULATE</button>

    <div class="res-box" id="box"><div class="res-val" id="total">₹ 0.00</div></div>

    <div class="btn-grid">
        <button class="btn" style="background:#f1f5f9" onclick="copy()"><i class="fas fa-copy"></i> Copy</button>
        <button class="btn" style="background:#fef3c7" onclick="save()"><i class="fas fa-save"></i> Save</button>
        <button class="btn" style="background:#ecfdf5" onclick="down()"><i class="fas fa-download"></i> PDF</button>
        <button class="btn" style="background:#fff1f2" onclick="clr()"><i class="fas fa-eraser"></i> Clear</button>
    </div>

    <div class="support-section">
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" class="s-btn bmc" target="_blank"><i class="fas fa-coffee"></i> Coffee</a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" class="s-btn kofi" target="_blank"><i class="fas fa-mug-hot"></i> Ko-fi</a>
        </div>
    </div>

    <div class="footer">© 2026 RAMESH MEWALAL VISHWAKARMA 🚩</div>
</div>

<script>
    function calc() {
        const p = parseFloat(document.getElementById('p').value), r = parseFloat(document.getElementById('r').value), t = parseFloat(document.getElementById('t').value);
        if(isNaN(p)) return;
        const res = p + (p * r * t / 100);
        document.getElementById('total').innerText = "₹ " + res.toLocaleString('en-IN');
        document.getElementById('box').style.display = "block";
    }
    function copy() { navigator.clipboard.writeText(document.getElementById('total').innerText); alert("Copied! 🚩"); }
    function clr() { document.getElementById('p').value=""; document.getElementById('box').style.display="none"; }
</script>
</body>
</html>
