<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | RD Master 🚩</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; overflow-x: hidden; }

        /* Branding Watermark */
        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.08; display: flex; flex-wrap: wrap; justify-content: space-around; align-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 45px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; max-width: 750px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 2px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; }
        
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .i-box { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; }
        .i-box label { font-size: 10px; color: var(--accent); display: block; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .i-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; font-weight: bold; }

        .btn-calc { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; margin-bottom: 15px; }
        
        #results { display: none; background: rgba(255,255,255,0.03); border: 1px dashed var(--accent); border-radius: 20px; padding: 25px; text-align: center; margin-top: 20px; }
        .res-big { font-size: 2.8rem; font-weight: 900; color: var(--success); margin: 10px 0; }
        
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 25px; }
        .act-btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #fff; font-size: 11px; }

        .sup-links { margin-top: 35px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 750px; }
        .s-btn { padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; text-align: center; font-size: 11px; }
        .footer { margin-top: 40px; font-size: 10px; opacity: 0.5; font-weight: bold; }
    </style>
</head>
<body onload="loadData()">

    <div class="watermark-bg" id="wm"></div>

    <div class="container" id="printable">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>RECURRING DEPOSIT (RD) CALCULATOR V11</p>
        </div>

        <div class="input-grid">
            <div class="i-box"><label>Monthly Deposit (₹)</label><input type="number" id="monthly_amt" placeholder="eg. 2000"></div>
            <div class="i-box"><label>Interest Rate (%)</label><input type="number" id="roi" placeholder="eg. 7.0"></div>
            <div class="i-box" style="grid-column: span 2;"><label>Tenure (Years)</label><input type="number" id="years" placeholder="eg. 3"></div>
        </div>

        <button class="btn-calc" onclick="calculateRD()">🚀 CALCULATE MATURITY VALUE</button>

        <div id="results">
            <span style="font-size: 10px; opacity: 0.7; text-transform: uppercase;">Maturity Amount</span>
            <div class="res-big" id="maturity_val">₹0</div>
            
            <div class="detail-row"><span>Total Amount Invested:</span><b id="total_invested">₹0</b></div>
            <div class="detail-row"><span>Total Interest Earned:</span><b id="int_earned" style="color:var(--gold)">₹0</b></div>
            <div class="detail-row"><span>Wealth Growth:</span><b id="growth_pct" style="color:var(--accent)">0%</b></div>
        </div>

        <div class="action-row">
            <button class="act-btn" style="background:#238636" onclick="save()">SAVE</button>
            <button class="act-btn" style="background:#4a5568" onclick="pdf()">REPORT PDF</button>
            <button class="act-btn" style="background:#c53030" onclick="reset()">CLEAR</button>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">☕ BUY ME A COFFEE</a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">❤️ SUPPORT ON KO-FI</a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<40; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function calculateRD() {
            const P = parseFloat(document.getElementById('monthly_amt').value);
            const r = parseFloat(document.getElementById('roi').value) / 100;
            const t = parseFloat(document.getElementById('years').value);
            
            if(!P || !r || !t) return alert("संख्याएं भरें! 🚩");

            // Standard Indian Bank RD Formula:
            // M = R [ (1+i)^n - 1 ] / [ 1 - (1+i)^(-1/3) ] 
            // Simplified banking logic used for accurate results
            const n = t * 12; // months
            const i = r / 4; // quarterly interest rate
            
            let maturityValue = 0;
            for(let j = 0; j < n; j++) {
                // Each monthly installment earns interest for different periods
                // Compounded quarterly as per Indian banking rules
                maturityValue += P * Math.pow((1 + i), (n - j) / 3);
            }

            const totalInvested = P * n;
            const totalInterest = maturityValue - totalInvested;
            const growth = (totalInterest / totalInvested) * 100;

            document.getElementById('maturity_val').innerText = "₹" + Math.round(maturityValue).toLocaleString('en-IN');
            document.getElementById('total_invested').innerText = "₹" + Math.round(totalInvested).toLocaleString('en-IN');
            document.getElementById('int_earned').innerText = "₹" + Math.round(totalInterest).toLocaleString('en-IN');
            document.getElementById('growth_pct').innerText = growth.toFixed(2) + "%";
            
            document.getElementById('results').style.display = 'block';
        }

        function pdf() {
            const element = document.getElementById('printable');
            html2pdf().from(element).set({
                margin: 10, filename: 'RMV_RD_Report.pdf',
                html2canvas: { scale: 2, backgroundColor: '#05070a' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

        function save() {
            const d = { p:document.getElementById('monthly_amt').value, r:document.getElementById('roi').value, t:document.getElementById('years').value };
            localStorage.setItem('rmv_rd_data', JSON.stringify(d));
            alert("Data Saved! 🚩");
        }

        function loadData() {
            const s = localStorage.getItem('rmv_rd_data');
            if(s) {
                const d = JSON.parse(s);
                document.getElementById('monthly_amt').value = d.p;
                document.getElementById('roi').value = d.r;
                document.getElementById('years').value = d.t;
            }
        }

        function reset() { localStorage.removeItem('rmv_rd_data'); location.reload(); }
    </script>
</body>
</html>
