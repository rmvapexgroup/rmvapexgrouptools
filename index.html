<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Global Digital HQ</title>
    <style>
        :root { 
            --primary: #ff4d4d; --gold: #d4af37; --dark: #0f172a; 
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.95);
        }
        * { box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--dark); user-select: none; }
        
        .header { 
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%); 
            color: white; padding: 70px 20px; text-align: center; border-bottom: 6px solid var(--gold);
        }
        .header h1 { margin: 0; font-size: 3rem; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        .container { max-width: 1000px; margin: -40px auto 50px; padding: 0 20px; }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

        .hub-card { 
            background: var(--glass); padding: 35px; border-radius: 28px; 
            text-align: center; text-decoration: none; color: var(--dark); 
            border: 1px solid rgba(0,0,0,0.05); backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); display: block;
        }
        .hub-card:hover { transform: translateY(-10px); border-color: var(--gold); background: #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .icon-circle { width: 70px; height: 70px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 20px; }

        .footer { background: var(--dark); color: white; text-align: center; padding: 50px; border-top: 5px solid var(--gold); }
    </style>
</head>
<body oncontextmenu="return false;">

    <header class="header">
        <h1>RMV APEX GROUP</h1>
        <p style="letter-spacing: 3px; font-weight: bold; color: #94a3b8;">One Life • 9 Paths • Unlimited Growth</p>
    </header>

    <div class="container">
        <div class="hub-grid">
            <a href="life-calc.html" class="hub-card">
                <div class="icon-circle">⏳</div>
                <h3>Life & Age Hub</h3>
                <p>Advanced Age & Life Analytics</p>
            </a>
            
            <a href="financial-hub.html" class="hub-card">
                <div class="icon-circle">⚖️</div>
                <h3>Financial Hub</h3>
                <p>GST, Tax & Wealth Suite</p>
            </a>

            <a href="https://about.me/rmvapexgroup" target="_blank" class="hub-card">
                <div class="icon-circle">👤</div>
                <h3>About Me</h3>
                <p>Visionary Profile & Bio</p>
            </a>

            <a href="contact.html" class="hub-card">
                <div class="icon-circle">📞</div>
                <h3>Contact Desk</h3>
                <p>Official Support Hub</p>
            </a>
        </div>
    </div>

    <footer class="footer">
        <div style="color:var(--gold); font-weight:900; font-size:1.8rem; margin-bottom: 10px;">RMV APEX GROUP</div>
        <p>© 2026 | Designed & Developed by Ramesh Mewalal Vishwakarma</p>
    </footer>

</body>
</html>
