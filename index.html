        .header { background: var(--dark); padding: 100px 20px; text-align: center; border-bottom: 5px solid; border-image: var(--gradient) 1; }
        .header h1 { margin: 0; font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #searchBar { width: 100%; padding: 25px 35px; border-radius: 30px; border: none; box-shadow: 0 20px 50px rgba(0,0,0,0.1); font-size: 1.1rem; outline: none; border: 2px solid transparent; font-weight: 600; }
        #searchBar:focus { border-color: var(--primary); transform: translateY(-3px); }

        /* TOOL GRID */
        .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; margin-top: 60px; }
        .tool-card { background: white; padding: 40px 30px; border-radius: 35px; text-align: center; text-decoration: none; color: var(--dark); border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: center; }
        .tool-card:hover { transform: translateY(-12px); box-shadow: 0 30px 60px rgba(99, 102, 241, 0.15); border-color: var(--primary); }
        .tool-card .icon { font-size: 3.8rem; margin-bottom: 20px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }
        .tool-card h3 { margin: 0; font-size: 1.4rem; font-weight: 800; }

        /* MASTER FOOTER */
        footer { background: white; padding: 100px 20px 60px; border-top: 1px solid #f1f5f9; text-align: center; margin-top: 100px; border-radius: 60px 60px 0 0; }
        .footer-logo { font-size: 2.2rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
        
        .social-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 1100px; margin: 0 auto 50px; }
        .s-link { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 14px; color: white; text-decoration: none; font-size: 1.3rem; transition: 0.4s; }
        .s-link:hover { transform: translateY(-8px) rotate(8deg); box-shadow: 0 15px 30px rgba(0,0,0,0.15); filter: brightness(1.1); }

        /* Unified Social Colors */
        .wa { background: #25D366; } .fb { background: #1877F2; } .ig { background: #E4405F; } .yt { background: #FF0000; }
        .li { background: #0A66C2; } .tg { background: #26A5E4; } .rd { background: #FF4500; } .tw { background: #000000; }
        .pi { background: #BD081C; } .md { background: #000000; } .ms { background: #0084ff; } .bs { background: #0085ff; }
        .bl { background: #f57d00; } .sp { background: #3f3df4; } .mc { background: #FFDD00; color: black !important; } 
        .kofi { background: #29abe0; } .gemini { background: linear-gradient(45deg, #1a73e8, #9b51e0); }
        .link-alt { background: var(--primary); } .sub { background: #ff6719; } .th { background: #000000; }

        /* Legal Links */
        .legal-links { margin-bottom: 30px; font-weight: 800; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .legal-links a { color: #64748b; text-decoration: none; font-size: 0.95rem; }
        .legal-links a:hover { color: var(--primary); }

        .copyright { color: #94a3b8; font-size: 0.9rem; margin-top: 40px; font-weight: 600; letter-spacing: 0.5px; line-height: 1.8; }
        .heart { color: var(--secondary); animation: beat 0.5s infinite alternate; display: inline-block; }
        @keyframes beat { to { transform: scale(1.4); } }

        { name: "EMI Calculator Pro", path: "emi-calculator", icon: "💰" },
        { name: "Loan Engine Pro", path: "advanced-loan-pro", icon: "🏦" },
        { name: "YT Thumbnail Pro", path: "yt-thumbnail", icon: "🖼️" },
        { name: "Finance Suite Pro", path: "finance-suite", icon: "💰" },
        { name: "Ultimate Finance Master Pro", path: "finance-ultimate", icon: "💎" },
        { name: "Bank Details Pro Max", path: "bank-details-pro-max", icon: "💎" },
        { name: "Smart Address Finder", path: "smart-address-finder", icon: "📍" },
        { name: "Pro Amortization Hub V11", path: "rmv-apex-calculator-v11", icon: "📊" },
        { name: "CIBIL Smart Eligibility", path: "rmv-apex-eligibility-v11", icon: "📊" },
        { name: "SIP Mutual Fund Calculator", path: "rmv-apex-sip-v11", icon: "📈" },
        
    ];

    const grid = document.getElementById('toolGrid');

    // Load Tools with Folder Logic
    function loadTools() {
        MY_TOOLS.forEach(tool => {
            const card = document.createElement('a');
            // Important: This path structure requires folders named exactly as 'path'
            card.href = tool.path + "/index.html"; 
            card.className = "tool-card";
            card.setAttribute('data-search', tool.name.toLowerCase());
            card.innerHTML = `<div class="icon">${tool.icon}</div><h3>${tool.name}</h3>`;
            grid.appendChild(card);
        });
    }

    // Advanced Filter Function
    function filterTools() {
        let input = document.getElementById('searchBar').value.toLowerCase();
        let cards = document.getElementsByClassName('tool-card');
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].getAttribute('data-search');
            cards[i].style.display = name.includes(input) ? "flex" : "none";
        }
    }

    // Loader & Window Control
    window.onload = () => {
        loadTools();
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 600);
        }, 1200);
    };
</script>
