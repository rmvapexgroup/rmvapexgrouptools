<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Global Digital HQ</title>
    <style>
        :root { 
            --primary: #4f46e5; --secondary: #10b981; --dark: #0f172a; 
            --gold: #d4af37; --bg: #f8fafc; --accent: #ff4d4d;
            --wa: #25D366; --fb: #1877F2; --mail: #ea4335;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); margin: 0; padding: 0; user-select: none; color: var(--dark); overflow-x: hidden; }
        
        /* HEADER SECTION */
        .header { 
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%); 
            color: white; padding: 60px 20px; text-align: center; border-bottom: 6px solid var(--gold);
        }
        .header h1 { margin: 0; font-size: clamp(2rem, 6vw, 3rem); background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .tagline { margin-top: 10px; letter-spacing: 3px; font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; font-weight: bold; }

        /* MAIN MASTER CARD */
        .container { max-width: 700px; margin: -40px auto 50px; padding: 0 15px; position: relative; z-index: 10; }
        .master-card { background: #fff; border-radius: 35px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.12); border-top: 10px solid var(--primary); }

        /* NAVIGATION TABS */
        .nav-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .t-btn { padding: 12px 20px; border: none; background: #f1f5f9; border-radius: 15px; cursor: pointer; font-weight: 800; color: #64748b; white-space: nowrap; font-size: 0.8rem; }
        .t-btn.active { background: var(--primary); color: white; box-shadow: 0 8px 15px rgba(79, 70, 229, 0.2); }

        /* CALCULATOR MODULES */
        .calc-module { display: none; animation: fadeIn 0.4s ease; }
        .active-module { display: block; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 0.85rem; color: #475569; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 14px; outline: none; background: #f8fafc; font-size: 1rem; }
        input:focus { border-color: var(--primary); background: #fff; }

        .btn-calc { width: 100%; padding: 16px; border: none; background: linear-gradient(135deg, var(--primary), #818cf8); color: white; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        
        .results { margin-top: 20px; padding: 20px; background: #f0fdf4; border-radius: 20px; border: 1px solid #dcfce7; display: none; }
        .res-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #cbd5e1; font-size: 0.95rem; }
        .res-line:last-child { border-bottom: none; }

        /* SOCIAL CONNECTIVITY SUITE */
        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 30px; border-top: 2px solid #f1f5f9; padding-top: 20px; }
        .s-link { text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; font-size: 0.7rem; font-weight: 800; color: white; }

        /* FOOTER */
        .footer { background: var(--dark); color: white; text-align: center; padding: 50px 20px; border-top: 6px solid var(--gold); }
        .wm { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 4rem; opacity: 0.03; font-weight: 900; pointer-events: none; z-index: 1; color: #000; width: 100%; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="wm">RMV APEX GROUP</div>

    <header class="header">
        <h1>RMV APEX GROUP</h1>
        <div class="tagline">One Life • 9 Paths • Unlimited Growth</div>
    </header>

    <div class="container">
        <div class="master-card">
            <div class="nav-tabs">
                <button class="t-btn active" onclick="showTab('gst', this)">Universal GST</button>
                <button class="t-btn" onclick="showTab('age', this)">Age & Life</button>
                <button class="t-btn" onclick="showTab('wealth', this)">Wealth Hub</button>
                <button class="t-btn" onclick="showTab('tax', this)">Income Tax</button>
                <button class="t-btn" onclick="showTab('date', this)">Date Calc</button>
            </div>

            <div id="gst" class="calc-module active-module">
                <div class="input-group"><label>Amount (₹)</label><input type="number" id="gstAmt" placeholder="0.00"></div>
                <div class="input-group">
                    <label>GST Rate (%)</label>
                    <select id="gstRate">
                        <option value="5">5%</option><option value="12">12%</option><option value="18" selected>18%</option><option value="28">28%</option>
                    </select>
                </div>
                <button class="btn-calc" onclick="runGST()">Calculate GST ⚡</button>
            </div>

            <div id="age" class="calc-module">
                <div class="input-group"><label>Birth Date</label><input type="date" id="dob"></div>
                <button class="btn-calc" onclick="runAge()">Reveal Life Secrets 🎂</button>
            </div>

            <div id="wealth" class="calc-module">
                <div class="input-group"><label>Monthly Investment (₹)</label><input type="number" id="wAmt"></div>
                <div class="input-group"><label>Return Rate (%)</label><input type="number" id="wRate" value="12"></div>
                <div class="input-group"><label>Years</label><input type="number" id="wYears" value="10"></div>
                <button class="btn-calc" onclick="runWealth()">Future Value 📈</button>
            </div>

            <div id="tax" class="calc-module">
                <div class="input-group"><label>Annual Income (₹)</label><input type="number" id="taxInc" placeholder="Ex: 12,00,000"></div>
                <button class="btn-calc" onclick="runTax()">Estimate Tax 🏛️</button>
            </div>

            <div id="date" class="calc-module">
                <div class="input-group"><label>Start Date</label><input type="date" id="dStart"></div>
                <div class="input-group"><label>Days to Add/Sub</label><input type="number" id="daysDiff" placeholder="Ex: 30 or -30"></div>
                <button class="btn-calc" onclick="runDate()">Adjust Date 📅</button>
            </div>

            <div id="resBox" class="results"></div>

            <div class="social-grid">
                <a href="https://wa.me/918652025006" target="_blank" class="s-link" style="background: var(--wa);">WhatsApp</a>
                <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-link" style="background: #29abe0;">Ko-fi</a>
                <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-link" style="background: #FFDD00; color: black;">Coffee</a>
                <a href="https://www.facebook.com/rmvapexgroups/" target="_blank" class="s-link" style="background: var(--fb);">Facebook</a>
                <a href="https://about.me/rmvapexgroup" target="_blank" class="s-link" style="background: var(--aboutme);">About Me</a>
                <a href="mailto:rmvapexgroup@gmail.com" class="s-link" style="background: var(--mail);">Email</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div style="font-size: 1.8rem; font-weight: 900; color: var(--gold);">RMV APEX GROUP</div>
        <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 10px;">Designed & Developed by Ramesh Mewalal Vishwakarma</p>
        <p style="font-size: 0.7rem; color: var(--gold); margin-top: 20px;">© 2026 | One Life • 9 Paths • Unlimited Growth</p>
    </footer>

    <script>
        function showTab(id, btn) {
            document.querySelectorAll('.calc-module').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
            document.getElementById('resBox').style.display = 'none';
        }

        function runGST() {
            const a = parseFloat(document.getElementById('gstAmt').value);
            const r = parseFloat(document.getElementById('gstRate').value);
            if(!a) return;
            const t = (a * r) / 100;
            showRes(`<div class="res-line"><span>Net Amount:</span><b>₹${a}</b></div><div class="res-line"><span>GST (${r}%):</span><b>₹${t}</b></div><div class="res-line" style="color:var(--primary); font-weight:bold;"><span>Total Bill:</span><b>₹${a+t}</b></div>`);
        }

        function runAge() {
            const b = new Date(document.getElementById('dob').value);
            if(!b.getTime()) return;
            const n = new Date();
            let y = n.getFullYear() - b.getFullYear();
            let m = n.getMonth() - b.getMonth();
            if (m < 0) { y--; m += 12; }
            const d = Math.floor((n - b) / (1000*60*60*24));
            showRes(`<div class="res-line"><span>Current Age:</span><b>${y} Years, ${m} Months</b></div><div class="res-line"><span>Days Lived:</span><b>${d.toLocaleString()} Days</b></div><div class="res-line"><span>Heart Beats:</span><b>~${(d*100000).toLocaleString()}</b></div>`);
        }

        function runWealth() {
            const p = parseFloat(document.getElementById('wAmt').value);
            const r = (parseFloat(document.getElementById('wRate').value) / 12) / 100;
            const n = parseFloat(document.getElementById('wYears').value) * 12;
            if(!p) return;
            const fv = p * ((Math.pow(1 + r, n) - 1) / r) * (1 + r);
            showRes(`<div class="res-line"><span>Total Invested:</span><b>₹${(p*n).toLocaleString()}</b></div><div class="res-line" style="color:var(--secondary);"><span>Future Wealth:</span><b>₹${Math.round(fv).toLocaleString()}</b></div>`);
        }

        function runTax() {
            const i = parseFloat(document.getElementById('taxInc').value);
            if(!i) return;
            let t = 0;
            if(i > 1500000) t = i * 0.20; else if(i > 700000) t = i * 0.10;
            showRes(`<div class="res-line"><span>Estimated Tax:</span><b>₹${t.toLocaleString()}</b></div><div class="res-line"><span>Monthly Saving:</span><b>₹${Math.round((i-t)/12).toLocaleString()}</b></div>`);
        }

        function runDate() {
            const s = new Date(document.getElementById('dStart').value);
            const d = parseInt(document.getElementById('daysDiff').value);
            if(!s.getTime() || isNaN(d)) return;
            s.setDate(s.getDate() + d);
            showRes(`<div class="res-line"><span>Resulting Date:</span><b>${s.toDateString()}</b></div>`);
        }

        function showRes(html) {
            const rb = document.getElementById('resBox');
            rb.innerHTML = html; rb.style.display = 'block';
        }
    </script>
</body>
</html>
