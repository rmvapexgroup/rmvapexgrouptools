        :root { 
            --primary: #6366f1; --secondary: #f43f5e; --dark: #0f172a; --light: #f8fafc;
            --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #f43f5e 100%);
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        body { background: var(--light); margin: 0; padding: 0; user-select: none; color: var(--dark); overflow-x: hidden; }

        /* HEADER */
        .header { background: var(--dark); padding: 80px 20px; text-align: center; border-bottom: 5px solid; border-image: var(--gradient) 1; }
        .header h1 { margin: 0; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: white; opacity: 0.9; margin-top: 10px; font-size: 1.1rem; letter-spacing: 1px; }

        /* CONTAINER & SEARCH */
        .container { max-width: 1200px; margin: -40px auto 60px; padding: 0 20px; }
        #searchBar { width: 100%; padding: 22px 30px; border-radius: 25px; border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.1); font-size: 1.1rem; outline: none; border: 2px solid transparent; }
        #searchBar:focus { border-color: var(--primary); }

        /* TOOL GRID */
        .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; margin-top: 50px; }
        .tool-card { background: white; padding: 35px 25px; border-radius: 30px; text-align: center; text-decoration: none; color: var(--dark); border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        .tool-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(99, 102, 241, 0.15); border-color: var(--primary); }
        .tool-card .icon { font-size: 3.5rem; margin-bottom: 15px; }
        .tool-card h3 { margin: 0; font-size: 1.3rem; font-weight: 700; }

        /* SOCIAL GRID */
        footer { background: white; padding: 80px 20px; border-top: 1px solid #eee; text-align: center; margin-top: 80px; }
        .footer-logo { font-size: 2rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        
        .social-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 1000px; margin: 0 auto 40px; }
        .s-link { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 10px; color: white; text-decoration: none; font-size: 1.2rem; transition: 0.3s; }
        .s-link:hover { transform: translateY(-5px) scale(1.1); filter: brightness(1.2); }

        /* Brand Colors */
        .wa { background: #25D366; } .fb { background: #1877F2; } .ig { background: #E4405F; } .yt { background: #FF0000; }
        .li { background: #0A66C2; } .tg { background: #26A5E4; } .rd { background: #FF4500; } .tw { background: #000000; }
        .pi { background: #BD081C; } .md { background: #000000; } .ms { background: #2b90d9; } .bs { background: #0085ff; }
        .bl { background: #f57d00; } .sp { background: #3f3df4; } .mc { background: #FFDD00; color: black; } 
        .kofi { background: #29abe0; } .gemini { background: linear-gradient(45deg, #1a73e8, #9b51e0); }
        .link-alt { background: var(--primary); }

        .copyright { color: #64748b; font-size: 0.95rem; margin-top: 30px; line-height: 1.6; }
        .heart { color: var(--secondary); animation: beat 0.4s infinite alternate; display: inline-block; }
        @keyframes beat { to { transform: scale(1.3); } }

<script>
    const MY_TOOLS = [
        { name: "GST Master Pro", path: "gst-calculator", icon: "📊" },
        { name: "Wealth SIP Planner", path: "sip-calculator", icon: "💰" },
        { name: "Global Currency Pro", path: "currency-conv", icon: "💱" },
        { name: "Age Intelligence Pro", path: "age-calc-pro", icon: "📅" },
        { name: "BMI Health Tracker", path: "bmi-tracker", icon: "⚖️" },
    ];

    const grid = document.getElementById('toolGrid');
    function loadTools() {
        MY_TOOLS.forEach(tool => {
            const card = document.createElement('a');
            card.href = tool.path + "/";
            card.className = "tool-card";
            card.setAttribute('data-search', tool.name.toLowerCase());
            card.innerHTML = `<div class="icon">${tool.icon}</div><h3>${tool.name}</h3>`;
            grid.appendChild(card);
        });
    }
    function filterTools() {
        let input = document.getElementById('searchBar').value.toLowerCase();
        let cards = document.getElementsByClassName('tool-card');
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].getAttribute('data-search');
            cards[i].style.display = name.includes(input) ? "flex" : "none";
        }
    }
    window.onload = loadTools;
</script>
