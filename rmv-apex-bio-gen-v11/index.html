<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | AI Bio Generator 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --white: #ffffff; --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        /* Branding Watermark */
        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.05; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 50px; color: var(--white); }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 30px; width: 100%; max-width: 700px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .input-group input, .input-group select { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; transition: 0.3s; font-size: 15px; }
        .input-group input:focus { border-color: var(--accent); }

        .btn-generate { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-generate:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }

        #bio-results { display: none; margin-top: 30px; }
        .bio-card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--gold); position: relative; cursor: pointer; transition: 0.3s; }
        .bio-card:hover { border-color: var(--accent); background: #161a20; transform: translateX(10px); }
        .bio-card small { font-size: 9px; color: var(--gold); text-transform: uppercase; font-weight: 900; display: block; margin-bottom: 5px; }
        .bio-card p { font-size: 14px; line-height: 1.5; color: #ddd; }
        .copy-hint { position: absolute; right: 15px; top: 15px; font-size: 10px; color: var(--success); opacity: 0; }
        .bio-card:active .copy-hint { opacity: 1; }

        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 700px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Smart AI Social Bio Generator V11</p>
        </div>

        <div class="input-group">
            <label>Who are you? (Keywords like: Developer, Artist, Trader)</label>
            <input type="text" id="keywords" placeholder="E.g. Digital Artist, Fitness Enthusiast">
        </div>

        <div class="input-group">
            <label>Select Your Mood / Tone</label>
            <select id="tone">
                <option value="Professional">Professional & Corporate</option>
                <option value="Creative">Creative & Artistic</option>
                <option value="Minimalist">Minimalist & Clean</option>
                <option value="Funny">Funny & Witty</option>
                <option value="Savage">Savage & Bold</option>
            </select>
        </div>

        <button class="btn-generate" onclick="generateBio()">🚀 GENERATE AI BIO OPTIONS</button>

        <div id="bio-results">
            <label style="font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 15px; display: block;">Tap to Copy your favorite Bio</label>
            <div id="results-container"></div>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<30; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function generateBio() {
            const kw = document.getElementById('keywords').value.trim();
            const tone = document.getElementById('tone').value;
            const container = document.getElementById('results-container');

            if (!kw) { alert("कृपया अपने बारे में कुछ शब्द लिखें! 🚩"); return; }

            const templates = {
                Professional: [
                    `💼 ${kw} | Dedicated to driving results and innovation.`,
                    `🚀 Passionate ${kw} | Transforming ideas into reality.`,
                    `📈 Expert ${kw} specializing in growth and strategy.`
                ],
                Creative: [
                    `✨ Dreaming in colors & living as a ${kw}.`,
                    `🎨 ${kw} | Turning imagination into digital soul.`,
                    `🌈 Just a ${kw} creating magic one day at a time.`
                ],
                Minimalist: [
                    `• ${kw} •`,
                    `${kw} | Living life.`,
                    `Minimalist. ${kw}. Simply me.`
                ],
                Funny: [
                    `🍕 Part-time ${kw}, full-time pizza lover.`,
                    `🤖 I'm a ${kw} because my AI is still loading.`,
                    `💤 Professional ${kw} & expert sleeper.`
                ],
                Savage: [
                    `🔥 ${kw} by day, legend by night.`,
                    `👑 Don't follow me, I'm a ${kw} on a mission.`,
                    `🦅 ${kw} | My vibe is my resume.`
                ]
            };

            container.innerHTML = "";
            templates[tone].forEach(bio => {
                const card = document.createElement('div');
                card.className = "bio-card";
                card.innerHTML = `<small>${tone} Mode</small><p>${bio}</p><div class="copy-hint">COPIED</div>`;
                card.onclick = () => {
                    navigator.clipboard.writeText(bio);
                    alert("Bio copied to clipboard! 🚩");
                };
                container.appendChild(card);
            });

            document.getElementById('bio-results').style.display = 'block';
        }
    </script>
</body>
</html>
