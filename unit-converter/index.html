<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #8b5cf6; --s: #ec4899; --d: #0f172a; --bg: #f8fafc; }
        
        /* FIXED WATERMARK - अब यह हमेशा पीछे दिखाई देगा */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            user-select: none; 
            padding: 20px; 
            position: relative; 
            overflow: hidden; 
        }
        
        .watermark { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%) rotate(-30deg); 
            font-size: clamp(4rem, 15vw, 8rem); 
            font-weight: 900; 
            color: rgba(139, 92, 246, 0.08); /* Opacity थोड़ी बढ़ा दी है */
            z-index: 0; /* कार्ड के पीछे रखने के लिए */
            white-space: nowrap; 
            pointer-events: none; 
            text-transform: uppercase; 
            letter-spacing: 12px; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); /* हल्की पारदर्शिता ताकि पीछे का रंग दिखे */
            padding: 40px; 
            border-radius: 35px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 480px; 
            border: 1px solid #eee; 
            position: relative; 
            overflow: hidden; 
            z-index: 10; /* वाटरमार्क के ऊपर रखने के लिए */
        }

        /* बाकी स्टाइल्स वही रहेंगे... */
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--d); font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; opacity: 0.6; transition: 0.3s; }
        h2 { color: var(--d); margin: 20px 0 25px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #64748b; font-size: 0.85rem; }
        input, select { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 15px; font-size: 1rem; outline: none; transition: 0.3s; font-weight: 600; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(139, 92, 246, 0.1); }
        .convert-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 18px; }
        .btn-calc { width: 100%; padding: 16px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; background: var(--p); color: white; font-size: 1rem; margin-top: 10px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2); background: var(--s); }
        .result-box { background: #f5f3ff; padding: 25px; border-radius: 25px; margin-top: 30px; border: 2px dashed #ddd6fe; display: none; text-align: center; animation: zoomIn 0.3s ease; }
        .res-val { font-size: 1.6rem; color: var(--d); font-weight: 800; word-break: break-all; }
        .copy-btn { margin-top: 10px; background: none; border: none; color: var(--p); cursor: pointer; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; }
        .support-section { margin-top: 35px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .support-btns { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
        .support-btn { padding: 10px 15px; border-radius: 12px; text-decoration: none; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .bmc-btn { background: #FFDD00; color: #000; }
        .kofi-btn { background: #29abe0; color: #fff; }
        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.75rem; color: #94a3b8; font-weight: 800; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <div class="back-nav">
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </div>

    <h2>📏 Unit Converter Pro</h2>
    
    <div class="input-group">
        <label><i class="fas fa-th-large"></i> Category</label>
        <select id="category" onchange="updateUnits()">
            <option value="length">Length</option>
            <option value="weight">Weight</option>
            <option value="temp">Temperature</option>
            <option value="area">Area</option>
        </select>
    </div>

    <div class="input-group">
        <label><i class="fas fa-keyboard"></i> Amount</label>
        <input type="number" id="inputValue" placeholder="0.00" oninput="convert()">
    </div>

    <div class="convert-grid">
        <div class="input-group">
            <label>From</label>
            <select id="fromUnit" onchange="convert()"></select>
        </div>
        <div class="input-group">
            <label>To</label>
            <select id="toUnit" onchange="convert()"></select>
        </div>
    </div>
    
    <button class="btn-calc" onclick="convert()"><i class="fas fa-sync-alt"></i> Convert Now</button>

    <div class="result-box" id="resultBox">
        <div class="res-val" id="resultValue">0.00</div>
        <button class="copy-btn" onclick="copyResult()"><i class="fas fa-copy"></i> Copy Result</button>
    </div>

    <div class="support-section">
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" class="support-btn bmc-btn" target="_blank"><i class="fas fa-coffee"></i> Coffee</a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" class="support-btn kofi-btn" target="_blank"><i class="fas fa-mug-hot"></i> Ko-fi</a>
        </div>
    </div>
    <div class="footer-tag">Crafted by Ramesh Mewalal Vishwakarma 🚩</div>
</div>

<script>
    // Script logic remains the same as previous refined version...
    const units = {
        length: { "Meter": 1, "Kilometer": 1000, "Centimeter": 0.01, "Millimeter": 0.001, "Inch": 0.0254, "Foot": 0.3048, "Mile": 1609.34 },
        weight: { "Kilogram": 1, "Gram": 0.001, "Milligram": 0.000001, "Pound": 0.453592, "Ounce": 0.0283495 },
        area: { "Sq. Meter": 1, "Sq. Km": 1000000, "Sq. Foot": 0.092903, "Acre": 4046.86, "Hectare": 10000 },
        temp: ["Celsius", "Fahrenheit", "Kelvin"]
    };

    function updateUnits() {
        const cat = document.getElementById('category').value;
        const from = document.getElementById('fromUnit');
        const to = document.getElementById('toUnit');
        from.innerHTML = ""; to.innerHTML = "";
        const options = (cat === 'temp') ? units.temp : Object.keys(units[cat]);
        options.forEach(u => {
            from.add(new Option(u, u));
            to.add(new Option(u, u));
        });
        if (to.options.length > 1) to.selectedIndex = 1;
        convert();
    }

    function convert() {
        const cat = document.getElementById('category').value;
        const val = parseFloat(document.getElementById('inputValue').value);
        const from = document.getElementById('fromUnit').value;
        const to = document.getElementById('toUnit').value;
        const resBox = document.getElementById('resultBox');
        let res = 0;
        if (isNaN(val)) { resBox.style.display = "none"; return; }
        if (cat === 'temp') {
            if (from === to) res = val;
            else if (from === "Celsius" && to === "Fahrenheit") res = (val * 9/5) + 32;
            else if (from === "Celsius" && to === "Kelvin") res = val + 273.15;
            else if (from === "Fahrenheit" && to === "Celsius") res = (val - 32) * 5/9;
            else if (from === "Fahrenheit" && to === "Kelvin") res = (val - 32) * 5/9 + 273.15;
            else if (from === "Kelvin" && to === "Celsius") res = val - 273.15;
            else if (from === "Kelvin" && to === "Fahrenheit") res = (val - 273.15) * 9/5 + 32;
        } else {
            const baseValue = val * units[cat][from];
            res = baseValue / units[cat][to];
        }
        document.getElementById('resultValue').innerText = res.toLocaleString(undefined, {maximumFractionDigits: 4}) + " " + to;
        resBox.style.display = "block";
    }

    async function copyResult() {
        const text = document.getElementById('resultValue').innerText;
        await navigator.clipboard.writeText(text);
        alert("Result copied! 🚩");
    }

    updateUnits();
</script>
</body>
</html>
