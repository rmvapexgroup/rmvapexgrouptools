<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Thumbnail Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #ff0000; --d: #0f172a; --bg: #f8fafc; --gold: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; position: relative; overflow-x: hidden; user-select: none; }
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 5rem; font-weight: 900; color: rgba(15, 23, 42, 0.03); z-index: 0; pointer-events: none; text-transform: uppercase; white-space: nowrap; }
        
        .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        .card { background: white; padding: 35px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; position: relative; text-align: center; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--gold)); border-radius: 35px 35px 0 0; }
        
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #f1f5f9; font-weight: 700; margin: 20px 0; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--p); }

        .btn-group { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; font-size: 0.8rem; }
        .btn-main { background: var(--d); }
        .btn-paste { background: #f1f5f9; color: var(--d); }
        .btn-clear { background: #fff1f2; color: #ef4444; }

        .result-grid { display: grid; gap: 20px; margin-top: 30px; }
        .thumb-box { background: white; border-radius: 20px; padding: 15px; border: 1px solid #f1f5f9; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        .thumb-box img { width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        .thumb-info { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
        .quality-tag { background: #fef2f2; color: var(--p); padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .dl-btns { display: flex; gap: 8px; }
        .icon-btn { width: 35px; height: 35px; border-radius: 10px; border: none; background: #f8fafc; color: var(--d); cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { background: var(--d); color: white; }

        .footer { margin-top: 30px; font-size: 0.7rem; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body oncontextmenu="return false">

<div class="watermark">RMV APEX GROUP</div>

<div class="container">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <a href="../index.html" style="text-decoration:none; color:var(--gold); font-weight:800; font-size:0.7rem;">← DASHBOARD</a>
            <span style="font-size: 0.6rem; font-weight: 800; color: #94a3b8;">YT MASTER v2.0</span>
        </div>
        
        <h2 style="margin: 20px 0 10px;"><i class="fab fa-youtube" style="color:var(--p)"></i> Thumbnail Pro</h2>
        <p style="font-size: 0.75rem; color: #64748b; font-weight: 600;">High Quality YouTube Thumbnails in One Click</p>

        <input type="text" id="url" placeholder="यूट्यूब वीडियो लिंक यहाँ पेस्ट करें...">

        <div class="btn-group">
            <button class="btn btn-main" onclick="getThumb()">GET THUMBNAILS</button>
            <button class="btn btn-paste" onclick="pasteURL()">PASTE</button>
            <button class="btn btn-clear" onclick="clearAll()">CLEAR</button>
        </div>

        <div id="result" class="result-grid"></div>

        <div class="footer">
            DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩<br>
            POWERED BY RMV APEX GROUP © 2026
        </div>
    </div>
</div>

<script>
    function extractID(url){
        let reg = /(?:youtube\.com.*(?:\?|&)v=|youtu\.be\/|youtube\.com\/shorts\/)([^&?#/]+)/;
        let match = url.match(reg);
        return match ? match[1] : null;
    }

    function getThumb(){
        let url = document.getElementById("url").value;
        let id = extractID(url);

        if(!id){
            alert("कृपया वैध यूट्यूब लिंक डालें! 🚩");
            return;
        }

        const qualities = [
            { label: "HD Quality (1080p)", file: "maxresdefault.jpg" },
            { label: "Standard (720p)", file: "sddefault.jpg" },
            { label: "High Quality", file: "hqdefault.jpg" }
        ];

        let html = "";
        qualities.forEach(q => {
            let img = `https://img.youtube.com/vi/${id}/${q.file}`;
            html += `
                <div class="thumb-box">
                    <img src="${img}" onerror="this.parentElement.style.display='none'">
                    <div class="thumb-info">
                        <span class="quality-tag">${q.label}</span>
                        <div class="dl-btns">
                            <button class="icon-btn" title="Download" onclick="downloadImg('${img}')"><i class="fas fa-download"></i></button>
                            <button class="icon-btn" title="Copy Link" onclick="copyLink('${img}')"><i class="fas fa-link"></i></button>
                            <button class="icon-btn" title="Open" onclick="window.open('${img}')"><i class="fas fa-external-link-alt"></i></button>
                        </div>
                    </div>
                </div>`;
        });
        document.getElementById("result").innerHTML = html;
    }

    async function downloadImg(url) {
        const response = await fetch(url);
        const blob = await response.blob();
        const fileUrl = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = fileUrl;
        a.download = "RMV-Apex-Thumbnail.jpg";
        a.click();
    }

    function copyLink(link){
        navigator.clipboard.writeText(link);
        alert("लिंक कॉपी हो गया! 🚩");
    }

    async function pasteURL(){
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById("url").value = text;
        } catch(e) { alert("Clipboard Access Denied"); }
    }

    function clearAll(){
        document.getElementById("url").value = "";
        document.getElementById("result").innerHTML = "";
    }
</script>

</body>
</html>
