<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Thumbnail Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #ff0000; --d: #0f172a; --bg: #f8fafc; --gold: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; position: relative; overflow-x: hidden; user-select: none; }
        
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(255, 0, 0, 0.03); z-index: 0; pointer-events: none; text-transform: uppercase; white-space: nowrap; }
        
        .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        .card { background: white; padding: 35px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; position: relative; text-align: center; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--gold)); border-radius: 35px 35px 0 0; }
        
        .back-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-link { text-decoration: none; color: var(--gold); font-weight: 800; font-size: 0.75rem; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .back-link:hover { transform: translateX(-3px); }

        input { width: 100%; padding: 16px; border-radius: 18px; border: 2px solid #f1f5f9; font-weight: 700; margin: 15px 0; outline: none; box-sizing: border-box; transition: 0.3s; font-size: 0.9rem; }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(255, 0, 0, 0.05); }

        .btn-group { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .btn { padding: 14px; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; font-size: 0.8rem; text-transform: uppercase; border-bottom: 3px solid rgba(0,0,0,0.1); }
        .btn-main { background: var(--p); }
        .btn-paste { background: #f1f5f9; color: var(--d); }
        .btn-clear { background: #fff1f2; color: #ef4444; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn:active { transform: translateY(1px); border-bottom-width: 1px; }

        .result-grid { display: grid; gap: 20px; margin-top: 10px; }
        .thumb-box { background: #f8fafc; border-radius: 25px; padding: 15px; border: 1px solid #e2e8f0; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .thumb-box img { width: 100%; border-radius: 18px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .thumb-info { display: flex; justify-content: space-between; align-items: center; padding: 5px; }
        .quality-tag { background: white; color: var(--d); padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; border: 1px solid #eee; }
        
        .dl-btns { display: flex; gap: 8px; }
        .icon-btn { width: 38px; height: 38px; border-radius: 12px; border: none; background: white; color: var(--p); cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-size: 0.9rem; }
        .icon-btn:hover { background: var(--p); color: white; transform: scale(1.1); }

        /* Support Section */
        .support-section { margin-top: 35px; padding-top: 25px; border-top: 1px solid #f1f5f9; }
        .support-btns { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 15px; }
        .kofi-btn { background: #29abe0; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(41,171,224,0.2); transition: 0.3s; }
        .kofi-btn:hover { transform: translateY(-2px); }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding-top: 15px; border-top: 1px solid #f8fafc; }
    </style>
</head>
<body oncontextmenu="return false">

<div class="watermark">RMV APEX GROUP</div>

<div class="container">
    <div class="card">
        <div class="back-nav">
            <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
            <span style="font-size: 0.6rem; font-weight: 800; color: #94a3b8; letter-spacing: 1px;">YT MASTER v2.0</span>
        </div>
        
        <h2 style="margin: 0 0 10px;"><i class="fab fa-youtube" style="color:var(--p)"></i> Thumbnail Pro</h2>
        <p style="font-size: 0.75rem; color: #64748b; font-weight: 600;">High Quality YouTube Thumbnails 🚩</p>

        <input type="text" id="url" placeholder="यूट्यूब वीडियो या शॉर्ट्स लिंक यहाँ पेस्ट करें...">

        <div class="btn-group">
            <button class="btn btn-main" onclick="getThumb()">GET IMAGES</button>
            <button class="btn btn-paste" onclick="pasteURL()">PASTE</button>
            <button class="btn btn-clear" onclick="clearAll()">CLEAR</button>
        </div>

        <div id="result" class="result-grid"></div>

        <div class="support-section">
            <p style="font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Support RMV APEX GROUP 🚩</p>
            <div class="support-btns">
                <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank">
                    <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=rameshmewalalvishwakarma&button_colour=FFDD00&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=ffffff" style="height: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(255, 221, 0, 0.2);">
                </a>
                <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="kofi-btn">
                    <i class="fas fa-mug-hot"></i> Support on Ko-fi
                </a>
            </div>
        </div>

        <div class="footer-tag">
            BY RAMESH MEWALAL VISHWAKARMA 🚩<br>
            RMV APEX GROUP © 2026
        </div>
    </div>
</div>

<script>
    function extractID(url){
        // Support for Normal, Shorts, and Mobile URLs
        let reg = /(?:youtube\.com.*(?:\?|&)v=|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/live\/)([^&?#/]+)/;
        let match = url.match(reg);
        return match ? match[1] : null;
    }

    function getThumb(){
        let url = document.getElementById("url").value.trim();
        let id = extractID(url);

        if(!id){
            alert("कृपया वैध यूट्यूब लिंक डालें! 🚩");
            return;
        }

        const qualities = [
            { label: "Ultra HD (1080p)", file: "maxresdefault.jpg" },
            { label: "Standard (720p)", file: "sddefault.jpg" },
            { label: "High Quality", file: "hqdefault.jpg" }
        ];

        let html = "";
        qualities.forEach(q => {
            let img = `https://img.youtube.com/vi/${id}/${q.file}`;
            html += `
                <div class="thumb-box">
                    <img src="${img}" onerror="this.parentElement.style.display='none'">
                    <div class="thumb-info">
                        <span class="quality-tag"><i class="fas fa-check-circle" style="color:var(--p)"></i> ${q.label}</span>
                        <div class="dl-btns">
                            <button class="icon-btn" title="Download" onclick="downloadImg('${img}', '${id}')"><i class="fas fa-download"></i></button>
                            <button class="icon-btn" title="Copy Link" onclick="copyLink('${img}')"><i class="fas fa-link"></i></button>
                        </div>
                    </div>
                </div>`;
        });
        document.getElementById("result").innerHTML = html;
    }

    // Advanced Download Logic
    async function downloadImg(url, id) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const fileUrl = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = fileUrl;
            a.download = `RMV-Thumb-${id}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        } catch(e) {
            window.open(url, '_blank');
        }
    }

    function copyLink(link){
        navigator.clipboard.writeText(link);
        alert("थंबनेल लिंक कॉपी हो गया! 🚩");
    }

    async function pasteURL(){
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById("url").value = text;
            getThumb(); // Auto fetch after paste
        } catch(e) { alert("Clipboard Permission Denied"); }
    }

    function clearAll(){
        document.getElementById("url").value = "";
        document.getElementById("result").innerHTML = "";
    }
</script>

</body>
</html>
