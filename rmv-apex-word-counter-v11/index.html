<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Word Counter Master 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.05; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 50px; color: var(--white); }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 30px; width: 100%; max-width: 850px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .stat-box span { display: block; font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .stat-box strong { font-size: 22px; color: var(--accent); }

        textarea { width: 100%; height: 300px; background: #000; border: 1px solid #333; border-radius: 20px; padding: 20px; color: #fff; font-size: 16px; outline: none; transition: 0.3s; resize: vertical; margin-bottom: 20px; line-height: 1.6; }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }

        .action-btns { display: flex; gap: 15px; }
        .btn-main { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-copy { background: #2ecc71; color: #000; }
        .btn-clear { background: #e74c3c; color: #fff; }
        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 850px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Smart Word & Character Counter V11</p>
        </div>

        <div class="stats-bar">
            <div class="stat-box"><span>Words</span><strong id="wordCount">0</strong></div>
            <div class="stat-box"><span>Characters</span><strong id="charCount">0</strong></div>
            <div class="stat-box"><span>Paragraphs</span><strong id="paraCount">0</strong></div>
            <div class="stat-box"><span>Reading Time</span><strong id="readTime">0m</strong></div>
        </div>

        <textarea id="textInput" placeholder="यहाँ अपना कंटेंट पेस्ट करें या टाइप करना शुरू करें..." oninput="updateStats()"></textarea>

        <div class="action-btns">
            <button class="btn-main btn-copy" onclick="copyContent()"><i class="fas fa-copy"></i> COPY CONTENT</button>
            <button class="btn-main btn-clear" onclick="clearAll()"><i class="fas fa-trash-alt"></i> CLEAR ALL</button>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<30; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        const textarea = document.getElementById('textInput');

        function updateStats() {
            const text = textarea.value.trim();
            
            // Word Count
            const words = text ? text.split(/\s+/).length : 0;
            document.getElementById('wordCount').innerText = words;

            // Character Count
            document.getElementById('charCount').innerText = text.length;

            // Paragraph Count
            const paragraphs = text ? text.split(/\n\s*\n/).length : 0;
            document.getElementById('paraCount').innerText = paragraphs;

            // Reading Time (Avg 200 words per minute)
            const minutes = Math.ceil(words / 200);
            document.getElementById('readTime').innerText = minutes + "m";
        }

        function copyContent() {
            if (!textarea.value) return;
            textarea.select();
            document.execCommand('copy');
            alert("कंटेंट क्लिपबोर्ड पर कॉपी हो गया है! 🚩");
        }

        function clearAll() {
            if (confirm("क्या आप पूरा कंटेंट हटाना चाहते हैं?")) {
                textarea.value = "";
                updateStats();
            }
        }
    </script>
</body>
</html>
