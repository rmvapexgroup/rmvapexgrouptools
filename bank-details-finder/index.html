<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Finder | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b0f19; --card: #161b22; --accent: #00d2ff; --text: #e6edf3; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h1 { text-align: center; font-size: 1.5rem; color: var(--accent); margin-bottom: 20px; }
        .search-box { display: flex; background: #0d1117; border-radius: 12px; border: 1px solid #30363d; padding: 5px; margin-bottom: 15px; }
        input { flex: 1; background: transparent; border: none; padding: 12px; color: white; outline: none; font-size: 14px; }
        
        button { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; }
        button:hover { opacity: 0.9; transform: scale(0.98); }

        .result-area { display: none; margin-top: 20px; }
        .map-container { height: 350px; border-radius: 15px; overflow: hidden; border: 1px solid #30363d; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .info-note { font-size: 12px; color: #8b949e; text-align: center; margin-top: 15px; background: #0d1117; padding: 10px; border-radius: 10px; }
        
        .footer { text-align: center; margin-top: 25px; font-size: 10px; color: #484f58; letter-spacing: 1px; }
        .support { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏦 Bank Details Finder</h1>
    
    <div class="search-box">
        <input type="text" id="bankInput" placeholder="IFSC, Name, MICR या Branch डालें...">
    </div>

    <button onclick="searchBank()">खोजें (Search Now)</button>

    <div class="result-area" id="resultArea">
        <div class="map-container">
            <iframe id="mapFrame" src=""></iframe>
        </div>
        <div class="info-note">
            🚩 <b>नोट:</b> बैंक का पूरा विवरण (IFSC, SWIFT, MICR) ऊपर मैप के अंदर <b>'View larger map'</b> पर क्लिक करके प्राप्त करें।
        </div>
    </div>

    <div class="support">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank">
            <img src="https://img.buymeacoffee.com/button-api/?text=Coffee&emoji=☕&slug=rameshmewalalvishwakarma&button_colour=FFDD00&font_colour=000000&outline_colour=000000" style="height: 30px;">
        </a>
    </div>

    <div class="footer">
        DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩<br>
        RMV APEX GROUP © 2026
    </div>
</div>

<script>
    function searchBank() {
        const query = document.getElementById('bankInput').value.trim();
        if (!query) return alert("कृपया कुछ दर्ज करें!");

        const mapFrame = document.getElementById('mapFrame');
        const resultArea = document.getElementById('resultArea');

        // Official Google Maps Embed URL - No API Key Needed for simple Search
        const mapUrl = `https://www.google.com/maps?q=${encodeURIComponent(query + " bank details ifsc micr swift")}&output=embed`;
        
        mapFrame.src = mapUrl;
        resultArea.style.display = 'block';
    }
</script>

</body>
</html>
