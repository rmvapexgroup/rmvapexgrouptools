<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Finder ULTIMATE | RMV APEX</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #060913; --card: #111827; --accent: #00eaff; --text: #f3f4f6; --gold: #f59e0b; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h1 { text-align: center; font-size: 1.6rem; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .tagline { text-align: center; font-size: 0.65rem; color: var(--gold); letter-spacing: 2px; font-weight: 800; margin-bottom: 20px; }
        
        .search-area { background: #1f2937; padding: 5px; border-radius: 15px; border: 1px solid #374151; display: flex; margin-bottom: 15px; }
        input { flex: 1; background: transparent; border: none; padding: 12px; color: white; font-weight: 600; font-size: 1rem; outline: none; width: 100%; }
        
        .btn-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; margin-bottom: 20px; }
        button { padding: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; text-transform: uppercase; font-size: 0.75rem; }
        .btn-search { background: var(--accent); color: #000; }
        .btn-clear { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        #resultArea { display: none; margin-top: 15px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; background: #0f172a; padding: 20px; border-radius: 20px; border: 1px solid #1e293b; margin-bottom: 15px; }
        .data-box { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .label { font-size: 0.6rem; color: #64748b; font-weight: 800; text-transform: uppercase; }
        .val { color: #fff; font-size: 0.85rem; font-weight: 600; margin-top: 3px; word-break: break-all; }

        .map-box { height: 350px; border-radius: 20px; overflow: hidden; border: 1px solid #1e293b; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .support-area { margin-top: 30px; text-align: center; border-top: 1px solid #1e293b; padding-top: 25px; }
        .footer { text-align: center; margin-top: 25px; font-size: 0.65rem; color: #4b5563; font-weight: 700; text-transform: uppercase; }
        .loader { display: none; text-align: center; color: var(--accent); padding: 15px; font-weight: 800; }
    </style>
</head>
<body oncontextmenu="return false">

<div class="container">
    <h1>🏦 Bank Details Finder</h1>
    <div class="tagline">IFSC • MICR • SWIFT • NAME • MAPS 🚩</div>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="Enter IFSC, MICR, SWIFT or Branch Name...">
    </div>

    <div class="btn-grid">
        <button class="btn-search" onclick="executeSearch()"><i class="fas fa-search"></i> Find Bank Details</button>
        <button class="btn-clear" onclick="resetApp()"><i class="fas fa-sync-alt"></i> Reset</button>
    </div>

    <div class="loader" id="loader"><i class="fas fa-circle-notch fa-spin"></i> Intelligent Searching...</div>

    <div id="resultArea">
        <div class="info-grid" id="infoGrid"></div>
        <div class="map-box">
            <iframe id="mapFrame" src=""></iframe>
        </div>
    </div>

    <div class="support-area">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank">
                <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=rameshmewalalvishwakarma&button_colour=FFDD00&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=ffffff" style="height: 40px; border-radius: 10px;">
            </a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" style="background:#29abe0; color:white; padding:10px 20px; border-radius:10px; text-decoration:none; font-weight:800; font-size:0.75rem;">
                <i class="fas fa-mug-hot"></i> Support on Ko-fi
            </a>
        </div>
    </div>

    <div class="footer">
        CRAFTED BY RAMESH MEWALAL VISHWAKARMA 🚩<br>
        POWERED BY RMV APEX GROUP © 2026
    </div>
</div>

<script>
    async function executeSearch() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return alert("Please enter bank details! 🚩");

        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('resultArea');
        loader.style.display = 'block';
        resultArea.style.display = 'none';

        // Detect IFSC Pattern
        const isIFSC = /^[A-Z]{4}0[A-Z0-9]{6}$/i.test(query);

        try {
            if (isIFSC) {
                const response = await fetch(`https://ifsc.razorpay.com/${query.toUpperCase()}`);
                if (response.ok) {
                    const data = await response.json();
                    displayData(data);
                    updateMap(`${data.BANK} ${data.BRANCH} ${data.CITY}`);
                } else {
                    displayFallback(query);
                }
            } else {
                displayFallback(query);
            }
            resultArea.style.display = 'block';
        } catch (error) {
            displayFallback(query);
        }
        loader.style.display = 'none';
    }

    function displayData(data) {
        const fields = {
            "Search Result": "Verified Bank Data ✅",
            "Bank Name": data.BANK,
            "IFSC Code": data.IFSC,
            "MICR Code": data.MICR || "NA",
            "Branch": data.BRANCH,
            "Contact": data.CONTACT || "NA",
            "District": data.DISTRICT,
            "State": data.STATE,
            "Address": data.ADDRESS
        };
        renderHTML(fields);
    }

    function displayFallback(q) {
        const fields = {
            "Search Result": "Smart Search Active 🚩",
            "Input Found": q,
            "Bank Details": "Fetching from Global Maps...",
            "Note": "कृपया सटीक विवरण के लिए नीचे दिए गए मैप को देखें।"
        };
        renderHTML(fields);
        updateMap(q);
    }

    function renderHTML(fields) {
        let html = "";
        for (let [label, val] of Object.entries(fields)) {
            html += `<div class="data-box"><div class="label">${label}</div><div class="val">${val}</div></div>`;
        }
        document.getElementById('infoGrid').innerHTML = html;
    }

    function updateMap(location) {
        // Ultimate Fixed Google Maps URL
        const encodedLoc = encodeURIComponent(location);
        const mapUrl = `https://www.google.com/maps/embed/v1/place?key=AIzaSyD-YOUR_KEY_NOT_NEEDED_HERE&q=${encodedLoc}`;
        // Note: Using the Search API Fallback for Embeds
        document.getElementById('mapFrame').src = `https://maps.google.com/maps?q=${encodedLoc}&t=&z=14&ie=UTF8&iwloc=&output=embed`;
    }

    function resetApp() {
        document.getElementById('searchInput').value = "";
        document.getElementById('resultArea').style.display = 'none';
    }
</script>

</body>
</html>
