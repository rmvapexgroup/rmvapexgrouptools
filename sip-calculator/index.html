<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth SIP Planner | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #10b981; --s: #6366f1; --d: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; }
        
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(16, 185, 129, 0.04); z-index: -1; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border: 1px solid #eee; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--d); font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; opacity: 0.6; transition: 0.3s; }
        .back-link:hover { opacity: 1; color: var(--p); transform: translateX(-3px); }

        h2 { color: var(--d); margin: 20px 0 25px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #64748b; font-size: 0.85rem; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; font-weight: 600; box-sizing: border-box; }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        
        .btn-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 15px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-calc { background: var(--p); color: white; }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        .btn-clear { background: #f1f5f9; color: #64748b; }
        .btn-clear:hover { background: #fee2e2; color: #ef4444; }

        .result-box { background: #f0fdf4; padding: 25px; border-radius: 25px; margin-top: 30px; border: 2px dashed #bbf7d0; display: none; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .res-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 700; color: #475569; font-size: 0.95rem; }
        .total-wealth { font-size: 1.8rem; color: var(--p); font-weight: 800; border-top: 2px solid #bbf7d0; padding-top: 15px; margin-top: 10px; }

        .btn-download { width: 100%; margin-top: 20px; background: var(--s); color: white; padding: 14px; font-size: 0.85rem; border-radius: 15px; font-weight: 800; border: none; cursor: pointer; }
        .btn-download:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }

        /* --- Updated Support Section --- */
        .support-section { margin-top: 35px; padding-top: 25px; border-top: 1px solid #f1f5f9; text-align: center; }
        .support-btns { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 15px; }
        .kofi-btn { background: #29abe0; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(41,171,224,0.2); transition: 0.3s; width: fit-content; }
        .kofi-btn:hover { transform: translateY(-2px); }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid #f8fafc; padding-top: 15px; }

        @media print {
            .no-print, .btn-grid, .back-nav, .support-section, .btn-download, .footer-tag, .input-group { display: none !important; }
            .card { border: none; box-shadow: none; width: 100%; max-width: 100%; }
            .result-box { display: block !important; background: white; border: 1px solid #ddd; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <div class="back-nav no-print">
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </div>

    <h2>💰 Wealth SIP Planner</h2>
    
    <div class="input-group no-print">
        <label>Monthly Investment (₹ प्रति माह)</label>
        <input type="number" id="monthly" placeholder="e.g. 5000" onkeypress="if(event.key==='Enter') calculateSIP()">
    </div>
    <div class="input-group no-print">
        <label>Expected Return Rate (% Yearly)</label>
        <input type="number" id="rate" placeholder="e.g. 12" onkeypress="if(event.key==='Enter') calculateSIP()">
    </div>
    <div class="input-group no-print">
        <label>Time Period (Years)</label>
        <input type="number" id="years" placeholder="e.g. 10" onkeypress="if(event.key==='Enter') calculateSIP()">
    </div>
    
    <div class="btn-grid no-print">
        <button class="btn-calc" onclick="calculateSIP()"><i class="fas fa-calculator"></i> Calculate</button>
        <button class="btn-clear" onclick="clearFields()"><i class="fas fa-undo"></i> Reset</button>
    </div>

    <div class="result-box" id="resultBox">
        <div class="res-row"><span>Total Invested:</span> <span id="invested">₹0</span></div>
        <div class="res-row"><span>Estimated Returns:</span> <span id="returns" style="color: #059669;">+ ₹0</span></div>
        <div class="total-wealth">
            <div style="font-size: 0.8rem; color: #64748b; letter-spacing: 1px;">TOTAL WEALTH</div>
            <span id="total">₹0</span>
        </div>
        <button class="btn-download no-print" onclick="window.print()"><i class="fas fa-file-pdf"></i> Download Planning</button>
    </div>

    <div class="support-section no-print">
        <p style="font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Support RMV APEX GROUP 🚩</p>
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank">
                <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=rameshmewalalvishwakarma&button_colour=FFDD00&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=ffffff" style="height: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(255, 221, 0, 0.2);">
            </a>

            <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="kofi-btn">
                <i class="fas fa-mug-hot"></i> Support on Ko-fi
            </a>
        </div>
    </div>

    <div class="footer-tag">Crafted by Ramesh Mewalal Vishwakarma 🚩</div>
</div>

<script>
    function calculateSIP() {
        let p = parseFloat(document.getElementById('monthly').value);
        let annualRate = parseFloat(document.getElementById('rate').value);
        let y = parseFloat(document.getElementById('years').value);

        if (isNaN(p) || isNaN(annualRate) || isNaN(y) || p <= 0) {
            alert("महत्वपूर्ण: कृपया सही निवेश राशि, दर और समय दर्ज करें!");
            return;
        }

        let r = annualRate / 12 / 100;
        let n = y * 12;
        
        // SIP Formula: M = P × ({[1 + r]^n – 1} / r) × (1 + r)
        let totalWealth = p * (((Math.pow(1 + r, n)) - 1) / r) * (1 + r);
        let totalInvested = p * n;
        let estimatedReturns = totalWealth - totalInvested;

        document.getElementById('invested').innerText = "₹ " + Math.round(totalInvested).toLocaleString('en-IN');
        document.getElementById('returns').innerText = "+ ₹ " + Math.round(estimatedReturns).toLocaleString('en-IN');
        document.getElementById('total').innerText = "₹ " + Math.round(totalWealth).toLocaleString('en-IN');
        
        document.getElementById('resultBox').style.display = "block";
    }

    function clearFields() { 
        document.getElementById('monthly').value = "";
        document.getElementById('rate').value = "";
        document.getElementById('years').value = "";
        document.getElementById('resultBox').style.display = "none"; 
    }
</script>
</body>
</html>
