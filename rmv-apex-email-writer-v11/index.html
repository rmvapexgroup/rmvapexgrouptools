<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | AI Email Writer 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #030508; --primary: #00d2ff; --secondary: #3a7bd5; --gold: #ffd700; --glass: rgba(255, 255, 255, 0.03); --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.04; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 15px; margin: 50px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 35px; width: 100%; max-width: 950px; border-top: 6px solid var(--primary); box-shadow: 0 30px 60px rgba(0,0,0,0.6); margin-bottom: 30px; }
        .header h1 { color: var(--primary); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; }

        .editor-layout { display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        
        /* Intelligence Panel */
        .controls { background: rgba(0,0,0,0.3); padding: 25px; border-radius: 20px; border: 1px solid #222; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 10px; color: var(--gold); font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; outline: none; transition: 0.3s; }
        .input-group textarea { resize: vertical; }

        .btn-ai { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: #fff; font-weight: 900; cursor: pointer; font-size: 15px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2); margin-top: 10px; }
        .btn-ai:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* Preview Area */
        .preview-pane { background: #fff; color: #333; border-radius: 20px; padding: 40px; display: flex; flex-direction: column; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); min-height: 500px; }
        .email-header { border-bottom: 1px solid #eee; margin-bottom: 20px; padding-bottom: 15px; font-size: 14px; color: #666; }
        .email-subject { font-weight: 900; color: #000; font-size: 18px; margin-bottom: 20px; }
        .email-body { font-size: 15px; line-height: 1.6; white-space: pre-wrap; flex: 1; }

        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .act-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-copy { background: #2ecc71; color: #000; }
        .btn-clear { background: #e74c3c; color: #fff; }

        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 950px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        @media (max-width: 800px) { .editor-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Advanced AI Email Writer Engine V11</p>
        </div>

        <div class="editor-layout">
            <div class="controls">
                <div class="input-group">
                    <label>Recipient Name</label>
                    <input type="text" id="recName" placeholder="e.g. Mr. Sharma">
                </div>
                <div class="input-group">
                    <label>Purpose of Email</label>
                    <textarea id="purpose" rows="4" placeholder="e.g. Requesting a meeting to discuss business partnership"></textarea>
                </div>
                <div class="input-group">
                    <label>Tone of Writing</label>
                    <select id="tone">
                        <option value="Professional">Corporate Professional</option>
                        <option value="Friendly">Friendly & Casual</option>
                        <option value="Urgent">Urgent & Direct</option>
                        <option value="Sales">High-Converting Sales</option>
                    </select>
                </div>
                <button class="btn-ai" onclick="generateEmail()">🚀 COMPOSE AI EMAIL</button>
            </div>

            <div class="preview-pane">
                <div class="email-header">To: <span id="out_rec">Recipient</span> • From: <b>RMV AI Writer</b></div>
                <div class="email-subject" id="out_subject">Subject: [Generated by AI]</div>
                <div class="email-body" id="out_body">आपका प्रोफेशनल ईमेल यहाँ दिखाई देगा...</div>
                
                <div class="btn-row">
                    <button class="act-btn btn-copy" onclick="copyEmail()"><i class="fas fa-copy"></i> COPY TO CLIPBOARD</button>
                    <button class="act-btn btn-clear" onclick="clearAll()"><i class="fas fa-trash"></i> CLEAR ALL</button>
                </div>
            </div>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 DESIGNED BY RAMESH MEWALAL VISHWAKARMA | RMV APEX GROUP 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<40; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function generateEmail() {
            const rec = document.getElementById('recName').value || "Recipient";
            const purp = document.getElementById('purpose').value || "your inquiry";
            const tone = document.getElementById('tone').value;

            let subject = "";
            let body = "";

            if(tone === 'Professional') {
                subject = `Subject: Inquiry regarding ${purp}`;
                body = `Dear ${rec},\n\nI hope this email finds you well.\n\nI am writing to formally address the matter of ${purp}. At RMV APEX GROUP, we pride ourselves on efficiency and professional excellence, and we believe this alignment will be highly beneficial.\n\nPlease let me know a convenient time for us to discuss this further.\n\nBest regards,\n[Your Name]\nRMV APEX GROUP`;
            } else if(tone === 'Sales') {
                subject = `Subject: Special Opportunity: Unlock ${purp} Success`;
                body = `Hi ${rec},\n\nWhat if you could transform your approach to ${purp} overnight? 🚀\n\nWe've helped hundreds of clients achieve massive results, and we'd love to do the same for you. Our latest solutions are designed to maximize your growth with minimal effort.\n\nAre you ready to take the next step? Reply "YES" to get started.\n\nCheers,\n[Your Name]`;
            } else if(tone === 'Urgent') {
                subject = `URGENT: Action Required regarding ${purp}`;
                body = `Hello ${rec},\n\nThis is an urgent reminder regarding ${purp}. We require your immediate attention on this matter to ensure all deadlines are met without delay.\n\nPlease review and get back to us by EOD.\n\nRegards,\n[Your Name]`;
            } else {
                subject = `Hey ${rec}, a quick note about ${purp}`;
                body = `Hi ${rec},\n\nHope you're having a great week! Just wanted to reach out and chat about ${purp}. \n\nLet me know if you have any thoughts or if there's anything I can help with. Looking forward to catching up soon!\n\nBest,\n[Your Name]`;
            }

            document.getElementById('out_rec').innerText = rec;
            document.getElementById('out_subject').innerText = subject;
            document.getElementById('out_body').innerText = body;
            alert("Professional Email Drafted! 🚩");
        }

        function copyEmail() {
            const subj = document.getElementById('out_subject').innerText;
            const body = document.getElementById('out_body').innerText;
            navigator.clipboard.writeText(subj + "\n\n" + body);
            alert("Email Copied! 🚩");
        }

        function clearAll() {
            document.getElementById('recName').value = "";
            document.getElementById('purpose').value = "";
            document.getElementById('out_body').innerText = "आपका प्रोफेशनल ईमेल यहाँ दिखाई देगा...";
            document.getElementById('out_subject').innerText = "Subject: [Generated by AI]";
        }
    </script>
</body>
</html>
