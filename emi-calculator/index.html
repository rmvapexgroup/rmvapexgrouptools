<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #0ea5e9; --d: #0f172a; --bg: #f8fafc; --gold: #f59e0b; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; display: block !important; padding: 40px; } .no-print { display: none !important; } }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; position: relative; overflow-x: hidden; }
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 5rem; font-weight: 900; color: rgba(15, 23, 42, 0.03); z-index: 0; pointer-events: none; text-transform: uppercase; white-space: nowrap; }
        .card { background: white; padding: 35px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #f1f5f9; position: relative; z-index: 10; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--gold)); border-radius: 35px 35px 0 0; }
        .back-nav { position: absolute; top: 20px; left: 20px; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; font-weight: 700; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        #res-box { background: #f0f9ff; padding: 20px; border-radius: 20px; border: 2px dashed var(--p); text-align: center; display: none; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .btn-calc { background: var(--d); color: white; }
        .btn-down { background: #ecfdf5; color: #10b981; }
        #print-area { display: none; }
    </style>
</head>
<body>
<div class="watermark">RMV APEX GROUP</div>
<div class="card no-print">
    <div class="back-nav"><a href="../index.html" style="text-decoration:none; color:var(--gold); font-weight:800; font-size:0.7rem;">← DASHBOARD</a></div>
    <h2 style="text-align:center;">💰 EMI Calculator</h2>
    <input type="number" id="loan" placeholder="Loan Amount (₹)" oninput="calc()">
    <input type="number" id="rate" placeholder="Interest Rate %" oninput="calc()">
    <input type="number" id="months" placeholder="Months (समय)" oninput="calc()">
    <div id="res-box">
        <p style="margin:0; font-size:0.8rem; font-weight:700;">Monthly EMI</p>
        <h2 style="margin:5px 0; color:var(--p);">₹<span id="emi-val">0</span></h2>
    </div>
    <button class="btn btn-calc" onclick="calc()">CALCULATE</button>
    <button class="btn btn-down" onclick="window.print()">LOAN REPORT</button>
</div>
<div id="print-area">
    <h1>RMV APEX GROUP</h1><hr><h2>EMI ANALYSIS REPORT</h2>
    <p>Loan: ₹<span id="p-loan"></span> | Rate: <span id="p-rate"></span>% | Tenure: <span id="p-months"></span> Mos</p>
    <h2 style="color:var(--p);">Monthly EMI: ₹<span id="p-emi"></span></h2>
    <p>Generated by Ramesh Mewalal Vishwakarma 🚩</p>
</div>
<script>
    function calc() {
        let p = document.getElementById('loan').value, r = document.getElementById('rate').value/1200, n = document.getElementById('months').value;
        if(!p || !r || !n) return;
        let emi = (p * r * Math.pow(1+r, n)) / (Math.pow(1+r, n)-1);
        document.getElementById('emi-val').innerText = Math.round(emi).toLocaleString();
        document.getElementById('res-box').style.display = "block";
        document.getElementById('p-loan').innerText = p; document.getElementById('p-rate').innerText = r*1200;
        document.getElementById('p-months').innerText = n; document.getElementById('p-emi').innerText = Math.round(emi).toLocaleString();
    }
</script>
</body>
</html>
