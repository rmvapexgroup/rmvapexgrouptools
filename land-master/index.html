<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Master Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #10b981; --s: #059669; --d: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; position: relative; overflow: hidden; }
        
        /* 🚩 BACKGROUND COPYRIGHT WATERMARK */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 12vw, 6rem); font-weight: 900; color: rgba(16, 185, 129, 0.07); z-index: 0; white-space: nowrap; pointer-events: none; text-transform: uppercase; letter-spacing: 10px; }

        .card { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.08); width: 100%; max-width: 480px; border: 1px solid #f1f5f9; position: relative; z-index: 10; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); border-radius: 35px 35px 0 0; }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--d); font-weight: 800; font-size: 0.7rem; opacity: 0.5; transition: 0.3s; }
        .back-link:hover { opacity: 1; color: var(--p); }

        h2 { color: var(--d); margin: 15px 0 5px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        .tagline { display: block; text-align: center; color: #94a3b8; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 800; color: #64748b; font-size: 0.7rem; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 0.95rem; outline: none; transition: 0.3s; font-weight: 700; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }

        #result-display { background: linear-gradient(135deg, var(--p), var(--s)); padding: 20px; border-radius: 20px; text-align: center; color: white; margin-bottom: 20px; display: none; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        #res-val { font-size: 1.8rem; font-weight: 900; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.8rem; color: white; }
        .btn-copy { background: #6366f1; } .btn-save { background: #a855f7; }
        .btn-down { background: #0f172a; } .btn-clear { background: #f1f5f9; color: #64748b; }

        /* 🚩 SUPPORT SECTION */
        .support-section { margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; text-align: center; }
        .support-btns { display: flex; justify-content: center; gap: 10px; margin-top: 8px; }
        .s-btn { padding: 8px 12px; border-radius: 10px; text-decoration: none; font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .bmc { background: #FFDD00; color: #000; } .kofi { background: #29abe0; color: #fff; }

        .footer { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #94a3b8; font-weight: 800; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RAMESH MEWALAL VISHWAKARMA</div>

<div class="card">
    <div class="back-nav"><a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> BACK</a></div>
    <h2>📏 Land Master Pro</h2>
    <span class="tagline">RMV APEX GROUP • LAND SOLUTIONS</span>
    
    <div class="input-group">
        <label>Region</label>
        <select id="region" onchange="loadUnits()">
            <option value="metric">Standard (Acre/Hectare)</option>
            <option value="up">Uttar Pradesh (Bigha/Biswa)</option>
            <option value="mh">Maharashtra (Guntha)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Value</label>
        <input type="number" id="area-val" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="grid-2">
        <select id="from-unit" onchange="calculate()"></select>
        <select id="to-unit" onchange="calculate()"></select>
    </div>

    <div id="result-display">
        <div id="res-val">0.00</div>
        <div id="res-unit" style="font-size:0.7rem; font-weight:700; opacity:0.8;">Units</div>
    </div>

    <div class="btn-grid">
        <button class="btn btn-copy" onclick="copy()"><i class="fas fa-copy"></i> Copy</button>
        <button class="btn btn-save" onclick="save()"><i class="fas fa-save"></i> Save</button>
        <button class="btn btn-down" onclick="down()"><i class="fas fa-download"></i> PDF</button>
        <button class="btn btn-clear" onclick="clr()"><i class="fas fa-eraser"></i> Clear</button>
    </div>

    <div class="support-section">
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" class="s-btn bmc" target="_blank"><i class="fas fa-coffee"></i> Coffee</a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" class="s-btn kofi" target="_blank"><i class="fas fa-mug-hot"></i> Ko-fi</a>
        </div>
    </div>

    <div class="footer">© 2026 RAMESH MEWALAL VISHWAKARMA 🚩</div>
</div>

<script>
    const data = {
        metric: { "Sq. Ft": 1, "Acre": 43560, "Hectare": 107639 },
        up: { "Bigha": 27225, "Biswa": 1361.25 },
        mh: { "Guntha": 1089, "Vigha": 17424 }
    };
    function loadUnits() {
        const reg = document.getElementById('region').value;
        const f = document.getElementById('from-unit'), t = document.getElementById('to-unit');
        f.innerHTML = ""; t.innerHTML = "";
        Object.keys(data[reg]).forEach(u => { f.add(new Option(u, u)); t.add(new Option(u, u)); });
        t.selectedIndex = 1; calculate();
    }
    function calculate() {
        const val = parseFloat(document.getElementById('area-val').value);
        const reg = document.getElementById('region').value;
        const from = document.getElementById('from-unit').value, to = document.getElementById('to-unit').value;
        if (isNaN(val) || val <= 0) { document.getElementById('result-display').style.display = "none"; return; }
        const res = (val * data[reg][from]) / data[reg][to];
        document.getElementById('res-val').innerText = res.toLocaleString(undefined, {maximumFractionDigits: 4});
        document.getElementById('res-unit').innerText = to;
        document.getElementById('result-display').style.display = "block";
    }
    function copy() { navigator.clipboard.writeText(document.getElementById('res-val').innerText); alert("Copied! 🚩"); }
    function clr() { document.getElementById('area-val').value = ""; document.getElementById('result-display').style.display = "none"; }
    loadUnits();
</script>
</body>
</html>
