<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Step-up Master 🚩</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; overflow-x: hidden; }

        /* Repeating Watermark */
        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.07; display: flex; flex-wrap: wrap; justify-content: space-around; align-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 40px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; max-width: 800px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; letter-spacing: 1px; }
        
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .i-box { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; }
        .i-box label { font-size: 10px; color: var(--accent); display: block; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .i-box input, .i-box select { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; font-weight: bold; }
        select option { background: #000; }

        .btn-calc { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; margin-bottom: 15px; }
        
        #results { display: none; background: rgba(255,255,255,0.03); border: 1px dashed var(--accent); border-radius: 20px; padding: 25px; text-align: center; margin-top: 20px; }
        .res-big { font-size: 2.8rem; font-weight: 900; color: var(--success); margin: 10px 0; }
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 25px; }
        .act-btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #fff; font-size: 11px; }

        .sup-links { margin-top: 35px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 800px; }
        .s-btn { padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; text-align: center; font-size: 12px; }
        .footer { margin-top: 40px; font-size: 10px; opacity: 0.5; font-weight: bold; }
    </style>
</head>
<body onload="loadData()">

    <div class="watermark-bg" id="wm"></div>

    <div class="container" id="printable">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>STEP-UP SIP & LUMPSUM GROWTH ENGINE V11</p>
        </div>

        <div class="input-grid">
            <div class="i-box"><label>Monthly SIP Amount (₹)</label><input type="number" id="sip_amt" placeholder="eg. 5000"></div>
            <div class="i-box"><label>Lumpsum Investment (₹)</label><input type="number" id="lump_amt" value="0"></div>
            <div class="i-box"><label>Yearly Step-up (%)</label><input type="number" id="step_up" value="10"></div>
            <div class="i-box"><label>Expected Return (%)</label><input type="number" id="roi" value="12"></div>
            <div class="i-box" style="grid-column: span 2;"><label>Period (Years)</label><input type="number" id="years" placeholder="eg. 15"></div>
        </div>

        <button class="btn-calc" onclick="calculateGrowth()">🚀 CALCULATE WEALTH MULTIPLICATION</button>

        <div id="results">
            <span style="font-size: 10px; opacity: 0.7; text-transform: uppercase;">Estimated Wealth (Final Value)</span>
            <div class="res-big" id="final_val">₹0</div>
            
            <div class="detail-row"><span>Total Invested:</span><b id="total_inv">₹0</b></div>
            <div class="detail-row"><span>Total Gain:</span><b id="total_gain" style="color:var(--gold)">₹0</b></div>
            <div class="detail-row"><span>Last Monthly SIP:</span><b id="last_sip" style="color:var(--accent)">₹0</b></div>
        </div>

        <div class="action-row">
            <button class="act-btn" style="background:#238636" onclick="saveData()">SAVE</button>
            <button class="act-btn" style="background:#4a5568" onclick="exportPDF()">PDF REPORT</button>
            <button class="act-btn" style="background:#c53030" onclick="resetForm()">CLEAR</button>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">☕ BUY ME A COFFEE</a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">❤️ SUPPORT ON KO-FI</a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | POWERED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<40; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function calculateGrowth() {
            let monthlySIP = parseFloat(document.getElementById('sip_amt').value) || 0;
            let lumpsum = parseFloat(document.getElementById('lump_amt').value) || 0;
            const stepUpPct = (parseFloat(document.getElementById('step_up').value) || 0) / 100;
            const annualROI = parseFloat(document.getElementById('roi').value) / 100;
            const years = parseInt(document.getElementById('years').value);
            const monthlyROI = annualROI / 12;

            if((!monthlySIP && !lumpsum) || !years) return alert("संख्याएं भरें! 🚩");

            let totalInvested = lumpsum;
            let futureValue = lumpsum * Math.pow(1 + annualROI, years); // Lumpsum FV
            
            let currentSIP = monthlySIP;
            let sipFV = 0;

            for (let year = 1; year <= years; year++) {
                // Calculate SIP for 12 months in current year
                for (let month = 1; month <= 12; month++) {
                    totalInvested += currentSIP;
                    // Compound each SIP installment to the end of the total period
                    let monthsLeft = (years * 12) - ((year - 1) * 12 + month) + 1;
                    sipFV += currentSIP * Math.pow(1 + monthlyROI, monthsLeft);
                }
                // Increase SIP amount for the next year
                if(year < years) {
                    currentSIP = currentSIP * (1 + stepUpPct);
                }
            }

            const finalValue = futureValue + sipFV;
            const totalGain = finalValue - totalInvested;

            document.getElementById('final_val').innerText = "₹" + Math.round(finalValue).toLocaleString('en-IN');
            document.getElementById('total_inv').innerText = "₹" + Math.round(totalInvested).toLocaleString('en-IN');
            document.getElementById('total_gain').innerText = "₹" + Math.round(totalGain).toLocaleString('en-IN');
            document.getElementById('last_sip').innerText = "₹" + Math.round(currentSIP).toLocaleString('en-IN');
            
            document.getElementById('results').style.display = 'block';
        }

        function exportPDF() {
            const element = document.getElementById('printable');
            html2pdf().from(element).set({
                margin: 10, filename: 'RMV_Wealth_Growth.pdf',
                html2canvas: { scale: 2, backgroundColor: '#05070a' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

        function saveData() {
            const d = { s:document.getElementById('sip_amt').value, l:document.getElementById('lump_amt').value, st:document.getElementById('step_up').value, r:document.getElementById('roi').value, y:document.getElementById('years').value };
            localStorage.setItem('rmv_stepup_data', JSON.stringify(d));
            alert("Data Saved! 🚩");
        }

        function loadData() {
            const s = localStorage.getItem('rmv_stepup_data');
            if(s) {
                const d = JSON.parse(s);
                document.getElementById('sip_amt').value = d.s;
                document.getElementById('lump_amt').value = d.l;
                document.getElementById('step_up').value = d.st;
                document.getElementById('roi').value = d.r;
                document.getElementById('years').value = d.y;
            }
        }

        function resetForm() { localStorage.removeItem('rmv_stepup_data'); location.reload(); }
    </script>
</body>
</html>
