<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | AI Mini GPT 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --primary: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --user-bubble: #1a1c23; --ai-bubble: #0a0c10; --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Branding Watermark */
        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.03; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 15px; margin: 50px; color: #fff; }

        /* Header */
        header { background: var(--glass); backdrop-filter: blur(15px); padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .brand h1 { font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: 1px; }
        .status { font-size: 10px; color: #2ecc71; display: flex; align-items: center; gap: 5px; text-transform: uppercase; font-weight: bold; }
        .dot { height: 8px; width: 8px; background: #2ecc71; border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: thin; scroll-behavior: smooth; }
        .message { max-width: 80%; padding: 15px 20px; border-radius: 20px; font-size: 14px; line-height: 1.5; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { align-self: flex-end; background: var(--user-bubble); color: #fff; border-bottom-right-radius: 2px; border: 1px solid rgba(255,255,255,0.1); }
        .ai-msg { align-self: flex-start; background: var(--ai-bubble); color: #fff; border-bottom-left-radius: 2px; border: 1px solid var(--primary); }
        
        .ai-msg::before { content: '🤖 RMV AI'; position: absolute; top: -18px; left: 5px; font-size: 9px; font-weight: 900; color: var(--primary); text-transform: uppercase; }
        .user-msg::before { content: '👤 YOU'; position: absolute; top: -18px; right: 5px; font-size: 9px; font-weight: 900; color: #888; text-transform: uppercase; }

        /* Typing Animation */
        .typing { display: flex; gap: 5px; padding: 10px; }
        .typing span { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: bounce 1s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* Input Bar */
        .input-bar { background: var(--glass); backdrop-filter: blur(15px); padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 15px; align-items: center; }
        .input-bar input { flex: 1; background: #000; border: 1px solid #333; padding: 15px 25px; border-radius: 30px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        .input-bar input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }
        .btn-send { background: var(--primary); color: #000; border: none; height: 50px; width: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-send:hover { transform: scale(1.1) rotate(-10deg); }

        /* Support Buttons */
        .support-links { position: fixed; right: 20px; top: 100px; display: flex; flex-direction: column; gap: 10px; }
        .s-link { text-decoration: none; padding: 10px; border-radius: 12px; font-size: 18px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .s-link:hover { transform: translateX(-5px); }

        .footer { text-align: center; font-size: 9px; opacity: 0.4; padding: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <header>
        <div class="brand">
            <h1>RMV APEX AI 🚩</h1>
        </div>
        <div class="status">
            <span class="dot"></span> Online
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai-msg">नमस्ते 🚩! मैं <b>RMV APEX GROUP</b> का एआई असिस्टेंट हूँ। मैं आपकी क्या मदद कर सकता हूँ?</div>
    </div>

    <div id="typing-indicator" style="display: none; margin-left: 25px;">
        <div class="typing"><span></span><span></span><span></span></div>
    </div>

    <div class="input-bar">
        <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div class="support-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-link" style="background: #FFDD00; color: #000;" title="Buy Me a Coffee"><i class="fas fa-coffee"></i></a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-link" style="background: #29abe0; color: #fff;" title="Support on Ko-fi"><i class="fas fa-heart"></i></a>
    </div>

    <div class="footer">🚩 DESIGNED BY RAMESH MEWALAL VISHWAKARMA | RMV APEX GROUP 🚩</div>

    <script>
        // Background Watermark Generator
        const wm = document.getElementById('wm');
        for(let i=0; i<40; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // User Message
            appendMessage(text, 'user-msg');
            userInput.value = '';

            // AI Response Simulation
            showTyping(true);
            setTimeout(() => {
                showTyping(false);
                const response = getAIResponse(text);
                appendMessage(response, 'ai-msg');
            }, 1500);
        }

        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping(show) {
            typingIndicator.style.display = show ? 'block' : 'none';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function getAIResponse(input) {
            const query = input.toLowerCase();
            if (query.includes("hello") || query.includes("hi") || query.includes("namaste")) {
                return "नमस्ते 🚩! मैं <b>RMV APEX AI</b> हूँ। मैं आपकी बिजनेस और प्रोडक्टिविटी में मदद कर सकता हूँ। आप क्या जानना चाहेंगे?";
            } else if (query.includes("who are you") || query.includes("about")) {
                return "मैं <b>RMV APEX GROUP</b> का एक एडवांस एआई टूल हूँ, जिसे <b>रमेश मेवालाल विश्वकर्मा</b> जी ने डिजाइन किया है।";
            } else if (query.includes("help") || query.includes("service")) {
                return "मैं आपको कई टूल्स प्रदान कर सकता हूँ: <br>• Resume Builder<br>• SEO Tools<br>• Financial Calculators<br>• Bio Generator";
            } else if (query.includes("time")) {
                return "अभी का समय है: " + new Date().toLocaleTimeString();
            } else {
                return "बहुत बढ़िया! आपके इस सवाल पर मैं और अधिक रिसर्च कर सकता हूँ। क्या आप <b>RMV APEX GROUP</b> के अन्य टूल्स का उपयोग करना चाहेंगे? 🚩";
            }
        }
    </script>
</body>
</html>
