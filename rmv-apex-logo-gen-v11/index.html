<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | AI Logo Generator 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #030508; --primary: #00d2ff; --glass: rgba(255, 255, 255, 0.03); --gold: #ffd700; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.04; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 15px; margin: 50px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 35px; width: 100%; max-width: 900px; border-top: 6px solid var(--primary); box-shadow: 0 30px 60px rgba(0,0,0,0.6); margin-bottom: 30px; }
        .header h1 { color: var(--primary); text-align: center; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; }

        .editor-layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        
        /* Control Section */
        .controls { background: rgba(0,0,0,0.3); padding: 25px; border-radius: 20px; border: 1px solid #222; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 10px; color: var(--gold); font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); }

        /* Preview Section */
        .preview-pane { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; border-radius: 20px; padding: 40px; position: relative; min-height: 400px; }
        #logo-canvas { width: 300px; height: 300px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .btn-gen { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: #fff; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-gen:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); }

        .btn-download { background: #2ecc71; color: #000; margin-top: 20px; padding: 12px 30px; border-radius: 30px; font-weight: 900; text-decoration: none; cursor: pointer; border: none; font-size: 14px; }

        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 900px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        @media (max-width: 800px) { .editor-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Ultra AI Logo Generator V11</p>
        </div>

        <div class="editor-layout">
            <div class="controls">
                <div class="input-group">
                    <label>Brand Name</label>
                    <input type="text" id="brandName" placeholder="e.g. RMV APEX" oninput="generateLogo()">
                </div>
                <div class="input-group">
                    <label>Slogan (Optional)</label>
                    <input type="text" id="slogan" placeholder="e.g. Apex Excellence" oninput="generateLogo()">
                </div>
                <div class="input-group">
                    <label>Logo Shape</label>
                    <select id="logoShape" onchange="generateLogo()">
                        <option value="circle">Professional Circle</option>
                        <option value="square">Modern Square</option>
                        <option value="diamond">Luxury Diamond</option>
                        <option value="minimal">Minimal Text Only</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Theme Color</label>
                    <input type="color" id="themeColor" value="#00d2ff" oninput="generateLogo()">
                </div>
                <button class="btn-gen" onclick="generateLogo()">🎲 RANDOMIZE STYLE</button>
            </div>

            <div class="preview-pane">
                <div id="logo-container">
                    <svg id="logo-canvas" viewBox="0 0 400 400"></svg>
                </div>
                <button class="btn-download" onclick="downloadSVG()">📥 DOWNLOAD VECTOR (SVG)</button>
            </div>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 DESIGNED BY RAMESH MEWALAL VISHWAKARMA | RMV APEX GROUP 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<40; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function generateLogo() {
            const name = document.getElementById('brandName').value || "RMV APEX";
            const slogan = document.getElementById('slogan').value || "Logo Generator";
            const color = document.getElementById('themeColor').value;
            const shape = document.getElementById('logoShape').value;
            const svg = document.getElementById('logo-canvas');

            let shapeMarkup = "";
            if(shape === 'circle') {
                shapeMarkup = `<circle cx="200" cy="200" r="180" fill="none" stroke="${color}" stroke-width="15" />
                               <circle cx="200" cy="200" r="160" fill="none" stroke="${color}" stroke-width="2" opacity="0.3"/>`;
            } else if(shape === 'square') {
                shapeMarkup = `<rect x="40" y="40" width="320" height="320" fill="none" stroke="${color}" stroke-width="15" rx="20"/>`;
            } else if(shape === 'diamond') {
                shapeMarkup = `<rect x="100" y="100" width="200" height="200" fill="none" stroke="${color}" stroke-width="15" transform="rotate(45 200 200)"/>`;
            }

            svg.innerHTML = `
                ${shapeMarkup}
                <text x="50%" y="48%" dominant-baseline="middle" text-anchor="middle" font-family="Arial Black" font-size="45" fill="#333" style="text-transform:uppercase;">${name}</text>
                <text x="50%" y="62%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-size="14" fill="#888" letter-spacing="5">${slogan}</text>
                <path d="M150 250 L250 250" stroke="${color}" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
            `;
        }

        function downloadSVG() {
            const svgData = document.getElementById('logo-canvas').outerHTML;
            const svgBlob = new Blob([svgData], {type:"image/svg+xml;charset=utf-8"});
            const svgUrl = URL.createObjectURL(svgBlob);
            const downloadLink = document.createElement("a");
            downloadLink.href = svgUrl;
            downloadLink.download = "RMV_APEX_Logo.svg";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        // Init
        generateLogo();
    </script>
</body>
</html>
