<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Gold Master 🚩</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --gold: #ffd700; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }

        /* Branding Watermark */
        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.08; display: flex; flex-wrap: wrap; justify-content: space-around; align-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 45px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; max-width: 850px; border-top: 6px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header h1 { color: var(--gold); text-align: center; font-weight: 900; letter-spacing: 2px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; }
        
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .i-box { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; }
        .i-box label { font-size: 10px; color: var(--gold); display: block; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .i-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; font-weight: bold; }

        .btn-calc { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(135deg, #ffd700, #b8860b); color: #000; font-weight: 900; cursor: pointer; font-size: 16px; margin-bottom: 15px; }
        
        #results { display: none; margin-top: 20px; }
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); text-align: center; }
        .card h3 { font-size: 14px; margin-bottom: 10px; color: var(--gold); }
        .val-big { font-size: 2.2rem; font-weight: 900; margin: 10px 0; color: #fff; }
        
        .sgb-card { border: 2px solid var(--gold); background: rgba(255, 215, 0, 0.05); position: relative; }
        .sgb-card::after { content: "🏆 BEST RETURN"; position: absolute; top: -10px; right: 10px; background: var(--gold); color: #000; font-size: 9px; font-weight: 900; padding: 3px 10px; border-radius: 10px; }

        .profit-info { text-align: center; background: rgba(46, 204, 113, 0.1); padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px dashed var(--success); color: var(--success); font-weight: bold; }

        .footer { margin-top: 40px; font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container" id="printable">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>GOLD INVESTMENT ANALYZER (SGB vs PHYSICAL GOLD) V11</p>
        </div>

        <div class="input-grid">
            <div class="i-box"><label>Investment Amount (₹)</label><input type="number" id="amt" value="100000"></div>
            <div class="i-box"><label>Expected Gold Appreciation (% p.a.)</label><input type="number" id="growth" value="8"></div>
            <div class="i-box"><label>Investment Tenure (Years)</label><input type="number" id="years" value="8"></div>
            <div class="i-box"><label>Making Charges (Physical Gold %)</label><input type="number" id="making" value="10"></div>
        </div>

        <button class="btn-calc" onclick="calculateGold()">🚀 ANALYZE RETURNS</button>

        <div id="results">
            <div class="comparison-grid">
                <div class="card sgb-card">
                    <h3>Sovereign Gold Bond (SGB)</h3>
                    <div class="val-big" id="sgb_val">₹0</div>
                    <div style="font-size: 11px; opacity: 0.8;">Includes 2.5% Annual Interest + Zero Tax</div>
                </div>
                <div class="card">
                    <h3>Physical Gold (Sikka/Jewelry)</h3>
                    <div class="val-big" id="phy_val">₹0</div>
                    <div style="font-size: 11px; opacity: 0.8;">Includes Making Charges + Storage Cost</div>
                </div>
            </div>

            <div class="profit-info" id="advice">...</div>
        </div>

        <div style="margin-top:25px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="window.print()" style="padding:12px; border-radius:10px; border:none; background:#4a5568; color:white; cursor:pointer; font-weight:bold;">PRINT REPORT</button>
            <button onclick="location.reload()" style="padding:12px; border-radius:10px; border:none; background:#c53030; color:white; cursor:pointer; font-weight:bold;">RESET</button>
        </div>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<40; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function calculateGold() {
            const P = parseFloat(document.getElementById('amt').value);
            const r = parseFloat(document.getElementById('growth').value) / 100;
            const t = parseInt(document.getElementById('years').value);
            const making = parseFloat(document.getElementById('making').value) / 100;

            if(!P || !t) return alert("संख्याएं सही भरें! 🚩");

            // 1. SGB Calculation
            // Maturity = P*(1+r)^t + Annual Interest (2.5% simple on P)
            const goldValueSGB = P * Math.pow(1 + r, t);
            const totalInterestSGB = (P * 0.025) * t;
            const totalSGB = goldValueSGB + totalInterestSGB;

            // 2. Physical Gold Calculation
            // Initial Cost = P + Making Charges
            // But we invest P, so the actual gold bought is P / (1 + making)
            const actualGoldBought = P / (1 + making);
            const totalPhy = actualGoldBought * Math.pow(1 + r, t);

            document.getElementById('sgb_val').innerText = "₹" + Math.round(totalSGB).toLocaleString('en-IN');
            document.getElementById('phy_val').innerText = "₹" + Math.round(totalPhy).toLocaleString('en-IN');

            const diff = totalSGB - totalPhy;
            document.getElementById('advice').innerText = `🚩 RMV APEX INSIGHT: SGB gives you ₹${Math.round(diff).toLocaleString('en-IN')} extra profit!`;
            
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
