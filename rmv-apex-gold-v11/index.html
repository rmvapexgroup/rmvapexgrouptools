<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Gold Hub 🚩</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --gold: #ffd700; --gold-dark: #b8860b; --glass: rgba(255, 255, 255, 0.05); --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        /* Watermark Background */
        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.06; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 16px; margin: 50px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; max-width: 800px; border-top: 6px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--gold); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; }
        
        .section-title { font-size: 12px; color: var(--gold); margin: 15px 0 10px; font-weight: bold; text-transform: uppercase; border-left: 3px solid var(--gold); padding-left: 10px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .i-box { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; }
        .i-box label { font-size: 10px; color: #aaa; display: block; margin-bottom: 5px; }
        .i-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 18px; font-weight: bold; }

        .btn-calc { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-calc:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        
        #results { display: none; margin-top: 25px; margin-bottom: 20px; }
        .summary-box { background: rgba(255, 215, 0, 0.05); padding: 25px; border-radius: 20px; text-align: center; border: 2px dashed var(--gold); margin-bottom: 20px; }
        .res-val { font-size: 2.8rem; font-weight: 900; color: var(--gold); margin: 10px 0; }

        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .comp-card { padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .comp-card h4 { font-size: 11px; opacity: 0.8; text-transform: uppercase; margin-bottom: 10px; }
        .comp-card .val { font-size: 1.4rem; font-weight: 900; }
        .comp-card.better { border-color: var(--success); background: rgba(46, 204, 113, 0.05); }

        /* Support Section Styling */
        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 800px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .s-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; }

        @media print { .sup-links, button { display: none !important; } }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container" id="printable">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Gold Investment Analyzer (SGB vs Physical) V11</p>
        </div>

        <div class="section-title">Investment Details</div>
        <div class="input-grid">
            <div class="i-box"><label>Investment Amount (₹)</label><input type="number" id="invest_amt" value="100000"></div>
            <div class="i-box"><label>Exp. Annual Growth (%)</label><input type="number" id="gold_growth" value="8"></div>
            <div class="i-box" style="grid-column: span 2;"><label>Tenure (Years - SGB is 8 Yrs)</label><input type="number" id="tenure" value="8"></div>
        </div>

        <button class="btn-calc" onclick="calculateGold()">🚀 ANALYZE GOLD RETURNS</button>

        <div id="results">
            <div class="summary-box">
                <span style="font-size: 11px; text-transform: uppercase; font-weight: bold;">Extra Profit with SGB</span>
                <div class="res-val" id="extra_profit">₹0</div>
                <p id="advice_txt" style="font-size: 13px; color: #fff;"></p>
            </div>

            <div class="compare-grid">
                <div class="comp-card">
                    <h4>Physical Gold</h4>
                    <div class="val" id="physical_res">₹0</div>
                    <div style="font-size: 10px; margin-top: 5px; opacity: 0.7;">Value after Growth</div>
                </div>
                <div class="comp-card better">
                    <h4>SGB (Sovereign Gold Bond)</h4>
                    <div class="val" id="sgb_res" style="color: var(--success);">₹0</div>
                    <div style="font-size: 10px; margin-top: 5px; opacity: 0.7;">Value + 2.5% Interest</div>
                </div>
            </div>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        // Generate Watermarks
        const wm = document.getElementById('wm');
        for(let i=0; i<40; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function calculateGold() {
            const principal = parseFloat(document.getElementById('invest_amt').value);
            const growth = parseFloat(document.getElementById('gold_growth').value) / 100;
            const years = parseFloat(document.getElementById('tenure').value);

            // 1. Physical Gold (Compound Growth)
            const physicalFinal = principal * Math.pow(1 + growth, years);

            // 2. SGB (Compound Growth + 2.5% Simple Interest on Face Value)
            const sgbInterest = principal * 0.025 * years;
            const sgbFinal = physicalFinal + sgbInterest;

            const extra = sgbFinal - physicalFinal;

            // Display
            document.getElementById('physical_res').innerText = "₹" + Math.round(physicalFinal).toLocaleString('en-IN');
            document.getElementById('sgb_res').innerText = "₹" + Math.round(sgbFinal).toLocaleString('en-IN');
            document.getElementById('extra_profit').innerText = "₹" + Math.round(extra).toLocaleString('en-IN');
            
            document.getElementById('advice_txt').innerText = `🚩 RMV APEX ADVICE: SGB gives you ${years * 2.5}% extra interest over Physical gold!`;
            
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
