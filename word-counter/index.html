<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #10b981; --d: #0f172a; --bg: #f8fafc; --gold: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; position: relative; overflow-x: hidden; }
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 5rem; font-weight: 900; color: rgba(15, 23, 42, 0.03); z-index: 0; pointer-events: none; text-transform: uppercase; white-space: nowrap; }
        .card { background: white; padding: 30px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border: 1px solid #f1f5f9; position: relative; z-index: 10; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--gold)); border-radius: 35px 35px 0 0; }
        .back-nav { position: absolute; top: 20px; left: 20px; }
        textarea { width: 100%; height: 180px; padding: 15px; border-radius: 15px; border: 2px solid #f1f5f9; font-size: 1rem; font-weight: 600; resize: none; outline: none; box-sizing: border-box; margin-bottom: 15px; transition: 0.3s; }
        textarea:focus { border-color: var(--p); background: #fdfdfd; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f0fdf4; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #dcfce7; }
        .stat-box h3 { margin: 0; color: var(--d); font-size: 1.5rem; }
        .stat-box p { margin: 0; font-size: 0.7rem; font-weight: 800; color: var(--p); text-transform: uppercase; }
        .btn-clear { width: 100%; padding: 12px; border: none; border-radius: 12px; background: #fff1f2; color: #e11d48; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-clear:hover { background: #ffe4e6; }
    </style>
</head>
<body>
<div class="watermark">RMV APEX GROUP</div>
<div class="card">
    <div class="back-nav"><a href="../index.html" style="text-decoration:none; color:var(--gold); font-weight:800; font-size:0.7rem;">← DASHBOARD</a></div>
    <h2 style="text-align:center;">✍️ Word Counter</h2>
    <textarea id="text" placeholder="अपना टेक्स्ट यहाँ लिखें या पेस्ट करें..." oninput="count()"></textarea>
    <div class="stats-grid">
        <div class="stat-box"><h3 id="w-count">0</h3><p>Words</p></div>
        <div class="stat-box"><h3 id="c-count">0</h3><p>Characters</p></div>
    </div>
    <button class="btn-clear" onclick="document.getElementById('text').value=''; count();">CLEAR ALL</button>
</div>
<script>
    function count() {
        const t = document.getElementById('text').value.trim();
        document.getElementById('w-count').innerText = t === "" ? 0 : t.split(/\s+/).length;
        document.getElementById('c-count').innerText = t.length;
    }
</script>
</body>
</html>
