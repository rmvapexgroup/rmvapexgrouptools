<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #10b981; --s: #3b82f6; --d: #0f172a; --bg: #f8fafc; --gold: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; position: relative; padding: 20px; }
        
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(16, 185, 129, 0.04); z-index: -1; pointer-events: none; text-transform: uppercase; white-space: nowrap; letter-spacing: 8px; }

        .card { background: white; padding: 35px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.08); width: 100%; max-width: 600px; border: 1px solid #f1f5f9; position: relative; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--gold); font-weight: 800; font-size: 0.75rem; display: flex; align-items: center; gap: 5px; opacity: 0.8; transition: 0.3s; }
        .back-link:hover { opacity: 1; transform: translateX(-3px); }

        h2 { text-align: center; color: var(--d); font-weight: 800; margin-bottom: 20px; }

        textarea { width: 100%; height: 220px; padding: 20px; border-radius: 20px; border: 2px solid #f1f5f9; font-size: 1rem; font-weight: 600; resize: none; outline: none; box-sizing: border-box; transition: 0.3s; background: #fafafa; line-height: 1.6; }
        textarea:focus { border-color: var(--p); background: white; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.05); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin: 20px 0; }
        .stat-box { background: #f0fdf4; padding: 15px 10px; border-radius: 18px; text-align: center; border: 1px solid #dcfce7; transition: 0.3s; }
        .stat-box:hover { transform: translateY(-3px); background: white; }
        .stat-box h3 { margin: 0; color: var(--d); font-size: 1.4rem; font-family: 'JetBrains Mono', monospace; }
        .stat-box p { margin: 4px 0 0; font-size: 0.65rem; font-weight: 800; color: var(--p); text-transform: uppercase; letter-spacing: 0.5px; }

        .analysis-footer { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 12px 20px; border-radius: 15px; margin-bottom: 20px; font-size: 0.85rem; font-weight: 700; color: #64748b; }
        .reading-time { display: flex; align-items: center; gap: 8px; color: var(--s); }

        .btn-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 14px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; font-size: 0.8rem; }
        .btn-copy { background: #eff6ff; color: var(--s); }
        .btn-clear { background: #fff1f2; color: var(--danger); }
        .btn:hover { transform: translateY(-2px); filter: brightness(0.95); }

        /* Support Section */
        .support-section { margin-top: 35px; padding-top: 25px; border-top: 1px solid #f1f5f9; text-align: center; }
        .support-btns { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 15px; }
        .kofi-btn { background: #29abe0; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(41,171,224,0.2); transition: 0.3s; }
        .kofi-btn:hover { transform: translateY(-2px); }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding-top: 15px; border-top: 1px solid #f8fafc; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <div class="back-nav">
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </div>

    <h2>✍️ Word Counter Pro</h2>
    
    <textarea id="textInput" placeholder="अपना टेक्स्ट यहाँ लिखें या पेस्ट करें..." oninput="analyzeText()"></textarea>

    <div class="analysis-footer">
        <div class="reading-time">
            <i class="fas fa-clock"></i> Reading Time: <span id="readingTime">0</span> min
        </div>
        <div id="charLimit" style="color: #94a3b8;">Limit: ∞</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <h3 id="w-count">0</h3>
            <p>Words</p>
        </div>
        <div class="stat-box">
            <h3 id="c-count">0</h3>
            <p>Characters</p>
        </div>
        <div class="stat-box">
            <h3 id="s-count">0</h3>
            <p>Sentences</p>
        </div>
        <div class="stat-box">
            <h3 id="p-count">0</h3>
            <p>Paragraphs</p>
        </div>
    </div>

    <div class="btn-actions">
        <button class="btn btn-copy" onclick="copyText()">
            <i class="fas fa-copy"></i> Copy Text
        </button>
        <button class="btn btn-clear" onclick="clearAll()">
            <i class="fas fa-trash-alt"></i> Clear All
        </button>
    </div>

    <div class="support-section">
        <p style="font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Support RMV APEX GROUP 🚩</p>
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank">
                <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=rameshmewalalvishwakarma&button_colour=FFDD00&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=ffffff" style="height: 40px; border-radius: 10px;">
            </a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="kofi-btn">
                <i class="fas fa-mug-hot"></i> Support on Ko-fi
            </a>
        </div>
    </div>

    <div class="footer-tag">Crafted by Ramesh Mewalal Vishwakarma 🚩</div>
</div>

<script>
    function analyzeText() {
        const text = document.getElementById('textInput').value;
        const trimmedText = text.trim();

        // Word Count
        const words = trimmedText === "" ? 0 : trimmedText.split(/\s+/).length;
        document.getElementById('w-count').innerText = words;

        // Character Count
        document.getElementById('c-count').innerText = text.length;

        // Sentence Count (Splits by . ! ?)
        const sentences = trimmedText === "" ? 0 : trimmedText.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
        document.getElementById('s-count').innerText = sentences;

        // Paragraph Count
        const paragraphs = trimmedText === "" ? 0 : trimmedText.split(/\n+/).filter(p => p.trim().length > 0).length;
        document.getElementById('p-count').innerText = paragraphs;

        // Reading Time (Average 200 words per minute)
        const time = Math.ceil(words / 200);
        document.getElementById('readingTime').innerText = time;
    }

    function clearAll() {
        document.getElementById('textInput').value = '';
        analyzeText();
    }

    async function copyText() {
        const text = document.getElementById('textInput').value;
        if (!text) return;
        try {
            await navigator.clipboard.writeText(text);
            alert("Text Copied to Clipboard! 🚩");
        } catch (err) {
            console.error("Failed to copy");
        }
    }
</script>

</body>
</html>
