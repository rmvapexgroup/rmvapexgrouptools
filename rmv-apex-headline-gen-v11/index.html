<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Headline Master 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --primary: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.06; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 50px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; max-width: 750px; border-top: 6px solid var(--primary); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--primary); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; }
        
        .section-title { font-size: 11px; color: var(--primary); margin: 15px 0 10px; font-weight: bold; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 10px; }
        .i-box { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .i-box label { font-size: 10px; color: #aaa; display: block; margin-bottom: 5px; }
        .i-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; font-weight: bold; }

        .btn-gen { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-gen:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }
        
        #results { display: none; margin-top: 30px; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .headline-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 20px; margin-bottom: 15px; cursor: pointer; position: relative; transition: 0.3s; border-left: 5px solid var(--gold); }
        .headline-card:hover { border-color: var(--primary); background: #161a20; transform: translateX(10px); }
        .headline-card span { font-size: 9px; color: var(--gold); text-transform: uppercase; font-weight: 900; display: block; margin-bottom: 8px; }
        .headline-card h3 { font-size: 18px; line-height: 1.4; color: #fff; }
        .copy-hint { position: absolute; right: 15px; top: 15px; font-size: 10px; color: var(--success); opacity: 0; }
        .headline-card:active .copy-hint { opacity: 1; }

        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 750px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .s-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>High-Conversion Headline Generator V11</p>
        </div>

        <div class="section-title">Your Product / Service Details</div>
        <div class="i-box">
            <label>What is your product/service name?</label>
            <input type="text" id="prod_name" placeholder="Ex: RMV APEX Tools, Digital Marketing Mastery...">
        </div>
        <div class="i-box">
            <label>What is the biggest result you provide?</label>
            <input type="text" id="prod_result" placeholder="Ex: Double your sales, Lose 5kg, Master Python...">
        </div>
        <div class="i-box">
            <label>Who is your target audience?</label>
            <input type="text" id="prod_audience" placeholder="Ex: Small business owners, Students, Realtors...">
        </div>

        <button class="btn-gen" onclick="generateHeadlines()">🚀 GENERATE CONVERTING HEADLINES</button>

        <div id="results">
            <div class="section-title">Click to copy your favorite Headline</div>
            <div id="headline_list"></div>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<40; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function generateHeadlines() {
            const name = document.getElementById('prod_name').value.trim();
            const result = document.getElementById('prod_result').value.trim();
            const audience = document.getElementById('prod_audience').value.trim();

            if(!name || !result || !audience) {
                alert("Please fill all details to generate powerful headlines! 🚩");
                return;
            }

            const templates = [
                { type: "Benefit Driven", text: `Finally! A Way For ${audience} To ${result} Without The Stress.` },
                { type: "Problem Solver", text: `Stop Struggling With Your Business. Let ${name} Help You ${result} Today.` },
                { type: "Authority / Proof", text: `Why Smart ${audience} Use ${name} To ${result} In Record Time.` },
                { type: "Question Hook", text: `Want To ${result}? Discover How ${name} Makes It Easier For ${audience}.` },
                { type: "Social Proof", text: `Join 1,000+ ${audience} Who Have Already Used ${name} To ${result}.` }
            ];

            const container = document.getElementById('headline_list');
            container.innerHTML = "";

            templates.forEach(t => {
                const card = document.createElement('div');
                card.className = "headline-card";
                card.innerHTML = `<span>${t.type}</span> <h3>${t.text}</h3> <div class="copy-hint">COPIED</div>`;
                card.onclick = () => {
                    navigator.clipboard.writeText(t.text);
                    alert("Headline Copied! 🚩");
                };
                container.appendChild(card);
            });

            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
