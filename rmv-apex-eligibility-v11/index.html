<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Smart Eligibility 🚩</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --success: #2ecc71; --error: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }

        /* Repeating Watermark */
        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.06; display: flex; flex-wrap: wrap; justify-content: space-around; align-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 40px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; max-width: 750px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 2px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; }
        
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .i-box { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; }
        .i-box label { font-size: 10px; color: var(--accent); display: block; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .i-box input, .i-box select { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; font-weight: bold; }
        select option { background: #000; color: #fff; }

        .btn-check { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; margin-bottom: 15px; }
        
        #results { display: none; background: rgba(255,255,255,0.03); border: 1px dashed var(--accent); border-radius: 20px; padding: 25px; text-align: center; margin-top: 20px; }
        .res-big { font-size: 2.8rem; font-weight: 900; color: var(--success); margin: 10px 0; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .act-btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #fff; font-size: 10px; }

        .sup-links { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 750px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; font-weight: bold; text-align: center; font-size: 11px; }
        .footer { margin-top: 30px; font-size: 10px; opacity: 0.5; font-weight: bold; }
    </style>
</head>
<body onload="loadSaved()">

    <div class="watermark-bg" id="wm"></div>

    <div class="container" id="printable">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>SMART CIBIL-BASED ELIGIBILITY HUB V11</p>
        </div>

        <div class="input-grid">
            <div class="i-box"><label>Monthly Salary (₹)</label><input type="number" id="sal" placeholder="0"></div>
            <div class="i-box"><label>Existing EMIs (₹)</label><input type="number" id="emi" placeholder="0"></div>
            <div class="i-box">
                <label>CIBIL Score Range</label>
                <select id="cibil" onchange="updateRate()">
                    <option value="8.5">Excellent (750+)</option>
                    <option value="10.5">Good (700-750)</option>
                    <option value="12.5">Average (650-700)</option>
                    <option value="15.0">Poor (Below 650)</option>
                </select>
            </div>
            <div class="i-box"><label>Estimated Rate (%)</label><input type="number" id="roi" value="8.5" readonly></div>
            <div class="i-box" style="grid-column: span 2;"><label>Loan Tenure (Years)</label><input type="number" id="years" placeholder="eg. 20"></div>
        </div>

        <button class="btn-check" onclick="calculateSmartElig()">🚀 ANALYZE ELIGIBILITY</button>

        <div id="results">
            <span style="font-size: 10px; opacity: 0.7; text-transform: uppercase;">Maximum Eligible Loan Amount</span>
            <div class="res-big" id="max_amt">₹0</div>
            
            <div class="detail-row"><span>Risk Profile:</span><b id="risk_tag">LOW</b></div>
            <div class="detail-row"><span>CIBIL-Linked ROI:</span><b id="roi_tag" style="color:var(--gold)">8.5%</b></div>
            <div class="detail-row"><span>EMI Capacity:</span><b id="cap_tag" style="color:var(--accent)">₹0</b></div>
        </div>

        <div class="action-row">
            <button class="act-btn" style="background:#238636" onclick="save()">SAVE</button>
            <button class="act-btn" style="background:#4a5568" onclick="pdf()">DOWNLOAD</button>
            <button class="act-btn" style="background:#c53030" onclick="reset()">RESET</button>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">☕ BUY ME A COFFEE</a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">❤️ SUPPORT ON KO-FI</a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | POWERED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        // Watermark Generation
        const wm = document.getElementById('wm');
        for(let i=0; i<35; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function updateRate() {
            document.getElementById('roi').value = document.getElementById('cibil').value;
        }

        function calculateSmartElig() {
            const salary = parseFloat(document.getElementById('sal').value);
            const existEmi = parseFloat(document.getElementById('emi').value) || 0;
            const rate = parseFloat(document.getElementById('roi').value) / 12 / 100;
            const n = parseInt(document.getElementById('years').value) * 12;
            const cibilVal = parseFloat(document.getElementById('cibil').value);

            if(!salary || !n) return alert("Fill Salary and Tenure! 🚩");

            // Logic: FOIR varies with Salary
            let foir = salary > 100000 ? 0.60 : 0.50; // Higher income = Higher capacity
            let maxEmi = (salary * foir) - existEmi;

            if(maxEmi <= 0 || cibilVal > 14) {
                document.getElementById('max_amt').innerText = "LOW ELIGIBILITY";
                document.getElementById('max_amt').style.color = "var(--error)";
                document.getElementById('risk_tag').innerText = "HIGH RISK";
            } else {
                let maxLoan = maxEmi / ((rate * Math.pow(1 + rate, n)) / (Math.pow(1 + rate, n) - 1));
                document.getElementById('max_amt').innerText = "₹" + Math.round(maxLoan).toLocaleString('en-IN');
                document.getElementById('max_amt').style.color = "var(--success)";
                document.getElementById('risk_tag').innerText = cibilVal < 10 ? "LOW RISK" : "MODERATE";
            }

            document.getElementById('roi_tag').innerText = (rate * 12 * 100).toFixed(2) + "%";
            document.getElementById('cap_tag').innerText = "₹" + Math.max(0, Math.round(maxEmi)).toLocaleString('en-IN');
            document.getElementById('results').style.display = 'block';
        }

        function pdf() {
            const element = document.getElementById('printable');
            html2pdf().from(element).set({
                margin: 10, filename: 'RMV_Smart_Eligibility.pdf',
                html2canvas: { scale: 2, backgroundColor: '#05070a' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

        function save() {
            const d = { s:document.getElementById('sal').value, e:document.getElementById('emi').value, r:document.getElementById('roi').value, y:document.getElementById('years').value, c:document.getElementById('cibil').value };
            localStorage.setItem('rmv_smart_elig', JSON.stringify(d));
            alert("Data Saved! 🚩");
        }

        function loadSaved() {
            const s = localStorage.getItem('rmv_smart_elig');
            if(s) {
                const d = JSON.parse(s);
                document.getElementById('sal').value = d.s;
                document.getElementById('emi').value = d.e;
                document.getElementById('roi').value = d.r;
                document.getElementById('years').value = d.y;
                document.getElementById('cibil').value = d.c;
            }
        }

        function reset() { localStorage.removeItem('rmv_smart_elig'); location.reload(); }
    </script>
</body>
</html>
