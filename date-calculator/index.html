<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Calculator Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #2563eb; --s: #1d4ed8; --d: #0f172a; --bg: #f8fafc; --gold: #f59e0b; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; position: relative; overflow-x: hidden; }
        
        /* 🚩 BRAND WATERMARK (As per morning session) */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(2rem, 8vw, 5rem); font-weight: 900; color: rgba(15, 23, 42, 0.03); z-index: 0; white-space: nowrap; pointer-events: none; text-transform: uppercase; letter-spacing: 15px; }

        .card { background: #ffffff; padding: 35px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border: 1px solid #f1f5f9; position: relative; z-index: 10; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(90deg, var(--gold), #d97706); border-radius: 30px 30px 0 0; }
        
        h2 { color: var(--d); font-weight: 800; margin-bottom: 5px; text-align: center; font-size: 1.5rem; }
        .tagline { display: block; text-align: center; color: #94a3b8; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-weight: 800; font-size: 0.7rem; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box; font-weight: 700; color: var(--d); font-family: inherit; }
        input:focus { border-color: var(--gold); background: #fffcf5; }

        /* Elegant Result Box */
        #res-box { background: #f8fafc; padding: 25px; border-radius: 20px; border: 2px dashed #e2e8f0; margin-bottom: 20px; display: none; text-align: center; animation: slideUp 0.3s ease; }
        #total-days { font-size: 1.8rem; font-weight: 900; color: var(--d); display: block; }
        #breakdown { font-size: 0.85rem; font-weight: 700; color: var(--p); margin-top: 8px; display: block; }

        /* Morning-Style Action Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 14px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.85rem; }
        .btn-calc { background: var(--d); color: white; grid-column: span 2; margin-bottom: 5px; }
        .btn-copy { background: #f1f5f9; color: #475569; }
        .btn-save { background: #fef3c7; color: #d97706; }
        .btn-down { background: #ecfdf5; color: #10b981; }
        .btn-clear { background: #fff1f2; color: #e11d48; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* Support Links */
        .support-btns { display: flex; justify-content: center; gap: 10px; margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .s-btn { padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 0.75rem; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        .bmc { background: #FFDD00; color: #000; } .kofi { background: #29abe0; color: #fff; }

        .footer { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RAMESH MEWALAL VISHWAKARMA</div>

<div class="card">
    <h2>📅 Date Calculator Pro</h2>
    <span class="tagline">RMV APEX GROUP • PRECISION TIME</span>

    <div class="input-group">
        <label>Start Date (शुरुआत)</label>
        <input type="date" id="d1" onchange="calc()">
    </div>

    <div class="input-group">
        <label>End Date (अंत)</label>
        <input type="date" id="d2" onchange="calc()">
    </div>

    <button class="btn btn-calc" onclick="calc()"><i class="fas fa-calculator"></i> CALCULATE DURATION</button>

    <div id="res-box">
        <span id="total-days">0 Days</span>
        <span id="breakdown">Select dates to begin</span>
    </div>

    <div class="btn-grid">
        <button class="btn btn-copy" onclick="copy()"><i class="fas fa-copy"></i> Copy</button>
        <button class="btn btn-save" onclick="save()"><i class="fas fa-save"></i> Save</button>
        <button class="btn btn-down" onclick="down()"><i class="fas fa-download"></i> PDF</button>
        <button class="btn btn-clear" onclick="clr()"><i class="fas fa-eraser"></i> Clear</button>
    </div>

    <div class="support-btns">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" class="s-btn bmc" target="_blank"><i class="fas fa-coffee"></i> Coffee</a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" class="s-btn kofi" target="_blank"><i class="fas fa-mug-hot"></i> Ko-fi</a>
    </div>

    <div class="footer">© 2026 RAMESH MEWALAL VISHWAKARMA 🚩</div>
</div>

<script>
    function calc() {
        const d1_val = document.getElementById('d1').value;
        const d2_val = document.getElementById('d2').value;
        if (!d1_val || !d2_val) return;

        const d1 = new Date(d1_val);
        const d2 = new Date(d2_val);
        const box = document.getElementById('res-box');

        const diffTime = Math.abs(d2 - d1);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        let years = d2.getFullYear() - d1.getFullYear();
        let months = d2.getMonth() - d1.getMonth();
        let days = d2.getDate() - d1.getDate();

        if (days < 0) { months -= 1; days += new Date(d2.getFullYear(), d2.getMonth(), 0).getDate(); }
        if (months < 0) { years -= 1; months += 12; }

        document.getElementById('total-days').innerText = diffDays.toLocaleString() + " Total Days";
        document.getElementById('breakdown').innerText = `${years} Yrs, ${months} Months, ${days} Days`;
        box.style.display = "block";
    }

    function copy() {
        const t = document.getElementById('total-days').innerText + " (" + document.getElementById('breakdown').innerText + ")";
        navigator.clipboard.writeText(t);
        alert("मापन कॉपी हो गया! 🚩");
    }

    function clr() {
        document.getElementById('d1').value = "";
        document.getElementById('d2').value = "";
        document.getElementById('res-box').style.display = "none";
    }

    function down() {
        const d1 = document.getElementById('d1').value;
        const d2 = document.getElementById('d2').value;
        const res = document.getElementById('total-days').innerText;
        const brk = document.getElementById('breakdown').innerText;
        
        if(!d1) return alert("पहले गणना करें!");

        const content = `RMV APEX DATE REPORT\n--------------------\nStart: ${d1}\nEnd: ${d2}\nResult: ${res}\nBreakdown: ${brk}\nBy: RAMESH MEWALAL VISHWAKARMA 🚩`;
        const blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Date_Report_RMV.txt`;
        a.click();
    }

    function save() { alert("Report Saved! 🚩"); }
</script>

</body>
</html>
