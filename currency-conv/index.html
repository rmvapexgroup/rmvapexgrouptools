<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Currency Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #3b82f6; --s: #8b5cf6; --d: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; overflow: hidden; }
        
        /* Premium Background Watermark */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(59, 130, 246, 0.04); z-index: -1; white-space: nowrap; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 450px; border: 1px solid #eee; position: relative; overflow: hidden; z-index: 1; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        h2 { color: var(--d); margin-bottom: 25px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #64748b; font-size: 0.9rem; }
        input, select { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        
        .swap-btn { display: flex; justify-content: center; margin: 10px 0; color: var(--p); cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .swap-btn:hover { transform: scale(1.2) rotate(180deg); }

        .btn-calc { width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; background: var(--p); color: white; font-size: 1rem; margin-top: 10px; }
        
        .result-box { background: #eff6ff; padding: 25px; border-radius: 20px; margin-top: 30px; border: 2px dashed #bfdbfe; display: none; text-align: center; }
        .result-text { font-size: 1.5rem; color: var(--p); font-weight: 800; }
        .rate-info { font-size: 0.8rem; color: #64748b; margin-top: 5px; font-weight: 600; }

        /* SUPPORT SECTION */
        .support-section { margin-top: 35px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .support-btns { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
        .support-btn { padding: 10px 15px; border-radius: 12px; text-decoration: none; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .bmc-btn { background: #FFDD00; color: #000; }
        .kofi-btn { background: #29abe0; color: #fff; }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.75rem; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <h2>💱 Global Currency Pro</h2>
    
    <div class="input-group">
        <label>Amount (राशि)</label>
        <input type="number" id="amount" placeholder="e.g. 100">
    </div>

    <div class="input-group">
        <label>From (कहाँ से)</label>
        <select id="fromCurrency">
            <option value="USD">USD - US Dollar</option>
            <option value="INR" selected>INR - Indian Rupee</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="AED">AED - UAE Dirham</option>
        </select>
    </div>

    <div class="swap-btn" onclick="swapCurrencies()">
        <i class="fas fa-retweet"></i>
    </div>

    <div class="input-group">
        <label>To (कहाँ तक)</label>
        <select id="toCurrency">
            <option value="USD" selected>USD - US Dollar</option>
            <option value="INR">INR - Indian Rupee</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="AED">AED - UAE Dirham</option>
        </select>
    </div>
    
    <button class="btn-calc" onclick="convertCurrency()">Convert Now</button>

    <div class="result-box" id="resultBox">
        <div class="result-text" id="finalResult">0.00</div>
        <div class="rate-info" id="rateInfo">1 INR = 0.012 USD</div>
    </div>

    <div class="support-section">
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" class="support-btn bmc-btn" target="_blank"><i class="fas fa-coffee"></i> Coffee</a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" class="support-btn kofi-btn" target="_blank"><i class="fas fa-mug-hot"></i> Ko-fi</a>
        </div>
    </div>
    <div class="footer-tag">© 2026 RMV APEX GROUP 🚩</div>
</div>

<script>
    // Note: In real production, we use APIs like ExchangeRate-API. 
    // This is a high-accuracy offline simulator for core currencies.
    const rates = {
        "USD": 1, "INR": 83.12, "EUR": 0.92, "GBP": 0.79, "AED": 3.67
    };

    function convertCurrency() {
        let amt = parseFloat(document.getElementById('amount').value);
        let from = document.getElementById('fromCurrency').value;
        let to = document.getElementById('toCurrency').value;

        if (isNaN(amt) || amt <= 0) { alert("Please enter a valid amount!"); return; }

        let result = (amt / rates[from]) * rates[to];
        let exchangeRate = (1 / rates[from]) * rates[to];

        document.getElementById('finalResult').innerText = result.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " " + to;
        document.getElementById('rateInfo').innerText = `1 ${from} = ${exchangeRate.toFixed(4)} ${to}`;
        document.getElementById('resultBox').style.display = "block";
    }

    function swapCurrencies() {
        let from = document.getElementById('fromCurrency');
        let to = document.getElementById('toCurrency');
        let temp = from.value;
        from.value = to.value;
        to.value = temp;
    }
</script>
</body>
</html>
