<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Currency Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #3b82f6; --s: #8b5cf6; --d: #0f172a; --bg: #f8fafc; --success: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; }
        
        /* Watermark */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(59, 130, 246, 0.04); z-index: -1; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border: 1px solid #eee; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--d); font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; opacity: 0.6; transition: 0.3s; }
        .back-link:hover { opacity: 1; color: var(--p); }

        h2 { color: var(--d); margin: 20px 0 25px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #64748b; font-size: 0.85rem; }
        input, select { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; font-weight: 600; }
        input:focus, select:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        
        .swap-btn { display: flex; justify-content: center; margin: 10px 0; color: var(--p); cursor: pointer; font-size: 1.4rem; transition: 0.4s; }
        .swap-btn:hover { transform: scale(1.2) rotate(180deg); }

        /* Button Grid */
        .btn-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 15px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-calc { background: var(--p); color: white; }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .btn-clear { background: #f1f5f9; color: #64748b; }
        .btn-clear:hover { background: #e2e8f0; color: #ef4444; }

        .result-box { background: #eff6ff; padding: 25px; border-radius: 25px; margin-top: 30px; border: 2px dashed #bfdbfe; display: none; text-align: center; animation: zoomIn 0.4s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .result-text { font-size: 1.8rem; color: var(--p); font-weight: 800; margin-bottom: 5px; }
        .rate-info { font-size: 0.9rem; color: #64748b; font-weight: 700; }

        .btn-download { width: 100%; margin-top: 20px; background: var(--success); color: white; padding: 12px; font-size: 0.85rem; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .btn-download:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }

        /* --- Updated Support Section --- */
        .support-section { margin-top: 35px; padding-top: 20px; border-top: 1px solid #f1f5f9; text-align: center; }
        .support-btns { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 15px; }
        .kofi-btn { background: #29abe0; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(41,171,224,0.3); transition: 0.3s; }
        .kofi-btn:hover { transform: translateY(-2px); }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.75rem; color: #94a3b8; font-weight: 800; border-top: 1px solid #f8fafc; padding-top: 15px; }

        @media print {
            .no-print, .btn-grid, .back-nav, .support-section, .btn-download, .footer-tag, .swap-btn { display: none !important; }
            .card { border: none; box-shadow: none; width: 100%; max-width: 100%; }
            .result-box { display: block !important; background: white; border: 1px solid #ddd; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <div class="back-nav no-print">
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </div>

    <h2>💱 Global Currency Pro</h2>
    
    <div class="input-group">
        <label>Amount (राशि)</label>
        <input type="number" id="amount" placeholder="e.g. 100" step="any">
    </div>

    <div class="input-group">
        <label>From (कहाँ से)</label>
        <select id="fromCurrency">
            <option value="USD">USD - US Dollar</option>
            <option value="INR" selected>INR - Indian Rupee</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="AED">AED - UAE Dirham</option>
        </select>
    </div>

    <div class="swap-btn no-print" onclick="swapCurrencies()" title="Swap">
        <i class="fas fa-retweet"></i>
    </div>

    <div class="input-group">
        <label>To (कहाँ तक)</label>
        <select id="toCurrency">
            <option value="USD" selected>USD - US Dollar</option>
            <option value="INR">INR - Indian Rupee</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="AED">AED - UAE Dirham</option>
        </select>
    </div>
    
    <div class="btn-grid no-print">
        <button class="btn-calc" onclick="convertCurrency()"><i class="fas fa-sync-alt"></i> Convert</button>
        <button class="btn-clear" onclick="clearAll()"><i class="fas fa-undo"></i> Reset</button>
    </div>

    <div class="result-box" id="resultBox">
        <div class="result-text" id="finalResult">0.00</div>
        <div class="rate-info" id="rateInfo">1 INR = 0.012 USD</div>
        
        <button class="btn-download no-print" onclick="downloadPDF()"><i class="fas fa-file-invoice-dollar"></i> Download Report</button>
    </div>

    <div class="support-section no-print">
        <p style="font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase;">Support RMV APEX GROUP 🚩</p>
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank">
                <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=☕&slug=rameshmewalalvishwakarma&button_colour=FFDD00&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=ffffff" style="height: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(255, 221, 0, 0.2);">
            </a>

            <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="kofi-btn">
                <i class="fas fa-mug-hot"></i> Support on Ko-fi
            </a>
        </div>
    </div>

    <div class="footer-tag">Crafted by Ramesh Mewalal Vishwakarma 🚩</div>
</div>

<script>
    const rates = {
        "USD": 1, "INR": 83.12, "EUR": 0.92, "GBP": 0.79, "AED": 3.67
    };

    function convertCurrency() {
        let amt = parseFloat(document.getElementById('amount').value);
        let from = document.getElementById('fromCurrency').value;
        let to = document.getElementById('toCurrency').value;

        if (isNaN(amt) || amt <= 0) { 
            alert("महत्वपूर्ण: कृपया एक वैध राशि दर्ज करें!"); 
            return; 
        }

        let result = (amt / rates[from]) * rates[to];
        let exchangeRate = (1 / rates[from]) * rates[to];

        document.getElementById('finalResult').innerText = result.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " " + to;
        document.getElementById('rateInfo').innerText = `1 ${from} = ${exchangeRate.toFixed(4)} ${to}`;
        document.getElementById('resultBox').style.display = "block";
    }

    function swapCurrencies() {
        let from = document.getElementById('fromCurrency');
        let to = document.getElementById('toCurrency');
        let temp = from.value;
        from.value = to.value;
        to.value = temp;
        if(document.getElementById('resultBox').style.display === "block") convertCurrency();
    }

    function clearAll() {
        document.getElementById('amount').value = '';
        document.getElementById('resultBox').style.display = "none";
    }

    function downloadPDF() {
        window.print();
    }
</script>
</body>
</html>
