<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Health Tracker | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #0ea5e9; --s: #22c55e; --d: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; overflow: hidden; }
        
        /* Premium Background Watermark */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(14, 165, 233, 0.04); z-index: -1; white-space: nowrap; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 450px; border: 1px solid #eee; position: relative; overflow: hidden; z-index: 1; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        h2 { color: var(--d); margin-bottom: 25px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #64748b; font-size: 0.9rem; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(14, 165, 233, 0.1); }
        
        .btn-calc { width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; background: var(--p); color: white; font-size: 1rem; margin-top: 10px; }
        
        .result-box { background: #f0f9ff; padding: 25px; border-radius: 20px; margin-top: 30px; border: 2px dashed #bae6fd; display: none; text-align: center; }
        .bmi-score { font-size: 2.5rem; color: var(--p); font-weight: 800; margin-bottom: 5px; }
        .bmi-status { font-size: 1.2rem; font-weight: 700; padding: 5px 15px; border-radius: 10px; display: inline-block; margin-bottom: 15px; }
        .bmi-info { font-size: 0.85rem; color: #64748b; font-weight: 600; line-height: 1.5; }

        /* Status Colors */
        .underweight { background: #fef3c7; color: #d97706; }
        .normal { background: #dcfce7; color: #16a34a; }
        .overweight { background: #fee2e2; color: #dc2626; }

        /* SUPPORT SECTION */
        .support-section { margin-top: 35px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .support-btns { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
        .support-btn { padding: 10px 15px; border-radius: 12px; text-decoration: none; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .bmc-btn { background: #FFDD00; color: #000; }
        .kofi-btn { background: #29abe0; color: #fff; }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.75rem; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <h2>⚖️ BMI Health Tracker</h2>
    
    <div class="input-group">
        <label>Weight (वजन - kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70">
    </div>

    <div class="input-group">
        <label>Height (ऊंचाई - cm)</label>
        <input type="number" id="height" placeholder="e.g. 170">
    </div>
    
    <button class="btn-calc" onclick="calculateBMI()">Check Health Status</button>

    <div class="result-box" id="resultBox">
        <div class="bmi-score" id="bmiValue">0.0</div>
        <div class="bmi-status" id="bmiStatus">Normal</div>
        <div class="bmi-info" id="bmiInfo">स्वस्थ जीवन के लिए संतुलित आहार और व्यायाम आवश्यक है।</div>
    </div>

    <div class="support-section">
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" class="support-btn bmc-btn" target="_blank"><i class="fas fa-coffee"></i> Coffee</a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" class="support-btn kofi-btn" target="_blank"><i class="fas fa-mug-hot"></i> Ko-fi</a>
        </div>
    </div>
    <div class="footer-tag">© 2026 RMV APEX GROUP 🚩</div>
</div>

<script>
    function calculateBMI() {
        let weight = parseFloat(document.getElementById('weight').value);
        let height = parseFloat(document.getElementById('height').value) / 100; // convert to meters

        if (isNaN(weight) || isNaN(height) || height <= 0) {
            alert("कृपया सही वजन और ऊंचाई दर्ज करें!");
            return;
        }

        let bmi = (weight / (height * height)).toFixed(1);
        let status = "";
        let className = "";
        let info = "";

        if (bmi < 18.5) {
            status = "Underweight";
            className = "underweight";
            info = "आपको पौष्टिक आहार और वजन बढ़ाने पर ध्यान देने की आवश्यकता हो सकती है।";
        } else if (bmi >= 18.5 && bmi <= 24.9) {
            status = "Healthy / Normal";
            className = "normal";
            info = "बधाई हो! आपका वजन बिल्कुल सही है। इसे बनाए रखें।";
        } else if (bmi >= 25 && bmi <= 29.9) {
            status = "Overweight";
            className = "overweight";
            info = "सावधानी! आपको नियमित व्यायाम और खान-पान पर नियंत्रण की जरूरत है।";
        } else {
            status = "Obese (अत्यधिक वजन)";
            className = "overweight";
            info = "चेतावनी! स्वास्थ्य जोखिम कम करने के लिए विशेषज्ञ से सलाह लें।";
        }

        document.getElementById('bmiValue').innerText = bmi;
        document.getElementById('bmiStatus').innerText = status;
        document.getElementById('bmiStatus').className = "bmi-status " + className;
        document.getElementById('bmiInfo').innerText = info;
        
        document.getElementById('resultBox').style.display = "block";
    }
</script>
</body>
</html>
