<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Health Tracker | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #0ea5e9; --s: #22c55e; --d: #0f172a; --bg: #f8fafc; --danger: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; }
        
        /* Watermark */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(14, 165, 233, 0.04); z-index: -1; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border: 1px solid #eee; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--d); font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; opacity: 0.6; transition: 0.3s; }
        .back-link:hover { opacity: 1; color: var(--p); }

        h2 { color: var(--d); margin: 20px 0 25px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #64748b; font-size: 0.85rem; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; font-weight: 600; }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(14, 165, 233, 0.1); }
        
        /* Button Grid */
        .btn-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 15px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-calc { background: var(--p); color: white; }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3); }
        .btn-clear { background: #f1f5f9; color: #64748b; }
        .btn-clear:hover { background: #e2e8f0; color: var(--danger); }

        .result-box { background: #f0f9ff; padding: 25px; border-radius: 25px; margin-top: 30px; border: 2px dashed #bae6fd; display: none; text-align: center; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .bmi-score { font-size: 2.8rem; color: var(--p); font-weight: 800; margin-bottom: 5px; }
        .bmi-status { font-size: 1.1rem; font-weight: 800; padding: 8px 20px; border-radius: 12px; display: inline-block; margin-bottom: 15px; text-transform: uppercase; }
        .bmi-info { font-size: 0.9rem; color: #475569; font-weight: 600; line-height: 1.6; }

        /* Status Styles */
        .underweight { background: #fef3c7; color: #d97706; }
        .normal { background: #dcfce7; color: #16a34a; }
        .overweight { background: #fee2e2; color: #dc2626; }

        .btn-download { width: 100%; margin-top: 25px; background: var(--s); color: white; padding: 12px; font-size: 0.85rem; }
        .btn-download:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2); }

        .support-section { margin-top: 35px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .support-btns { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
        .support-btn { padding: 10px 15px; border-radius: 12px; text-decoration: none; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .bmc-btn { background: #FFDD00; color: #000; }
        .kofi-btn { background: #29abe0; color: #fff; }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.75rem; color: #94a3b8; font-weight: 800; }

        @media print {
            .btn-grid, .back-nav, .support-section, .btn-download, .footer-tag { display: none !important; }
            .card { border: none; box-shadow: none; width: 100%; max-width: 100%; }
            .result-box { display: block !important; background: white; border: 1px solid #ccc; }
            .bmi-status { border: 1px solid #ccc; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <div class="back-nav">
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </div>

    <h2>⚖️ BMI Health Tracker</h2>
    
    <div class="input-group">
        <label>Weight (वजन - kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70" step="0.1">
    </div>

    <div class="input-group">
        <label>Height (ऊंचाई - cm)</label>
        <input type="number" id="height" placeholder="e.g. 170" step="0.1">
    </div>
    
    <div class="btn-grid">
        <button class="btn-calc" onclick="calculateBMI()"><i class="fas fa-heartbeat"></i> Check Status</button>
        <button class="btn-clear" onclick="clearAll()"><i class="fas fa-undo"></i> Reset</button>
    </div>

    <div class="result-box" id="resultBox">
        <div class="bmi-score" id="bmiValue">0.0</div>
        <div class="bmi-status" id="bmiStatus">Normal</div>
        <div class="bmi-info" id="bmiInfo">स्वस्थ जीवन के लिए संतुलित आहार और व्यायाम आवश्यक है।</div>
        
        <button class="btn-download" onclick="downloadPDF()"><i class="fas fa-file-medical"></i> Download Health Report</button>
    </div>

    <div class="support-section">
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" class="support-btn bmc-btn" target="_blank"><i class="fas fa-coffee"></i> Coffee</a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" class="support-btn kofi-btn" target="_blank"><i class="fas fa-mug-hot"></i> Ko-fi</a>
        </div>
    </div>
    <div class="footer-tag">Crafted by Ramesh Mewalal Vishwakarma 🚩</div>
</div>

<script>
    function calculateBMI() {
        let weight = parseFloat(document.getElementById('weight').value);
        let heightCm = parseFloat(document.getElementById('height').value);
        let heightM = heightCm / 100;

        if (isNaN(weight) || isNaN(heightCm) || heightM <= 0) {
            alert("महत्वपूर्ण: कृपया सही वजन और ऊंचाई दर्ज करें!");
            return;
        }

        let bmi = (weight / (heightM * heightM)).toFixed(1);
        let status = "";
        let className = "";
        let info = "";

        if (bmi < 18.5) {
            status = "Underweight";
            className = "underweight";
            info = "आपको पौष्टिक आहार और वजन बढ़ाने पर ध्यान देने की आवश्यकता हो सकती है।";
        } else if (bmi >= 18.5 && bmi <= 24.9) {
            status = "Healthy / Normal";
            className = "normal";
            info = "बधाई हो! आपका वजन बिल्कुल सही है। संतुलित जीवनशैली बनाए रखें।";
        } else if (bmi >= 25 && bmi <= 29.9) {
            status = "Overweight";
            className = "overweight";
            info = "सावधानी! आपको नियमित व्यायाम और संतुलित खान-पान की आवश्यकता है।";
        } else {
            status = "Obese (अत्यधिक वजन)";
            className = "overweight";
            info = "चेतावनी! स्वास्थ्य जोखिमों को कम करने के लिए कृपया डॉक्टर से परामर्श लें।";
        }

        document.getElementById('bmiValue').innerText = bmi;
        document.getElementById('bmiStatus').innerText = status;
        document.getElementById('bmiStatus').className = "bmi-status " + className;
        document.getElementById('bmiInfo').innerText = info;
        
        document.getElementById('resultBox').style.display = "block";
    }

    function clearAll() {
        document.getElementById('weight').value = '';
        document.getElementById('height').value = '';
        document.getElementById('resultBox').style.display = "none";
    }

    function downloadPDF() {
        window.print();
    }
</script>
</body>
</html>
