<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | PAN Validator 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --accent: #3498db; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --error: #e74c3c; --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.05; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 50px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 30px; width: 100%; max-width: 600px; border-top: 6px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--accent); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; }

        .input-box { background: #000; border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .input-box label { font-size: 10px; color: #888; display: block; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; text-align: center; }

        .btn-validate { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--accent); color: #fff; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-validate:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); }

        #result { display: none; margin-top: 25px; padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .valid { background: rgba(46, 204, 113, 0.15); color: var(--success); border: 1px solid var(--success); }
        .invalid { background: rgba(231, 76, 60, 0.15); color: var(--error); border: 1px solid var(--error); }

        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Smart PAN Card Validator V11</p>
        </div>

        <div class="input-box">
            <label>PAN नंबर दर्ज करें (10 Characters)</label>
            <input type="text" id="panInput" maxlength="10" placeholder="ABCDE1234F">
        </div>

        <button class="btn-validate" onclick="validatePAN()">🚀 VALIDATE NOW</button>

        <div id="result"></div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<30; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function validatePAN() {
            const pan = document.getElementById('panInput').value.toUpperCase().trim();
            const result = document.getElementById('result');
            
            // Regex for Indian PAN Card
            const panRegex = /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/;

            if (!pan) {
                alert("कृपया PAN नंबर दर्ज करें! 🚩");
                return;
            }

            result.style.display = 'block';
            if (panRegex.test(pan)) {
                result.innerText = "✅ वैध (Valid) PAN कार्ड फॉर्मेट!";
                result.className = "valid";
            } else {
                result.innerText = "❌ अवैध (Invalid) PAN कार्ड फॉर्मेट!";
                result.className = "invalid";
            }
        }
    </script>
</body>
</html>
