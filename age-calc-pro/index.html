<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Intelligence Pro | RMV APEX GROUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #f59e0b; --s: #ef4444; --d: #0f172a; --bg: #f8fafc; --success: #22c55e; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; user-select: none; padding: 20px; position: relative; }
        
        /* Watermark */
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: rgba(245, 158, 11, 0.04); z-index: -1; pointer-events: none; text-transform: uppercase; letter-spacing: 8px; }

        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border: 1px solid #eee; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--p), var(--s)); }
        
        .back-nav { position: absolute; top: 20px; left: 20px; }
        .back-link { text-decoration: none; color: var(--d); font-weight: 800; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; opacity: 0.6; transition: 0.3s; }
        .back-link:hover { opacity: 1; color: var(--s); }

        h2 { color: var(--d); margin: 20px 0 25px; font-size: 1.8rem; font-weight: 800; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #64748b; font-size: 0.85rem; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; font-weight: 600; }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(245, 158, 11, 0.1); }
        
        /* Button Grid */
        .btn-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 15px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-calc { background: var(--p); color: white; }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }
        .btn-clear { background: #f1f5f9; color: #64748b; }
        .btn-clear:hover { background: #e2e8f0; color: var(--s); }

        .result-box { background: #fffbeb; padding: 25px; border-radius: 25px; margin-top: 30px; border: 2px dashed #fef3c7; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .main-age { font-size: 1.8rem; color: var(--p); font-weight: 800; text-align: center; margin-bottom: 15px; border-bottom: 2px solid #fef3c7; padding-bottom: 10px; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 700; color: #475569; font-size: 0.95rem; }
        
        .btn-download { width: 100%; margin-top: 20px; background: var(--success); color: white; padding: 12px; font-size: 0.85rem; }
        .btn-download:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2); }

        .support-section { margin-top: 35px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .support-btns { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
        .support-btn { padding: 10px 15px; border-radius: 12px; text-decoration: none; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .bmc-btn { background: #FFDD00; color: #000; }
        .kofi-btn { background: #29abe0; color: #fff; }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.75rem; color: #94a3b8; font-weight: 800; }

        /* Print Logic */
        @media print {
            body { background: white; }
            .card { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            .btn-grid, .back-nav, .support-section, .btn-download, .footer-tag { display: none !important; }
            .result-box { display: block !important; border: 1px solid #eee; background: white; }
            .watermark { opacity: 0.1 !important; color: black !important; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="watermark">RMV APEX GROUP</div>

<div class="card">
    <div class="back-nav">
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
    </div>

    <h2>📅 Age Intelligence Pro</h2>
    
    <div class="input-group">
        <label>Date of Birth (जन्म तिथि)</label>
        <input type="date" id="dob">
    </div>

    <div class="input-group">
        <label>As of Date (आज की तिथि)</label>
        <input type="date" id="today">
    </div>
    
    <div class="btn-grid">
        <button class="btn-calc" onclick="calculateAge()"><i class="fas fa-calculator"></i> Calculate</button>
        <button class="btn-clear" onclick="clearAll()"><i class="fas fa-undo"></i> Reset</button>
    </div>

    <div class="result-box" id="resultBox">
        <div class="main-age" id="exactAge">0 Years Old</div>
        <div class="res-row"><span>Total Months:</span> <span id="tMonths">0</span></div>
        <div class="res-row"><span>Total Weeks:</span> <span id="tWeeks">0</span></div>
        <div class="res-row"><span>Total Days:</span> <span id="tDays">0</span></div>
        <div class="res-row" style="margin-top:10px; color: var(--s);">
            <span>Next Birthday:</span> <span id="nextBday">--</span>
        </div>
        
        <button class="btn-download" onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> Download Age Report</button>
    </div>

    <div class="support-section">
        <div class="support-btns">
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" class="support-btn bmc-btn" target="_blank"><i class="fas fa-coffee"></i> Coffee</a>
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" class="support-btn kofi-btn" target="_blank"><i class="fas fa-mug-hot"></i> Ko-fi</a>
        </div>
    </div>
    <div class="footer-tag">Crafted by Ramesh Mewalal Vishwakarma 🚩</div>
</div>

<script>
    // Set default today's date
    document.getElementById('today').valueAsDate = new Date();

    function calculateAge() {
        let birthDate = new Date(document.getElementById('dob').value);
        let today = new Date(document.getElementById('today').value);

        if (isNaN(birthDate)) { 
            alert("महत्वपूर्ण: कृपया अपनी जन्म तिथि सही ढंग से चुनें!"); 
            return; 
        }

        let years = today.getFullYear() - birthDate.getFullYear();
        let months = today.getMonth() - birthDate.getMonth();
        let days = today.getDate() - birthDate.getDate();

        if (days < 0) {
            months--;
            days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
        }
        if (months < 0) {
            years--;
            months += 12;
        }

        let diffTime = Math.abs(today - birthDate);
        let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        let diffWeeks = Math.floor(diffDays / 7);
        let diffMonths = (years * 12) + months;

        let nextBday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
        if (today > nextBday) {
            nextBday.setFullYear(today.getFullYear() + 1);
        }
        let bdayDiff = Math.ceil((nextBday - today) / (1000 * 60 * 60 * 24));

        // Result Animation & Display
        document.getElementById('exactAge').innerText = `${years} Years, ${months} Months, ${days} Days`;
        document.getElementById('tMonths').innerText = diffMonths.toLocaleString();
        document.getElementById('tWeeks').innerText = diffWeeks.toLocaleString();
        document.getElementById('tDays').innerText = diffDays.toLocaleString();
        document.getElementById('nextBday').innerText = bdayDiff === 365 || bdayDiff === 0 ? "Today is Birthday! 🎉" : bdayDiff + " Days Left";
        
        document.getElementById('resultBox').style.display = "block";
    }

    function clearAll() {
        document.getElementById('dob').value = '';
        document.getElementById('today').valueAsDate = new Date();
        document.getElementById('resultBox').style.display = "none";
    }

    function downloadPDF() {
        window.print();
    }
</script>
</body>
</html>
