<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Intelligence Hub | RMV APEX</title>
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --gold: #d4af37; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 15px; user-select: none; }
        
        .app-card { max-width: 500px; margin: 20px auto; background: #fff; border-radius: 24px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); position: relative; }
        
        .wm { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 3rem; opacity: 0.04; font-weight: 900; pointer-events: none; width: 100%; text-align: center; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #f8fafc; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-weight: 700; color: #64748b; border-radius: 8px; font-size: 0.8rem; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; font-size: 0.85rem; margin-bottom: 5px; color: var(--dark); }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; }

        .btn-calc { width: 100%; padding: 15px; border: none; background: var(--primary); color: white; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        
        .result-box { margin-top: 20px; padding: 15px; background: #f0fdf4; border-radius: 15px; border: 1px solid #bbf7d0; display: none; animation: slideUp 0.3s ease; }
        .res-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; border-bottom: 1px dashed #cbd5e1; padding-bottom: 5px; }

        .support-strip { display: flex; gap: 8px; margin-top: 25px; }
        .s-btn { flex: 1; text-align: center; padding: 10px; border-radius: 10px; text-decoration: none; font-size: 0.7rem; font-weight: 800; color: white; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="app-card">
        <div class="wm" id="watermark">RMV APEX GROUP</div>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="margin:0; color:var(--dark);">Life Intelligence</h2>
            <p style="margin:5px 0; font-size: 0.75rem; color:var(--primary); font-weight: 800; text-transform: uppercase;">One Life • 9 Paths • Unlimited Growth</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('age', this)">Age Calc</button>
            <button class="tab-btn" onclick="switchTab('date', this)">Date Calc</button>
            <button class="tab-btn" onclick="switchTab('life', this)">Life Facts</button>
        </div>

        <div id="ageSection" class="calc-module">
            <div class="input-group"><label>Date of Birth</label><input type="date" id="dob"></div>
            <button class="btn-calc" onclick="runAge()">Calculate Age 🎂</button>
        </div>

        <div id="dateSection" class="calc-module" style="display:none;">
            <div class="input-group"><label>Start Date</label><input type="date" id="dStart"></div>
            <div class="input-group"><label>Add/Subtract Days</label><input type="number" id="daysDiff" placeholder="Ex: 30 or -30"></div>
            <button class="btn-calc" onclick="runDate()">Adjust Date 📅</button>
        </div>

        <div id="lifeSection" class="calc-module" style="display:none;">
            <div class="input-group"><label>Your Birth Date</label><input type="date" id="lifeDob"></div>
            <button class="btn-calc" onclick="runLife()">Reveal Life Facts ✨</button>
        </div>

        <div class="result-box" id="resBox"></div>

        <div class="support-strip">
            <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0;">Ko-fi</a>
            <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:black;">Coffee</a>
            <a href="https://wa.me/918652025006" target="_blank" class="s-btn" style="background:#25D366;">WhatsApp</a>
        </div>
        
        <p style="text-align:center; font-size:0.65rem; color:#94a3b8; margin-top:15px;">Powered by RMV APEX GROUP | © 2026</p>
    </div>

    <script>
        const BRAND_MODE = true;
        if(!BRAND_MODE) { document.getElementById('watermark').style.display='none'; }

        function switchTab(t, el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.calc-module').forEach(m => m.style.display = 'none');
            el.classList.add('active');
            document.getElementById(t + 'Section').style.display = 'block';
            document.getElementById('resBox').style.display = 'none';
        }

        function runAge() {
            const birth = new Date(document.getElementById('dob').value);
            if(!birth.getTime()) return;
            const now = new Date();
            let y = now.getFullYear() - birth.getFullYear();
            let m = now.getMonth() - birth.getMonth();
            let d = now.getDate() - birth.getDate();
            if (d < 0) { m--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if (m < 0) { y--; m += 12; }
            showRes(`<div class="res-line"><span>Years:</span><b>${y}</b></div><div class="res-line"><span>Months:</span><b>${m}</b></div><div class="res-line"><span>Days:</span><b>${d}</b></div>`);
        }

        function runDate() {
            const start = new Date(document.getElementById('dStart').value);
            const days = parseInt(document.getElementById('daysDiff').value);
            if(!start.getTime() || isNaN(days)) return;
            start.setDate(start.getDate() + days);
            showRes(`<div class="res-line"><span>Resulting Date:</span><b>${start.toDateString()}</b></div>`);
        }

        function runLife() {
            const dob = new Date(document.getElementById('lifeDob').value);
            if(!dob.getTime()) return;
            const diff = new Date() - dob;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const breaths = (days * 24 * 60 * 16).toLocaleString(); // Avg 16 breaths/min
            const heart = (days * 24 * 60 * 72).toLocaleString(); // Avg 72 beats/min
            showRes(`<div class="res-line"><span>Total Days Lived:</span><b>${days}</b></div><div class="res-line"><span>Total Breaths:</span><b>~${breaths}</b></div><div class="res-line"><span>Heart Beats:</span><b>~${heart}</b></div>`);
        }

        function showRes(html) {
            const rb = document.getElementById('resBox');
            rb.innerHTML = html; rb.style.display = 'block';
        }
    </script>
</body>
</html>
