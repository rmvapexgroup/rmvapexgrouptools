<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMV APEX GROUP | Email Master 🚩</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #05070a; --primary: #70a1ff; --glass: rgba(255, 255, 255, 0.05); --gold: #ffd700; --success: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .watermark-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.06; display: flex; flex-wrap: wrap; justify-content: space-around; }
        .wm-text { transform: rotate(-30deg); font-weight: 900; font-size: 18px; margin: 50px; color: #fff; }

        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; width: 100%; max-width: 650px; border-top: 6px solid var(--primary); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .header h1 { color: var(--primary); text-align: center; font-weight: 900; letter-spacing: 1px; }
        .header p { text-align: center; font-size: 10px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; }
        
        .section-title { font-size: 11px; color: var(--primary); margin: 15px 0 10px; font-weight: bold; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 10px; }
        .i-box { background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .i-box label { font-size: 10px; color: #aaa; display: block; margin-bottom: 5px; }
        .i-box input, .i-box select { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; font-weight: bold; }

        .btn-gen { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--primary); color: #000; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-gen:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(112, 161, 255, 0.4); }
        
        #results { display: none; margin-top: 25px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .subject-item { background: #111; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; position: relative; transition: 0.2s; border-left: 4px solid var(--primary); }
        .subject-item:hover { background: #1a1a1a; transform: translateX(5px); }
        .subject-item span { font-size: 9px; color: var(--primary); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .copy-hint { position: absolute; right: 15px; top: 20px; font-size: 10px; color: var(--success); opacity: 0; }
        .subject-item:active .copy-hint { opacity: 1; }

        .sup-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 650px; margin-bottom: 20px; }
        .s-btn { padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .footer { font-size: 10px; opacity: 0.5; font-weight: bold; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="watermark-bg" id="wm"></div>

    <div class="container">
        <div class="header">
            <h1>RMV APEX GROUP 🚩</h1>
            <p>Smart Email Subject Line Generator V11</p>
        </div>

        <div class="section-title">Email Context</div>
        <div class="i-box">
            <label>What is the Email about? (Main Topic)</label>
            <input type="text" id="topic" placeholder="Ex: New Discount, Free Webinar, Project Update...">
        </div>

        <div class="section-title">Choose Strategy</div>
        <div class="i-box">
            <label>Campaign Style</label>
            <select id="style">
                <option value="Urgency">Urgency (Last Chance, Hurry!)</option>
                <option value="Curiosity">Curiosity (You won't believe this...)</option>
                <option value="Benefit">Benefit Driven (Save 50%, Grow faster)</option>
                <option value="Professional">Professional (Official Update)</option>
            </select>
        </div>

        <button class="btn-gen" onclick="generateSubjects()">🚀 GENERATE CLICK-WORTHY SUBJECTS</button>

        <div id="results">
            <div class="section-title">Tap to copy your favorite line</div>
            <div id="subject_list"></div>
        </div>
    </div>

    <div class="sup-links">
        <a href="https://buymeacoffee.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#FFDD00; color:#000;">
            <i class="fas fa-coffee"></i> BUY ME A COFFEE
        </a>
        <a href="https://ko-fi.com/rameshmewalalvishwakarma" target="_blank" class="s-btn" style="background:#29abe0; color:#fff;">
            <i class="fas fa-heart"></i> SUPPORT ON KO-FI
        </a>
    </div>

    <div class="footer">🚩 RMV APEX GROUP | DESIGNED BY RAMESH MEWALAL VISHWAKARMA 🚩</div>

    <script>
        const wm = document.getElementById('wm');
        for(let i=0; i<30; i++) wm.innerHTML += `<div class="wm-text">RMV APEX GROUP</div>`;

        function generateSubjects() {
            const topic = document.getElementById('topic').value.trim();
            const style = document.getElementById('style').value;
            const container = document.getElementById('subject_list');

            if(!topic) { alert("Please enter a topic first! 🚩"); return; }

            const templates = {
                Urgency: [
                    `⏰ Final Hours: Your ${topic} is expiring!`,
                    `Hurry! Only a few spots left for ${topic}`,
                    `[Last Chance] Get your ${topic} before it's gone`,
                    `Price drop alert! ${topic} ends tonight.`
                ],
                Curiosity: [
                    `Wait... you haven't seen this ${topic} yet?`,
                    `A little secret about ${topic} inside... 🤫`,
                    `Is ${topic} really worth it? (Find out)`,
                    `I have a surprise for you regarding ${topic}`
                ],
                Benefit: [
                    `How to get more from your ${topic} 📈`,
                    `🎁 Free inside: Your guide to ${topic}`,
                    `Save big on ${topic} starting today!`,
                    `The easiest way to master ${topic}`
                ],
                Professional: [
                    `Official Update: Regarding ${topic}`,
                    `Important: New changes to ${topic}`,
                    `Summary: Your ${topic} report for the week`,
                    `Invitation: Exclusive ${topic} event for members`
                ]
            };

            container.innerHTML = "";
            templates[style].forEach(line => {
                const div = document.createElement('div');
                div.className = 'subject-item';
                div.innerHTML = `<span>${style} Style</span> ${line} <div class="copy-hint">COPIED</div>`;
                div.onclick = () => {
                    navigator.clipboard.writeText(line);
                    alert("Subject Line Copied! 🚩");
                };
                container.appendChild(div);
            });

            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
